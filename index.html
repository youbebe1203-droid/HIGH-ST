        // ─── StudyHeatmap ────────────────────────────────────────────────────

        function StudyHeatmap({ heatmapData }) {
            const CELL = 13, GAP = 3;
            const DAYS_KR = ['일','월','화','수','목','금','토'];

            const { weeks, monthLabels } = useMemo(() => {
                const today = new Date(); today.setHours(0,0,0,0);
                const todayStr = today.toISOString().split('T')[0];
                // end on nearest Saturday
                const end = new Date(today);
                while (end.getDay() !== 6) end.setDate(end.getDate() + 1);
                // start 26 weeks back, on Sunday
                const start = new Date(end);
                start.setDate(start.getDate() - 26 * 7 + 1);
                while (start.getDay() !== 0) start.setDate(start.getDate() - 1);

                const weeks = [];
                const monthLabels = {};
                let week = [];
                const cur = new Date(start);

                while (cur <= end) {
                    const dayOfWeek = cur.getDay();
                    if (dayOfWeek === 0 && week.length > 0) { weeks.push(week); week = []; }
                    const dateStr = cur.toISOString().split('T')[0];
                    week.push(cur <= today ? dateStr : null);
                    // month label: first week a month appears
                    if (cur.getDate() === 1) monthLabels[weeks.length] = cur.getMonth() + 1;
                    cur.setDate(cur.getDate() + 1);
                }
                if (week.length) weeks.push(week);
                if (!Object.keys(monthLabels).length) monthLabels[0] = new Date(start).getMonth() + 1;
                return { weeks, monthLabels };
            }, []);

            const getColor = (sec) => {
                if (!sec) return null;
                const m = sec / 60;
                if (m < 60)  return 'rgba(79,110,247,0.20)'; // < 1h
                if (m < 120) return 'rgba(79,110,247,0.42)'; // 1-2h
                if (m < 240) return 'rgba(79,110,247,0.65)'; // 2-4h
                if (m < 360) return 'rgba(79,110,247,0.82)'; // 4-6h
                return 'rgba(79,110,247,0.97)';               // 6h+
            };

            const todayStr = new Date().toISOString().split('T')[0];

            return (
                <div className="glass-card" style={{padding:'24px 28px', marginTop:'16px', overflowX:'auto'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px'}}>
                        <h4 style={{fontSize:'14px', fontWeight:900, color:'var(--text)'}}>📊 학습 기록</h4>
                        <div style={{display:'flex', alignItems:'center', gap:'6px', fontSize:'10px', fontWeight:700, opacity:0.4}}>
                            <span>적음</span>
                            {[0.20,0.42,0.65,0.82,0.97].map((o,i) => <div key={i} style={{width:'12px',height:'12px',borderRadius:'3px',background:`rgba(79,110,247,${o})`}}/>)}
                            <span>많음</span>
                        </div>
                    </div>
                    <div style={{display:'flex', gap:`${GAP}px`}}>
                        {/* 요일 라벨 */}
                        <div style={{display:'flex', flexDirection:'column', gap:`${GAP}px`, paddingTop:'18px', flexShrink:0}}>
                            {DAYS_KR.map((d,i) => (
                                <div key={d} style={{height:`${CELL}px`, fontSize:'9px', fontWeight:800, opacity:[1,3,5].includes(i)?0.4:0, color:'var(--text-sub)', display:'flex', alignItems:'center', paddingRight:'6px', minWidth:'16px'}}>{d}</div>
                            ))}
                        </div>
                        {/* 주 열들 */}
                        <div style={{display:'flex', flexDirection:'column'}}>
                            {/* 월 라벨 행 */}
                            <div style={{display:'flex', gap:`${GAP}px`, marginBottom:'4px', height:'14px'}}>
                                {weeks.map((_,wi) => (
                                    <div key={wi} style={{width:`${CELL}px`, flexShrink:0, fontSize:'9px', fontWeight:800, color:'var(--text-sub)', opacity:monthLabels[wi]?0.45:0, whiteSpace:'nowrap'}}>
                                        {monthLabels[wi]?`${monthLabels[wi]}월`:''}
                                    </div>
                                ))}
                            </div>
                            {/* 7행 × N열 그리드 */}
                            {[0,1,2,3,4,5,6].map(dow => (
                                <div key={dow} style={{display:'flex', gap:`${GAP}px`, marginBottom:`${GAP}px`}}>
                                    {weeks.map((week,wi) => {
                                        const date = week[dow];
                                        const sec = date ? (heatmapData[date] || 0) : 0;
                                        const color = getColor(sec);
                                        const isToday = date === todayStr;
                                        const min = Math.round(sec/60);
                                        const label = date ? (min>=60 ? `${Math.floor(min/60)}h ${min%60}m` : min>0 ? `${min}m` : '기록없음') : '';
                                        return (
                                            <div key={wi} title={date?`${date} ${label}`:''}
                                                style={{width:`${CELL}px`, height:`${CELL}px`, flexShrink:0, borderRadius:'3px',
                                                    background: date?(color||'var(--glass-bg2)'):'transparent',
                                                    border: isToday?'1.5px solid var(--accent)':date?'1px solid rgba(255,255,255,0.04)':'none',
                                                    transition:'transform 0.1s', cursor:date?'default':'default'}}
                                                onMouseEnter={e=>{if(date)e.currentTarget.style.transform='scale(1.4)';}}
                                                onMouseLeave={e=>{e.currentTarget.style.transform='';}}
                                            />
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ─── StudyView ───────────────────────────────────────────────────────

        function StudyView({ currentUser, studyGroups, studyTime, suneungDate, getDDay, todos, selectedDate, setSelectedDate, onAddTodo, onToggleTodo, onDeleteTodo, onStudyStart, onStudyStop, onCreateGroup, onJoinGroup, onLeaveGroup, onKickMember, isMobileUI }) {
            const [isTimerOn,      setIsTimerOn]      = useState(false);
            const [isPaused,       setIsPaused]       = useState(false);
            const [isStopping,     setIsStopping]     = useState(false);
            const [btnKey,         setBtnKey]         = useState(0);
            const [timerSec,       setTimerSec]       = useState(0);
            const [currentSubject, setCurrentSubject] = useState('수학');
            const [forceMinutes,   setForceMinutes]   = useState('');
            const [forceSubject,   setForceSubject]   = useState('수학');
            const [todaySessions,  setTodaySessions]  = useState([]);
            const [groupPresence,  setGroupPresence]  = useState({});
            const [heatmapData,    setHeatmapData]    = useState({});
            const [showCreate,     setShowCreate]     = useState(false);
            const [showJoin,       setShowJoin]       = useState(false);
            const [newGroupName,   setNewGroupName]   = useState('');
            const [joinCode,       setJoinCode]       = useState('');
            const [creating,        setCreating]        = useState(false);
            const [joining,         setJoining]         = useState(false);
            const [showGroupSheet,  setShowGroupSheet]  = useState(false);
            const [customSubjects,  setCustomSubjects]  = useState([]);
            const [showAddSubject,  setShowAddSubject]  = useState(false);
            const [newSubjectName,  setNewSubjectName]  = useState('');
            const [newSubjectIcon,  setNewSubjectIcon]  = useState('📌');
            const [newSubjectColor, setNewSubjectColor] = useState('#6366f1');
            const [addingSubject,   setAddingSubject]   = useState(false);
            const sessionStartRef = useRef(null);
            const isLocalAdmin = currentUser?.uid === 'local-admin';
            const today = new Date().toISOString().split('T')[0];

            // 타이머 인터벌 (일시 정지 상태에서는 멈춤)
            useEffect(() => {
                let iv;
                if (isTimerOn && !isPaused) iv = setInterval(() => setTimerSec(p => p + 1), 1000);
                return () => clearInterval(iv);
            }, [isTimerOn, isPaused]);

            // 오늘 세션 로드
            useEffect(() => {
                if (isLocalAdmin || !currentUser) return;
                db.collection('users').doc(currentUser.uid).collection('studySessions')
                    .where('date', '==', today).orderBy('createdAt', 'desc').get()
                    .then(snap => setTodaySessions(snap.docs.map(d => ({ id: d.id, ...d.data() }))))
                    .catch(() => {});
            }, [currentUser?.uid]);

            // 히트맵 데이터 로드
            useEffect(() => {
                if (isLocalAdmin || !currentUser) return;
                const startDate = new Date(); startDate.setDate(startDate.getDate() - 182);
                const startStr = startDate.toISOString().split('T')[0];
                db.collection('users').doc(currentUser.uid).collection('studyDays')
                    .where(firebase.firestore.FieldPath.documentId(), '>=', startStr).get()
                    .then(snap => {
                        const data = {};
                        snap.docs.forEach(d => { data[d.id] = d.data().seconds || 0; });
                        setHeatmapData(data);
                    }).catch(() => {});
            }, [currentUser?.uid]);

            // 커스텀 과목 로드
            useEffect(() => {
                if (isLocalAdmin || !currentUser) return;
                db.collection('users').doc(currentUser.uid).get()
                    .then(snap => { if (snap.exists) setCustomSubjects(snap.data().customSubjects || []); })
                    .catch(() => {});
            }, [currentUser?.uid]);

            // 그룹 presence 구독
            useEffect(() => {
                if (!studyGroups.length || isLocalAdmin) return;
                const unsubs = studyGroups.map(g =>
                    db.collection('studyGroups').doc(g.id).collection('presence')
                        .onSnapshot(snap => {
                            const p = {};
                            snap.docs.forEach(d => { p[d.id] = d.data(); });
                            setGroupPresence(prev => ({ ...prev, [g.id]: p }));
                        }, () => {})
                );
                return () => unsubs.forEach(u => u());
            }, [studyGroups.map(g => g.id).join(',')]);

            const fmt = (s) => `${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
            const fmtMin = (s) => { const m = Math.floor(s/60); const h = Math.floor(m/60); return h > 0 ? `${h}시간 ${m%60}분` : `${m}분`; };
            const allSubjects = [...SUBJECTS, ...customSubjects];
            const subjectColor = allSubjects.find(s => s.id === currentSubject)?.color || '#4f6ef7';

            const SUBJECT_COLOR_PRESETS = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];

            const saveCustomSubject = async () => {
                const name = newSubjectName.trim();
                if (!name || addingSubject) return;
                if (allSubjects.find(s => s.id === name)) { alert('이미 있는 과목 이름입니다.'); return; }
                setAddingSubject(true);
                const newSubj = { id: name, icon: newSubjectIcon || '📌', color: newSubjectColor };
                const updated = [...customSubjects, newSubj];
                setCustomSubjects(updated);
                setCurrentSubject(name);
                setShowAddSubject(false);
                setNewSubjectName(''); setNewSubjectIcon('📌'); setNewSubjectColor('#6366f1');
                if (!isLocalAdmin && currentUser) {
                    await db.collection('users').doc(currentUser.uid).update({ customSubjects: updated }).catch(() => {});
                }
                setAddingSubject(false);
            };

            const deleteCustomSubject = async (id) => {
                const updated = customSubjects.filter(s => s.id !== id);
                setCustomSubjects(updated);
                if (currentSubject === id) setCurrentSubject(SUBJECTS[0].id);
                if (!isLocalAdmin && currentUser) {
                    await db.collection('users').doc(currentUser.uid).update({ customSubjects: updated }).catch(() => {});
                }
            };

            const AddSubjectForm = () => (
                <div style={{padding:'16px', borderRadius:'16px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', marginTop:'10px'}}>
                    <p style={{fontSize:'9px', fontWeight:900, opacity:0.4, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'12px', color:'var(--text)'}}>새 과목 추가</p>
                    <div style={{display:'flex', gap:'8px', marginBottom:'10px'}}>
                        <KorInput value={newSubjectIcon} onChange={e=>setNewSubjectIcon(e.target.value)} placeholder="😀" maxLength={2}
                            style={{width:'52px', textAlign:'center', fontSize:'20px', padding:'6px', borderRadius:'10px', flexShrink:0}} />
                        <KorInput autoFocus value={newSubjectName} onChange={e=>setNewSubjectName(e.target.value)}
                            onKeyDown={e=>e.key==='Enter'&&saveCustomSubject()} placeholder="과목 이름" style={{flex:1}} />
                    </div>
                    <div style={{display:'flex', gap:'6px', flexWrap:'wrap', marginBottom:'12px'}}>
                        {SUBJECT_COLOR_PRESETS.map(c => (
                            <button key={c} onClick={()=>setNewSubjectColor(c)}
                                style={{width:'24px', height:'24px', borderRadius:'50%', background:c, border:newSubjectColor===c?`3px solid var(--text)`:'2px solid transparent', cursor:'pointer', transition:'transform 0.1s', transform:newSubjectColor===c?'scale(1.2)':'scale(1)'}} />
                        ))}
                    </div>
                    <div style={{display:'flex', gap:'8px'}}>
                        <button onClick={()=>{setShowAddSubject(false);setNewSubjectName('');}}
                            style={{flex:1,padding:'8px',borderRadius:'12px',border:'1.5px solid var(--glass-border)',background:'var(--glass-bg2)',cursor:'pointer',fontSize:'11px',fontWeight:800,color:'var(--text-sub)',fontFamily:'Pretendard,sans-serif'}}>취소</button>
                        <button onClick={saveCustomSubject} disabled={!newSubjectName.trim()||addingSubject}
                            className="btn-primary" style={{flex:1,padding:'8px',fontSize:'11px',opacity:!newSubjectName.trim()?0.4:1}}>
                            {addingSubject?'저장 중..':'추가'}
                        </button>
                    </div>
                </div>
            );

            const startTimer = async () => {
                sessionStartRef.current = new Date();
                setTimerSec(0); setIsTimerOn(true); setIsPaused(false);
                setBtnKey(k => k + 1); // 버튼 재마운트 → 분리 애니메이션 재생
                await onStudyStart(currentSubject);
            };

            const pauseTimer = () => setIsPaused(true);
            const resumeTimer = () => setIsPaused(false);

            const handleStopClick = () => {
                if (isStopping) return;
                setIsStopping(true);
                // stopTimer() is called by onAnimationEnd on right button
            };

            const stopTimer = async () => {
                setIsTimerOn(false); setIsPaused(false); setIsStopping(false);
                const dur = timerSec;
                if (dur < 5) { setTimerSec(0); return; }
                const startStr = sessionStartRef.current?.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'}) || '';
                const session = { id: String(Date.now()), subject: currentSubject, duration: dur, date: today, startTime: startStr };
                setTodaySessions(prev => [session, ...prev]);
                setHeatmapData(prev => ({ ...prev, [today]: (prev[today] || 0) + dur }));
                setTimerSec(0);
                await onStudyStop(currentSubject, dur, today);
            };

            const forceAddTime = async () => {
                const min = parseInt(forceMinutes, 10);
                if (!min || min <= 0) return;
                const dur = min * 60;
                const startStr = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
                const session = { id: String(Date.now()), subject: forceSubject, duration: dur, date: today, startTime: startStr };
                setTodaySessions(prev => [session, ...prev]);
                setHeatmapData(prev => ({ ...prev, [today]: (prev[today] || 0) + dur }));
                setForceMinutes('');
                await onStudyStop(forceSubject, dur, today);
            };

            const createGroup = async () => {
                if (!newGroupName.trim() || creating) return;
                setCreating(true); await onCreateGroup(newGroupName.trim());
                setCreating(false); setNewGroupName(''); setShowCreate(false);
            };

            const joinGroup = async () => {
                if (!joinCode.trim() || joining) return;
                setJoining(true); await onJoinGroup(joinCode.trim());
                setJoining(false); setJoinCode(''); setShowJoin(false);
            };

            // ── 공통 그룹 패널 (모바일 sheet + 데스크톱 사이드) ──────────────
            const GroupPanel = () => (<>
                {/* 그룹 액션 */}
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'8px'}}>
                    <button onClick={()=>{setShowCreate(true);setShowJoin(false);}} className="btn-primary" style={{padding:'10px', fontSize:'11px', fontWeight:900}}>+ 만들기</button>
                    <button onClick={()=>{setShowJoin(true);setShowCreate(false);}} style={{padding:'10px', borderRadius:'14px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', fontSize:'11px', fontWeight:900, color:'var(--text-sub)', fontFamily:'Pretendard,sans-serif'}}>코드 참여</button>
                </div>
                {showCreate && (
                    <div className="glass-card" style={{padding:'16px', marginBottom:'8px'}}>
                        <p style={{fontSize:'9px',fontWeight:900,opacity:0.4,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:'10px',color:'var(--text)'}}>새 그룹 이름</p>
                        <KorInput autoFocus value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createGroup()} placeholder="그룹 이름" style={{width:'100%', marginBottom:'10px'}} />
                        <div style={{display:'flex', gap:'8px'}}>
                            <button onClick={()=>setShowCreate(false)} style={{flex:1,padding:'8px',borderRadius:'12px',border:'1.5px solid var(--glass-border)',background:'var(--glass-bg2)',cursor:'pointer',fontSize:'11px',fontWeight:800,color:'var(--text-sub)',fontFamily:'Pretendard,sans-serif'}}>취소</button>
                            <button onClick={createGroup} disabled={creating||!newGroupName.trim()} className="btn-primary" style={{flex:1,padding:'8px',fontSize:'11px',opacity:!newGroupName.trim()?0.4:1}}>{creating?'..':'만들기'}</button>
                        </div>
                    </div>
                )}
                {showJoin && (
                    <div className="glass-card" style={{padding:'16px', marginBottom:'8px'}}>
                        <p style={{fontSize:'9px',fontWeight:900,opacity:0.4,textTransform:'uppercase',letterSpacing:'0.15em',marginBottom:'10px',color:'var(--text)'}}>참여 코드 (6자리)</p>
                        <KorInput autoFocus value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&joinGroup()} placeholder="XXXXXX" style={{width:'100%', marginBottom:'10px', fontFamily:'monospace', letterSpacing:'0.25em', textAlign:'center'}} />
                        <div style={{display:'flex', gap:'8px'}}>
                            <button onClick={()=>setShowJoin(false)} style={{flex:1,padding:'8px',borderRadius:'12px',border:'1.5px solid var(--glass-border)',background:'var(--glass-bg2)',cursor:'pointer',fontSize:'11px',fontWeight:800,color:'var(--text-sub)',fontFamily:'Pretendard,sans-serif'}}>취소</button>
                            <button onClick={joinGroup} disabled={joining||!joinCode.trim()} className="btn-primary" style={{flex:1,padding:'8px',fontSize:'11px',opacity:!joinCode.trim()?0.4:1}}>{joining?'..':'참여'}</button>
                        </div>
                    </div>
                )}
                {studyGroups.length === 0 ? (
                    <div className="glass-card" style={{padding:'32px', textAlign:'center'}}>
                        <div style={{fontSize:'36px', marginBottom:'10px'}}>👥</div>
                        <div style={{fontSize:'11px', fontWeight:700, opacity:0.25, textTransform:'uppercase', letterSpacing:'0.1em'}}>참여한 그룹이 없습니다</div>
                    </div>
                ) : studyGroups.map(group => {
                    const presence = groupPresence[group.id] || {};
                    const memberList = Object.entries(group.memberData || {});
                    const studyingCount = memberList.filter(([uid]) => presence[uid]?.isStudying).length;
                    return (
                        <div key={group.id} className="glass-card" style={{padding:'18px', marginBottom:'8px'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'4px'}}>
                                <div>
                                    <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                                        <div style={{fontSize:'14px', fontWeight:900, color:'var(--text)'}}>{group.name}</div>
                                        {group.ownerUid === currentUser?.uid && <span style={{fontSize:'9px', fontWeight:900, padding:'2px 7px', borderRadius:'99px', background:'rgba(251,191,36,0.15)', color:'#f59e0b', border:'1px solid rgba(251,191,36,0.3)'}}>방장</span>}
                                    </div>
                                    <div style={{display:'flex', alignItems:'center', gap:'8px', marginTop:'4px'}}>
                                        <span style={{fontSize:'10px', fontWeight:800, color:'var(--accent)', fontFamily:'monospace', letterSpacing:'0.15em'}}>코드: {group.code}</span>
                                        {studyingCount > 0 && <span style={{fontSize:'10px', fontWeight:800, color:'#22c55e'}}>🟢 {studyingCount}명 공부 중</span>}
                                    </div>
                                </div>
                                <button onClick={()=>onLeaveGroup(group.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'10px',fontWeight:800,color:'var(--text-sub)',opacity:0.35,fontFamily:'Pretendard,sans-serif',padding:'0'}} onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.35'}>나가기</button>
                            </div>
                            <div style={{height:'1px', background:'var(--glass-border)', margin:'12px 0'}}></div>
                            <div style={{display:'flex', flexDirection:'column', gap:'6px'}}>
                                {memberList.map(([uid, member]) => {
                                    const p = presence[uid];
                                    const studying = p?.isStudying;
                                    const sc = allSubjects.find(s => s.id === p?.subject);
                                    const isMe = uid === currentUser?.uid;
                                    const isOwner = uid === group.ownerUid;
                                    const amOwner = currentUser?.uid === group.ownerUid;
                                    return (
                                        <div key={uid} style={{display:'flex', alignItems:'center', gap:'10px', padding:'8px 10px', borderRadius:'12px', background:'var(--glass-bg2)', border: isMe ? '1px solid rgba(79,110,247,0.2)' : 'none'}}>
                                            <div style={{width:'8px', height:'8px', borderRadius:'50%', background:studying?'#22c55e':'var(--text-sub)', opacity:studying?1:0.2, flexShrink:0, boxShadow:studying?'0 0 8px #22c55e':'none', transition:'all 0.3s'}}></div>
                                            <div style={{flex:1, minWidth:0}}>
                                                <div style={{fontSize:'12px', fontWeight:800, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:'5px'}}>
                                                    {member.name || member.id}
                                                    {isMe && <span style={{fontSize:'9px',opacity:0.4}}>나</span>}
                                                    {isOwner && <span style={{fontSize:'8px', fontWeight:900, padding:'1px 5px', borderRadius:'99px', background:'rgba(251,191,36,0.15)', color:'#f59e0b'}}>방장</span>}
                                                </div>
                                                {studying && p.subject && <div style={{fontSize:'10px', fontWeight:700, color:sc?.color||'var(--accent)', marginTop:'1px'}}>{p.subject} 공부 중</div>}
                                            </div>
                                            {(p?.todaySeconds > 0) && <span style={{fontSize:'10px', fontWeight:800, opacity:0.4, flexShrink:0}}>{Math.floor(p.todaySeconds/60)}분</span>}
                                            {amOwner && !isMe && (
                                                <button onClick={()=>{ if(window.confirm(`${member.name||member.id}님을 내보내시겠습니까?`)) onKickMember(group.id, uid); }}
                                                    style={{flexShrink:0, background:'none', border:'none', cursor:'pointer', fontSize:'11px', fontWeight:800, color:'#ef4444', opacity:0.4, fontFamily:'Pretendard,sans-serif', padding:'2px 4px'}}
                                                    onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.4'}>내보내기</button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                })}
            </>);

            // ── 모바일 레이아웃 (열품타 스타일) ─────────────────────────────────
            if (isMobileUI) return (
                <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:'calc(100dvh - 120px)', position:'relative'}}>

                    {/* 상태 텍스트 */}
                    <div style={{textAlign:'center', paddingTop:'28px', paddingBottom:'8px'}}>
                        <div style={{
                            display:'inline-flex', alignItems:'center', gap:'8px',
                            padding:'6px 18px', borderRadius:'99px',
                            background: isTimerOn ? (isPaused ? 'rgba(245,158,11,0.15)' : `${subjectColor}22`) : 'var(--glass-bg2)',
                            border: `1.5px solid ${isTimerOn ? (isPaused ? '#f59e0b44' : subjectColor+'44') : 'var(--glass-border)'}`,
                        }}>
                            <div style={{width:'7px', height:'7px', borderRadius:'50%', background: isTimerOn ? (isPaused ? '#f59e0b' : subjectColor) : 'var(--text-sub)', opacity: isTimerOn ? 1 : 0.3, boxShadow: isTimerOn && !isPaused ? `0 0 10px ${subjectColor}` : 'none', animation: isTimerOn && !isPaused ? 'timerPulse 2s ease infinite' : 'none'}}></div>
                            <span style={{fontSize:'12px', fontWeight:800, color: isTimerOn ? (isPaused ? '#f59e0b' : subjectColor) : 'var(--text-sub)', letterSpacing:'0.04em'}}>
                                {isTimerOn ? (isPaused ? '일시 정지' : `${currentSubject} 공부 중`) : '공부 준비'}
                            </span>
                        </div>
                    </div>

                    {/* 중앙 타이머 */}
                    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'12px'}}>
                        <div style={{fontSize:'76px', fontWeight:900, letterSpacing:'-3px', color: isTimerOn ? (isPaused ? '#f59e0b' : subjectColor) : 'var(--text)', fontVariantNumeric:'tabular-nums', lineHeight:1, animation: isTimerOn && !isPaused ? 'timerPulse 2s ease infinite' : 'none', transition:'color 0.4s'}}>
                            {fmt(timerSec)}
                        </div>
                        <div style={{fontSize:'12px', fontWeight:700, opacity:0.35, color:'var(--text)'}}>
                            오늘 누적 {fmtMin(studyTime + (isTimerOn ? timerSec : 0))}
                        </div>

                        {/* 오늘 세션 요약 (최근 3개) */}
                        {todaySessions.length > 0 && (
                            <div style={{display:'flex', gap:'6px', flexWrap:'wrap', justifyContent:'center', marginTop:'8px', maxWidth:'320px'}}>
                                {todaySessions.slice(0,3).map((s,i) => {
                                    const sc = allSubjects.find(x=>x.id===s.subject);
                                    return (
                                        <div key={s.id||i} style={{display:'flex', alignItems:'center', gap:'6px', padding:'5px 12px', borderRadius:'99px', background:'var(--glass-bg2)', border:'1px solid var(--glass-border)'}}>
                                            <div style={{width:'6px',height:'6px',borderRadius:'50%',background:sc?.color||'var(--accent)',flexShrink:0}}></div>
                                            <span style={{fontSize:'11px',fontWeight:800,color:'var(--text-sub)'}}>{s.subject}</span>
                                            <span style={{fontSize:'11px',fontWeight:900,color:sc?.color||'var(--accent)',fontVariantNumeric:'tabular-nums'}}>{fmtMin(s.duration||0)}</span>
                                        </div>
                                    );
                                })}
                                {todaySessions.length > 3 && <div style={{padding:'5px 12px', borderRadius:'99px', background:'var(--glass-bg2)', fontSize:'11px', fontWeight:700, opacity:0.4}}>+{todaySessions.length-3}</div>}
                            </div>
                        )}

                        {/* 관리자 시간 강제 추가 */}
                        {currentUser?.role === '관리자' && !isTimerOn && (
                            <div style={{marginTop:'8px', padding:'12px 16px', borderRadius:'16px', border:'1px dashed rgba(251,191,36,0.35)', background:'rgba(251,191,36,0.05)', width:'100%', maxWidth:'320px'}}>
                                <p style={{fontSize:'9px', fontWeight:900, color:'#f59e0b', textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'10px'}}>👑 관리자 — 공부 시간 추가</p>
                                <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
                                    <select value={forceSubject} onChange={e=>setForceSubject(e.target.value)} style={{flex:'0 0 auto', padding:'8px 10px', borderRadius:'10px', background:'var(--glass-bg2)', border:'1.5px solid var(--glass-border)', color:'var(--text)', fontFamily:'Pretendard,sans-serif', fontWeight:800, fontSize:'11px', cursor:'pointer'}}>
                                        {allSubjects.map(s => <option key={s.id} value={s.id}>{s.icon} {s.id}</option>)}
                                    </select>
