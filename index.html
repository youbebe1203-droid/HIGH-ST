        // ─── AuthPage ────────────────────────────────────────────────────────

        function AuthPage({ onGoogleLogin, onAdminLogin }) {
            const [loading,     setLoading]     = useState(false);
            const [logoClicks,  setLogoClicks]  = useState(0);
            const [showAdmin,   setShowAdmin]   = useState(false);
            const [adminPw,     setAdminPw]     = useState('');

            const clickLogo = () => {
                const next = logoClicks + 1;
                setLogoClicks(next);
                if (next >= 7) { setShowAdmin(true); setLogoClicks(0); }
            };

            const google = async () => {
                setLoading(true);
                await onGoogleLogin();
                setLoading(false);
            };

            return (
                <div style={{height:'100vh', width:'100vw', background:'linear-gradient(145deg, #02040e 0%, #060110 50%, #020309 100%)', display:'flex', alignItems:'center', justifyContent:'center', padding:'20px', overflow:'hidden', position:'relative'}}>
                    <AuroraBackground />

                    <div className="anim-scale-in" style={{background:'rgba(255,255,255,0.05)', backdropFilter:'blur(40px) saturate(180%)', WebkitBackdropFilter:'blur(40px) saturate(180%)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'36px', padding:'44px 48px', width:'100%', maxWidth:'400px', textAlign:'center', boxShadow:'0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1)', position:'relative', zIndex:1}}>

                        {/* 로고 */}
                        <div onClick={clickLogo} style={{cursor:'default', userSelect:'none'}}>
                            <div style={{fontSize:'40px', fontWeight:900, letterSpacing:'-1.5px', color:'#fff', marginBottom:'6px', animation:'fadeInUp 0.5s ease both'}}>
                                HIGH.<span style={{color:'#60a5fa'}}>ST</span>
                            </div>
                            <p style={{fontSize:'10px', fontWeight:800, color:'rgba(96,165,250,0.6)', textTransform:'uppercase', letterSpacing:'0.3em', marginBottom:'36px', animation:'fadeInUp 0.5s ease 0.1s both'}}>
                                Next-Gen Learning OS
                            </p>
                        </div>

                        {/* Google 로그인 버튼 */}
                        <button onClick={google} disabled={loading}
                            style={{width:'100%', padding:'15px 20px', borderRadius:'18px', border:'1.5px solid rgba(255,255,255,0.15)', background:'rgba(255,255,255,0.08)', color:'#fff', fontWeight:800, fontSize:'15px', fontFamily:'Pretendard,sans-serif', cursor:loading?'default':'pointer', opacity:loading?0.6:1, display:'flex', alignItems:'center', justifyContent:'center', gap:'12px', transition:'all 0.2s', animation:'fadeInUp 0.5s ease 0.2s both'}}
                            onMouseEnter={e=>{if(!loading){e.currentTarget.style.background='rgba(255,255,255,0.14)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.28)'; e.currentTarget.style.transform='translateY(-1px)';}}}
                            onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.08)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.15)'; e.currentTarget.style.transform='';}}>
                            {loading ? (
                                <span style={{opacity:0.6}}>연결 중...</span>
                            ) : (<>
                                <svg width="20" height="20" viewBox="0 0 48 48">
                                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                                </svg>
                                Google로 계속하기
                            </>)}
                        </button>

                        <p style={{marginTop:'20px', fontSize:'10px', fontWeight:600, color:'rgba(255,255,255,0.2)', lineHeight:1.6, animation:'fadeInUp 0.5s ease 0.3s both'}}>
                            Google 계정으로 로그인하면<br/>이용약관 및 개인정보처리방침에 동의하게 됩니다
                        </p>

                        {/* 관리자 숨김 패널 (로고 7번 클릭) */}
                        {showAdmin && (
                            <div style={{marginTop:'20px', paddingTop:'20px', borderTop:'1px solid rgba(255,255,255,0.08)'}}>
                                <KorInput type="password" value={adminPw} onChange={e=>setAdminPw(e.target.value)}
                                    onKeyDown={e=>{ if(e.key==='Enter' && adminPw==='admin1234!') onAdminLogin(); }}
                                    placeholder="관리자 코드"
                                    style={{width:'100%', background:'rgba(255,255,255,0.06)', border:'1.5px solid rgba(255,255,255,0.1)', color:'#fff', borderRadius:'12px', padding:'11px 16px', fontSize:'13px', fontWeight:700, fontFamily:'Pretendard,sans-serif', outline:'none', textAlign:'center'}} />
                                <button onClick={()=>{ if(adminPw==='admin1234!') onAdminLogin(); }}
                                    style={{width:'100%', marginTop:'8px', padding:'11px', borderRadius:'12px', border:'none', background:'rgba(251,191,36,0.15)', color:'#fbbf24', fontWeight:800, fontSize:'12px', fontFamily:'Pretendard,sans-serif', cursor:'pointer'}}>
                                    관리자 로그인
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ─── SetupPage (Google 로그인 후 최초 1회) ───────────────────────────

        function SetupPage({ info, onSetup, onCancel }) {
            const [id,       setId]       = useState('');
            const [name,     setName]     = useState(info.googleName || '');
            const [idError,  setIdError]  = useState('');
            const [submitting, setSubmitting] = useState(false);

            const validate = (v) => /^[a-zA-Z0-9_]{3,20}$/.test(v);

            const submit = async () => {
                if (!validate(id)) { setIdError('3~20자 영문·숫자·_ 만 사용 가능합니다'); return; }
                if (!name.trim())  { setIdError('닉네임을 입력해 주세요'); return; }
                setSubmitting(true);
                const result = await onSetup(id.trim(), name.trim());
                if (result === 'duplicate') { setIdError('이미 사용 중인 ID입니다'); }
                setSubmitting(false);
            };

            return (
                <div style={{height:'100vh', width:'100vw', background:'linear-gradient(145deg, #02040e 0%, #060110 50%, #020309 100%)', display:'flex', alignItems:'center', justifyContent:'center', padding:'20px', overflow:'hidden', position:'relative'}}>
                    <AuroraBackground />

                    <div className="anim-scale-in" style={{background:'rgba(255,255,255,0.05)', backdropFilter:'blur(40px) saturate(180%)', WebkitBackdropFilter:'blur(40px) saturate(180%)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'36px', padding:'40px 44px', width:'100%', maxWidth:'420px', boxShadow:'0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1)', position:'relative', zIndex:1}}>

                        <div style={{fontSize:'32px', marginBottom:'8px', textAlign:'center'}}>👋</div>
                        <h2 style={{fontSize:'22px', fontWeight:900, color:'#fff', textAlign:'center', marginBottom:'6px', letterSpacing:'-0.5px'}}>프로필 설정</h2>
                        <p style={{fontSize:'12px', fontWeight:600, color:'rgba(255,255,255,0.35)', textAlign:'center', marginBottom:'32px', lineHeight:1.6}}>
                            HIGH.ST에서 사용할 ID와 닉네임을 설정하세요.<br/>
                            <span style={{color:'rgba(96,165,250,0.7)'}}>ID는 한 번 설정하면 변경할 수 없습니다.</span>
                        </p>

                        <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
                            {/* ID 입력 */}
                            <div>
                                <p style={{fontSize:'10px', fontWeight:800, color:'rgba(96,165,250,0.7)', textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'7px'}}>ID (영문·숫자·_ / 변경불가)</p>
                                <KorInput value={id} onChange={e=>{ setId(e.target.value); setIdError(''); }}
                                    onKeyDown={e=>{ if(e.key==='Enter') submit(); }}
                                    placeholder="예: hong_gildong"
                                    style={{width:'100%', background:'rgba(255,255,255,0.06)', border:`1.5px solid ${idError ? '#ef4444' : 'rgba(255,255,255,0.1)'}`, color:'#fff', borderRadius:'16px', padding:'13px 18px', fontSize:'14px', fontWeight:700, fontFamily:'Pretendard,sans-serif', outline:'none'}}
                                    onFocus={e=>{e.target.style.borderColor='rgba(96,165,250,0.5)'; e.target.style.boxShadow='0 0 0 3px rgba(96,165,250,0.1)';}}
                                    onBlur={e=>{e.target.style.borderColor=idError?'#ef4444':'rgba(255,255,255,0.1)'; e.target.style.boxShadow='none';}} />
                                {idError && <p style={{fontSize:'11px', fontWeight:700, color:'#ef4444', marginTop:'6px', paddingLeft:'4px'}}>{idError}</p>}
                            </div>

                            {/* 닉네임 입력 */}
                            <div>
                                <p style={{fontSize:'10px', fontWeight:800, color:'rgba(96,165,250,0.7)', textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'7px'}}>닉네임 (언제든 변경 가능)</p>
                                <KorInput value={name} onChange={e=>setName(e.target.value)}
                                    onKeyDown={e=>{ if(e.key==='Enter') submit(); }}
                                    placeholder="표시될 이름"
                                    style={{width:'100%', background:'rgba(255,255,255,0.06)', border:'1.5px solid rgba(255,255,255,0.1)', color:'#fff', borderRadius:'16px', padding:'13px 18px', fontSize:'14px', fontWeight:700, fontFamily:'Pretendard,sans-serif', outline:'none'}}
                                    onFocus={e=>{e.target.style.borderColor='rgba(96,165,250,0.5)'; e.target.style.boxShadow='0 0 0 3px rgba(96,165,250,0.1)';}}
                                    onBlur={e=>{e.target.style.borderColor='rgba(255,255,255,0.1)'; e.target.style.boxShadow='none';}} />
                            </div>

                            <button onClick={submit} disabled={submitting || !id || !name.trim()}
                                style={{width:'100%', padding:'15px', borderRadius:'18px', border:'none', marginTop:'4px', background:'linear-gradient(135deg, #3b82f6, #6366f1)', color:'#fff', fontWeight:900, fontSize:'15px', fontFamily:'Pretendard,sans-serif', cursor:(submitting||!id||!name.trim())?'default':'pointer', opacity:(submitting||!id||!name.trim())?0.4:1, boxShadow:'0 6px 24px rgba(59,130,246,0.4)', transition:'all 0.2s'}}>
                                {submitting ? '설정 중...' : '시작하기 →'}
                            </button>

                            <button onClick={onCancel}
                                style={{background:'none', border:'none', cursor:'pointer', color:'rgba(255,255,255,0.25)', fontSize:'12px', fontWeight:700, fontFamily:'Pretendard,sans-serif', padding:'4px'}}>
                                다른 계정으로 로그인
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── 앱 마운트 ───────────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
