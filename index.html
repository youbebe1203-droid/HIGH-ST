                            </div>
                            <button onClick={()=>{ if(window.confirm('그룹에서 나가시겠습니까?')) onLeaveGroup(); }}
                                style={{width:'100%', padding:'10px', borderRadius:'12px', border:'1px solid rgba(239,68,68,0.3)', background:'rgba(239,68,68,0.06)', cursor:'pointer', fontSize:'12px', fontWeight:800, color:'#ef4444', fontFamily:'Pretendard,sans-serif'}}>
                                그룹 나가기
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── ResourceView ────────────────────────────────────────────────────

        const RESOURCE_SUBJECTS = [
            '언매','화작','심화국어','영어회화','영독작','영어권문화',
            '미적분','경제수학','심화수학I',
            '물리학II','화학II','생명과학II','지구과학II',
            '물리 실험','생명과학 실험','지구과학 실험','과학과제연구',
            '윤리와사상','정치와법','사회문제탐구','교육학','체육탐구',
            '음악감상과 비평','미술창작','연극',
            '인공지능 기초','프로그래밍','논술','일본어II','중국문화',
        ];

        function SubjectPicker({ value, onChange }) {
            const [open, setOpen]   = useState(false);
            const [query, setQuery] = useState('');
            const ref = useRef(null);
            useEffect(() => {
                if (!open) return;
                const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', h);
                return () => document.removeEventListener('mousedown', h);
            }, [open]);
            const filtered = RESOURCE_SUBJECTS.filter(s => s.includes(query));
            return (
                <div style={{position:'relative'}} ref={ref}>
                    <button onClick={()=>{ setOpen(o=>!o); setQuery(''); }}
                        style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'8px',
                            width:'100%', height:'46px', padding:'0 14px',
                            background:'var(--glass-bg2)', border:'1.5px solid var(--glass-border)',
                            borderRadius:'12px', color:'var(--text)', fontSize:'13px', fontWeight:700,
                            cursor:'pointer', fontFamily:'Pretendard,sans-serif'}}>
                        <span>{value}</span>
                        <span style={{opacity:0.4, fontSize:'10px'}}>{open ? '▲' : '▼'}</span>
                    </button>
                    {open && (
                        <div style={{position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:300,
                            background:'var(--glass-bg)', backdropFilter:'blur(32px) saturate(180%)',
                            border:'1px solid var(--glass-border)',
                            borderRadius:'16px', padding:'10px', width:'240px',
                            boxShadow:'0 16px 40px rgba(0,0,0,0.25)'}}>
                            <KorInput value={query} onChange={e=>setQuery(e.target.value)}
                                placeholder="과목 검색..."
                                style={{width:'100%', background:'var(--glass-bg2)', border:'1px solid var(--glass-border)',
                                    borderRadius:'8px', color:'var(--text)', fontSize:'12px',
                                    padding:'7px 10px', marginBottom:'8px', boxSizing:'border-box'}} />
                            <div style={{maxHeight:'220px', overflowY:'auto', display:'flex', flexWrap:'wrap', gap:'5px'}}>
                                {filtered.map(s => (
                                    <button key={s} onClick={()=>{ onChange(s); setOpen(false); setQuery(''); }}
                                        style={{padding:'5px 10px', borderRadius:'8px', fontSize:'12px', fontWeight:700,
                                            border: value===s ? '1px solid var(--accent)' : '1px solid var(--glass-border)',
                                            background: value===s ? 'rgba(79,110,247,0.15)' : 'var(--glass-bg2)',
                                            color: value===s ? 'var(--accent)' : 'var(--text)',
                                            cursor:'pointer', fontFamily:'Pretendard,sans-serif', whiteSpace:'nowrap'}}>
                                        {s}
                                    </button>
                                ))}
                                {filtered.length === 0 && <span style={{fontSize:'11px', opacity:0.3, padding:'4px', color:'var(--text)'}}>결과 없음</span>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ResourceView({ resources, currentUser, onAdd }) {
            const [mode,     setMode]     = useState('list');   // 'list' | 'write' | 'detail'
            const [selected, setSelected] = useState(null);
            const [filterSub, setFilterSub] = useState('전체');
            const [submitting, setSubmitting] = useState(false);

            // write state
            const [wTitle,   setWTitle]   = useState('');
            const [wSubject, setWSubject] = useState(RESOURCE_SUBJECTS[0]);
            const [wDesc,    setWDesc]    = useState('');
            const [wFiles,   setWFiles]   = useState([]);       // File[]
            const fileRef = useRef(null);

            const submit = async () => {
                if (!wTitle.trim()) return;
                setSubmitting(true);
                try {
                    await onAdd(wTitle.trim(), wSubject, wDesc.trim(), wFiles);
                    setWTitle(''); setWDesc(''); setWFiles([]);
                    if (fileRef.current) fileRef.current.value = '';
                    setMode('list');
                } finally { setSubmitting(false); }
            };

            const openDetail = (r) => { setSelected(r); setMode('detail'); };

            const allSubjects = ['전체', ...RESOURCE_SUBJECTS.filter(s => resources.some(r => r.subject === s))];
            const filtered = filterSub === '전체' ? resources : resources.filter(r => r.subject === filterSub);

            /* ── Detail ── */
            if (mode === 'detail' && selected) return (
                <div className="anim-fade-up" style={{maxWidth:'760px', margin:'0 auto'}}>
                    <button onClick={()=>setMode('list')}
                        style={{background:'none', border:'none', cursor:'pointer', color:'var(--accent)', fontWeight:800, fontSize:'13px', fontFamily:'Pretendard,sans-serif', marginBottom:'16px', padding:'0'}}>
                        ← 목록으로
                    </button>
                    <div className="glass-card-lg" style={{padding:'32px 36px'}}>
                        {/* 헤더 */}
                        <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'20px'}}>
                            <span style={{padding:'4px 12px', borderRadius:'99px', background:'rgba(79,110,247,0.15)', border:'1px solid rgba(79,110,247,0.3)', fontSize:'11px', fontWeight:800, color:'var(--accent)'}}>
                                📚 {selected.subject}
                            </span>
                        </div>
                        <h2 style={{fontSize:'22px', fontWeight:900, color:'var(--text)', letterSpacing:'-0.3px', marginBottom:'12px', lineHeight:1.35}}>{selected.title}</h2>
                        <div style={{display:'flex', gap:'16px', marginBottom:'24px', paddingBottom:'20px', borderBottom:'1px solid var(--glass-border)'}}>
                            <span style={{fontSize:'11px', fontWeight:700, opacity:0.45}}>{selected.authorName}</span>
                            <span style={{fontSize:'11px', fontWeight:700, opacity:0.35}}>{selected.date} {selected.time}</span>
                        </div>

                        {/* 설명 */}
                        {selected.description && (
                            <p style={{fontSize:'15px', fontWeight:600, lineHeight:1.8, color:'var(--text)', opacity:0.85, whiteSpace:'pre-wrap', marginBottom:'28px'}}>{selected.description}</p>
                        )}

                        {/* 첨부 파일 목록 */}
                        <div>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'12px', color:'var(--text)'}}>
                                첨부 파일 {(selected.files||[]).length}개
                            </p>
                            {(selected.files||[]).length === 0 && (
                                <p style={{fontSize:'12px', fontWeight:700, opacity:0.25}}>첨부된 파일이 없습니다.</p>
                            )}
                            <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                                {(selected.files||[]).map((f,i) => (
                                    <div key={i} style={{display:'flex', alignItems:'center', justifyContent:'space-between',
                                        padding:'12px 16px', borderRadius:'14px',
                                        background:'var(--glass-bg2)', border:'1px solid var(--glass-border)'}}>
                                        <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                            <span style={{fontSize:'18px'}}>📄</span>
                                            <span style={{fontSize:'13px', fontWeight:700, color:'var(--text)'}}>{f.fileName}</span>
                                        </div>
                                        {f.downloadURL
                                            ? <a href={f.downloadURL} target="_blank" rel="noreferrer" download={f.fileName}
                                                style={{padding:'7px 16px', borderRadius:'10px', background:'var(--accent)',
                                                    color:'#fff', fontSize:'12px', fontWeight:800, textDecoration:'none',
                                                    flexShrink:0}}>
                                                ⬇ 다운로드
                                              </a>
                                            : <span style={{fontSize:'11px', fontWeight:700, opacity:0.3}}>미리보기 불가</span>
                                        }
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            /* ── Write ── */
            if (mode === 'write') return (
                <div className="anim-fade-up" style={{maxWidth:'760px', margin:'0 auto'}}>
                    <button onClick={()=>setMode('list')}
                        style={{background:'none', border:'none', cursor:'pointer', color:'var(--accent)', fontWeight:800, fontSize:'13px', fontFamily:'Pretendard,sans-serif', marginBottom:'16px', padding:'0'}}>
                        ← 취소
                    </button>
                    <div className="glass-card-lg" style={{padding:'32px 36px'}}>
                        <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', marginBottom:'24px'}}>📤 자료 게시</h3>

                        {/* 과목 선택 */}
                        <div style={{marginBottom:'20px'}}>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'8px', color:'var(--text)'}}>Subject</p>
                            <SubjectPicker value={wSubject} onChange={setWSubject} />
                        </div>

                        {/* 제목 */}
                        <div style={{marginBottom:'16px'}}>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'8px', color:'var(--text)'}}>Title</p>
                            <KorInput value={wTitle} onChange={e=>setWTitle(e.target.value)}
                                placeholder="게시물 제목"
                                style={{width:'100%', fontSize:'16px', fontWeight:800}} />
                        </div>

                        {/* 설명 */}
                        <div style={{marginBottom:'20px'}}>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'8px', color:'var(--text)'}}>Description</p>
                            <KorTextarea value={wDesc} onChange={e=>setWDesc(e.target.value)}
                                placeholder="자료에 대한 설명을 입력하세요... (선택)"
                                rows={5}
                                style={{width:'100%', resize:'vertical', fontSize:'14px', fontWeight:600, lineHeight:1.7,
                                    background:'var(--glass-bg2)', border:'1.5px solid var(--glass-border)',
                                    borderRadius:'16px', padding:'16px 18px', color:'var(--text)',
                                    fontFamily:'Pretendard,sans-serif', outline:'none'}}
                                onFocus={e=>{e.target.style.borderColor='var(--accent)'; e.target.style.boxShadow='0 0 0 3px rgba(79,110,247,0.12)';}}
                                onBlur={e=>{e.target.style.borderColor='var(--glass-border)'; e.target.style.boxShadow='none';}}
                            />
                        </div>

                        {/* 파일 첨부 (다중) */}
                        <div style={{marginBottom:'28px'}}>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'8px', color:'var(--text)'}}>Files</p>
                            <label style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'8px',
                                padding:'28px', borderRadius:'16px', border:'2px dashed var(--glass-border)',
                                background:'var(--glass-bg2)', cursor:'pointer', transition:'all 0.15s'}}
                                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)'; e.currentTarget.style.background='rgba(79,110,247,0.06)';}}
                                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--glass-border)'; e.currentTarget.style.background='var(--glass-bg2)';}}>
                                <KorInput type="file" multiple ref={fileRef}
                                    style={{display:'none'}}
                                    onChange={e=>setWFiles(Array.from(e.target.files||[]))} />
                                <span style={{fontSize:'28px'}}>📁</span>
                                <span style={{fontSize:'12px', fontWeight:700, color:'var(--text-sub)', opacity:0.6}}>
                                    {wFiles.length > 0 ? `${wFiles.length}개 파일 선택됨` : '클릭하여 파일 선택 (여러 개 가능)'}
                                </span>
                            </label>
                            {wFiles.length > 0 && (
                                <div style={{marginTop:'10px', display:'flex', flexDirection:'column', gap:'6px'}}>
                                    {wFiles.map((f,i) => (
                                        <div key={i} style={{display:'flex', alignItems:'center', justifyContent:'space-between',
                                            padding:'8px 14px', borderRadius:'10px',
                                            background:'var(--glass-bg2)', border:'1px solid var(--glass-border)', fontSize:'12px', fontWeight:700, color:'var(--text)'}}>
                                            <span>📄 {f.name}</span>
                                            <button onClick={()=>setWFiles(prev=>prev.filter((_,j)=>j!==i))}
                                                style={{background:'none', border:'none', cursor:'pointer', color:'var(--text-sub)', opacity:0.4, fontSize:'14px', fontFamily:'Pretendard,sans-serif'}}>×</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div style={{display:'flex', gap:'10px', justifyContent:'flex-end'}}>
                            <button onClick={()=>setMode('list')}
                                style={{padding:'12px 24px', borderRadius:'16px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', fontSize:'13px', fontWeight:800, color:'var(--text-sub)', fontFamily:'Pretendard,sans-serif'}}>
                                취소
                            </button>
                            <button onClick={submit} disabled={submitting || !wTitle.trim()} className="btn-primary"
                                style={{padding:'12px 32px', opacity: !wTitle.trim() ? 0.4 : 1}}>
                                {submitting ? '업로드 중...' : '게시하기'}
                            </button>
                        </div>
                    </div>
                </div>
            );

            /* ── List ── */
            return (
                <div className="anim-fade-up">
                    {/* 헤더 */}
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                        <div>
                            <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', letterSpacing:'-0.3px'}}>📚 학습 자료실</h3>
                            <p style={{fontSize:'10px', fontWeight:700, opacity:0.3, textTransform:'uppercase', letterSpacing:'0.15em', marginTop:'3px'}}>{resources.length} Posts</p>
                        </div>
                        <button className="btn-primary" onClick={()=>setMode('write')}>+ 자료 올리기</button>
                    </div>

                    {/* 과목 필터 */}
                    <div style={{display:'flex', gap:'7px', marginBottom:'20px', flexWrap:'wrap'}}>
                        {allSubjects.map(s => (
                            <button key={s} onClick={()=>setFilterSub(s)}
                                style={{padding:'6px 14px', borderRadius:'99px',
                                    border: filterSub===s ? '2px solid var(--accent)' : '1.5px solid var(--glass-border)',
                                    background: filterSub===s ? 'rgba(79,110,247,0.15)' : 'var(--glass-bg2)',
                                    cursor:'pointer', fontSize:'11px', fontWeight:800,
                                    color: filterSub===s ? 'var(--accent)' : 'var(--text-sub)',
                                    fontFamily:'Pretendard,sans-serif', transition:'all 0.15s'}}>
                                {s}
                            </button>
                        ))}
                    </div>

                    {/* 게시물 목록 */}
                    <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                        {filtered.map((r,i) => (
                            <div key={r.id} className="glass-card" onClick={()=>openDetail(r)}
                                style={{padding:'20px 24px', cursor:'pointer', transition:'all 0.2s', animation:`fadeInUp 0.3s ease ${i*0.05}s both`}}
                                onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 8px 32px rgba(79,110,247,0.15)';}}
                                onMouseLeave={e=>{e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='';}}>
                                <div style={{display:'flex', alignItems:'flex-start', gap:'14px'}}>
                                    <div style={{width:'42px', height:'42px', borderRadius:'14px', background:'rgba(79,110,247,0.1)',
                                        display:'flex', alignItems:'center', justifyContent:'center', fontSize:'20px', flexShrink:0}}>
                                        📄
                                    </div>
                                    <div style={{flex:1, minWidth:0}}>
                                        <div style={{display:'flex', alignItems:'center', gap:'8px', marginBottom:'6px'}}>
                                            <span style={{padding:'2px 10px', borderRadius:'99px', background:'rgba(79,110,247,0.1)',
                                                fontSize:'10px', fontWeight:800, color:'var(--accent)'}}>
                                                {r.subject}
                                            </span>
                                            {(r.fileCount > 0) && (
                                                <span style={{padding:'2px 10px', borderRadius:'99px', background:'rgba(255,255,255,0.06)',
                                                    fontSize:'10px', fontWeight:800, color:'var(--text-sub)', opacity:0.7}}>
                                                    📎 {r.fileCount}개
                                                </span>
                                            )}
                                        </div>
                                        <div style={{fontSize:'15px', fontWeight:800, color:'var(--text)', marginBottom:'5px',
                                            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                                            {r.title}
                                        </div>
                                        {r.description && (
                                            <div style={{fontSize:'12px', fontWeight:600, opacity:0.5, overflow:'hidden',
                                                textOverflow:'ellipsis', whiteSpace:'nowrap', lineHeight:1.5}}>
                                                {r.description}
                                            </div>
                                        )}
                                        <div style={{display:'flex', gap:'12px', marginTop:'10px'}}>
                                            <span style={{fontSize:'10px', fontWeight:700, opacity:0.4}}>{r.authorName}</span>
                                            <span style={{fontSize:'10px', fontWeight:700, opacity:0.3}}>{r.date}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {filtered.length === 0 && (
                            <div style={{textAlign:'center', padding:'64px', fontSize:'12px', fontWeight:700, opacity:0.2, textTransform:'uppercase', letterSpacing:'0.15em'}}>
                                {filterSub === '전체' ? '공유된 자료가 없습니다' : `${filterSub} 자료가 없습니다`}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ─── MessageView ─────────────────────────────────────────────────────

        function MessageView({ rooms, currentUser, localRoomMessages, onCreateRoom, onSendInRoom, isMobileUI }) {
            const [activeRoom,     setActiveRoom]     = useState(null);
            const [roomMessages,   setRoomMessages]   = useState([]);
            const [msgInput,       setMsgInput]       = useState('');
            const [sending,        setSending]        = useState(false);
            const [showCreate,     setShowCreate]     = useState(false);
            const [createIds,      setCreateIds]      = useState('');
            const [createName,     setCreateName]     = useState('');
            const [creating,       setCreating]       = useState(false);
            const [roomSearch,     setRoomSearch]     = useState('');
            const msgEndRef = useRef(null);
            const inputRef  = useRef(null);

            const isLocalAdmin = currentUser?.uid === 'local-admin';

            // 방 입장 시 메시지 구독
            useEffect(() => {
                if (!activeRoom) return;
                if (isLocalAdmin) {
                    setRoomMessages(localRoomMessages[activeRoom.id] || []);
                    return;
                }
                const unsub = db.collection('rooms').doc(activeRoom.id)
                    .collection('messages').orderBy('createdAt', 'asc')
                    .onSnapshot(snap => setRoomMessages(snap.docs.map(d => ({ id: d.id, ...d.data() }))), () => {});
                return () => unsub();
            }, [activeRoom?.id]);

            // 로컬 어드민: localRoomMessages 변경 반영
            useEffect(() => {
                if (isLocalAdmin && activeRoom) setRoomMessages(localRoomMessages[activeRoom.id] || []);
            }, [localRoomMessages, activeRoom?.id]);

            useEffect(() => { msgEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [roomMessages]);

            // 방 선택 시 입력창 포커스
            useEffect(() => { if (activeRoom) setTimeout(() => inputRef.current?.focus(), 50); }, [activeRoom?.id]);

            const sendMsg = async () => {
                if (!msgInput.trim() || !activeRoom || sending) return;
                setSending(true);
                await onSendInRoom(activeRoom.id, msgInput.trim());
                setMsgInput('');
                setSending(false);
            };

            const createRoom = async () => {
                if (!createIds.trim() || creating) return;
                setCreating(true);
                const roomId = await onCreateRoom(createIds, createName);
                setCreating(false);
                if (roomId) {
                    const found = rooms.find(r => r.id === roomId);
                    setActiveRoom(found || { id: roomId, name: createIds, memberIds: [currentUser.id], isGroup: false });
                    setShowCreate(false); setCreateIds(''); setCreateName('');
                }
            };

            const getRoomName = (room) => {
                if (room.name) return room.name;
                if (room.memberIds) return room.memberIds.filter(id => id !== currentUser.id).join(', ') || room.name;
                return '대화방';
            };

            const getRoomInitial = (room) => {
                const name = getRoomName(room);
                return room.isGroup ? '👥' : name[0]?.toUpperCase() || '?';
            };

            const filteredRooms = rooms.filter(r => getRoomName(r).toLowerCase().includes(roomSearch.toLowerCase()));

            // ── 모바일 레이아웃 (Instagram DM 스타일) ──────────────────────────
            if (isMobileUI) {
                // 새 대화 생성 바텀 시트
                const MobCreateSheet = () => showCreate ? (
                    <div style={{position:'fixed', inset:0, zIndex:60, background:'rgba(0,0,0,0.45)', display:'flex', flexDirection:'column', justifyContent:'flex-end'}}
                        onClick={e=>{ if(e.target===e.currentTarget){ setShowCreate(false); setCreateIds(''); setCreateName(''); } }}>
                        <div onClick={e=>e.stopPropagation()}
                            style={{background:'var(--bg)', borderRadius:'24px 24px 0 0', padding:'20px 20px 40px', overscrollBehavior:'contain', WebkitOverflowScrolling:'touch',
                                boxShadow:'0 -8px 40px rgba(0,0,0,0.3)', animation:'slideUp 0.25s cubic-bezier(0.34,1.4,0.64,1)'}}>
                            <div style={{width:'36px', height:'4px', borderRadius:'99px', background:'var(--glass-border)', margin:'0 auto 20px'}}></div>
                            <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', marginBottom:'4px'}}>새 대화</h3>
                            <p style={{fontSize:'12px', fontWeight:700, opacity:0.35, marginBottom:'24px'}}>ID를 쉼표로 구분해 입력하세요</p>
                            <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
                                <div>
                                    <label style={{fontSize:'9px', fontWeight:900, opacity:0.4, textTransform:'uppercase', letterSpacing:'0.18em', display:'block', marginBottom:'8px', color:'var(--text)'}}>참여자 ID *</label>
                                    <KorInput autoFocus value={createIds} onChange={e=>setCreateIds(e.target.value)}
                                        onKeyDown={e=>e.key==='Enter'&&createRoom()}
                                        placeholder="예: user1 또는 user1, user2"
                                        style={{width:'100%', fontSize:'14px', fontWeight:700}} />
                                </div>
                                <div>
                                    <label style={{fontSize:'9px', fontWeight:900, opacity:0.4, textTransform:'uppercase', letterSpacing:'0.18em', display:'block', marginBottom:'8px', color:'var(--text)'}}>대화방 이름 (선택)</label>
                                    <KorInput value={createName} onChange={e=>setCreateName(e.target.value)}
                                        onKeyDown={e=>e.key==='Enter'&&createRoom()}
                                        placeholder="그룹 이름 (비우면 자동)"
                                        style={{width:'100%', fontSize:'14px', fontWeight:700}} />
                                </div>
                                <div style={{display:'flex', gap:'10px', marginTop:'4px'}}>
                                    <button onClick={()=>{setShowCreate(false);setCreateIds('');setCreateName('');}}
                                        style={{flex:1, padding:'13px', borderRadius:'16px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', fontSize:'13px', fontWeight:800, color:'var(--text-sub)', fontFamily:'Pretendard,sans-serif'}}>취소</button>
                                    <button onClick={createRoom} disabled={creating||!createIds.trim()} className="btn-primary" style={{flex:1, padding:'13px', opacity:!createIds.trim()?0.4:1}}>
                                        {creating ? '생성 중...' : '대화 시작'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                ) : null;

                // ── 채팅 화면 (방 선택됨) ──
                if (activeRoom) return (
                    <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:'calc(100dvh - 120px)'}}>
                        {/* 채팅 헤더 */}
                        <div style={{display:'flex', alignItems:'center', gap:'12px', padding:'14px 16px', borderBottom:'1px solid var(--glass-border)', background:'var(--glass-bg2)', flexShrink:0}}>
                            <button onClick={()=>setActiveRoom(null)}
                                style={{background:'none', border:'none', cursor:'pointer', fontSize:'22px', color:'var(--text)', padding:'0 4px', lineHeight:1, display:'flex', alignItems:'center'}}>‹</button>
                            <div style={{width:'36px', height:'36px', borderRadius:'50%', background:'linear-gradient(135deg, var(--accent), var(--accent2))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'14px', fontWeight:900, color:'#fff', flexShrink:0}}>
                                {getRoomInitial(activeRoom)}
                            </div>
                            <div style={{flex:1, minWidth:0}}>
                                <div style={{fontSize:'15px', fontWeight:900, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{getRoomName(activeRoom)}</div>
                                {activeRoom.memberIds && <div style={{fontSize:'10px', fontWeight:700, opacity:0.35, marginTop:'1px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{activeRoom.memberIds.join(' · ')}</div>}
                            </div>
                        </div>

                        {/* 메시지 영역 */}
                        <div style={{flex:1, overflowY:'auto', padding:'16px', display:'flex', flexDirection:'column', gap:'6px', WebkitOverflowScrolling:'touch'}}>
                            {roomMessages.length === 0 && (
                                <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', fontWeight:700, opacity:0.15, textTransform:'uppercase', letterSpacing:'0.15em'}}>대화를 시작해보세요</div>
                            )}
                            {roomMessages.map((m, i) => {
                                const isMine = m.fromUid === currentUser.uid || m.fromId === currentUser.id;
                                const prevMsg = roomMessages[i-1];
                                const sameAuthor = prevMsg && (prevMsg.fromId === m.fromId);
                                return (
                                    <div key={m.id||i} style={{display:'flex', flexDirection:isMine?'row-reverse':'row', alignItems:'flex-end', gap:'8px', marginTop:sameAuthor?'2px':'12px'}}>
                                        {!isMine && (
                                            <div style={{width:'26px', height:'26px', borderRadius:'50%', background:'var(--glass-bg)', border:'1px solid var(--glass-border)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'10px', fontWeight:900, flexShrink:0, opacity:sameAuthor?0:1}}>
                                                {m.fromName?.[0]||'?'}
                                            </div>
                                        )}
                                        <div style={{display:'flex', flexDirection:'column', alignItems:isMine?'flex-end':'flex-start', maxWidth:'72%'}}>
                                            {!isMine && !sameAuthor && <span style={{fontSize:'10px', fontWeight:800, opacity:0.45, marginBottom:'4px', marginLeft:'4px'}}>{m.fromName}</span>}
                                            <div style={{padding:'10px 14px', borderRadius:isMine?'18px 18px 4px 18px':'18px 18px 18px 4px',
                                                background:isMine?'linear-gradient(135deg, var(--accent), var(--accent2))':'var(--glass-bg)',
                                                border:isMine?'none':'1px solid var(--glass-border)',
                                                boxShadow:isMine?'0 2px 12px rgba(79,110,247,0.3)':'var(--card-shadow)'}}>
                                                <div style={{fontSize:'14px', fontWeight:600, lineHeight:1.5, color:isMine?'#fff':'var(--text)', wordBreak:'break-word'}}>{m.text}</div>
                                            </div>
                                            <span style={{fontSize:'9px', fontWeight:700, opacity:0.3, marginTop:'3px', marginLeft:'4px', marginRight:'4px'}}>{m.time}</span>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={msgEndRef} />
                        </div>

                        {/* 입력바 */}
                        <div style={{padding:'10px 12px', borderTop:'1px solid var(--glass-border)', display:'flex', gap:'8px', alignItems:'flex-end', background:'var(--glass-bg2)', flexShrink:0}}>
                            <KorTextarea ref={inputRef}
                                value={msgInput} onChange={e=>setMsgInput(e.target.value)}
                                onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }}
                                placeholder="메시지 입력…"
                                rows={1}
                                style={{flex:1, resize:'none', fontSize:'14px', fontWeight:600, lineHeight:1.5, background:'var(--glass-bg)', border:'1.5px solid var(--glass-border)', borderRadius:'22px', padding:'10px 16px', color:'var(--text)', fontFamily:'Pretendard,sans-serif', outline:'none', maxHeight:'100px', overflowY:'auto'}}
                                onInput={e=>{ e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight,100)+'px'; }}
                            />
                            <button onClick={sendMsg} disabled={sending||!msgInput.trim()}
                                style={{width:'40px', height:'40px', borderRadius:'50%', border:'none', cursor:'pointer', background:msgInput.trim()?'var(--accent)':'var(--glass-bg)', color:msgInput.trim()?'#fff':'var(--text-sub)', fontSize:'18px', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s', flexShrink:0, boxShadow:msgInput.trim()?'0 4px 12px rgba(79,110,247,0.35)':'none', opacity:sending?0.6:1}}>↑</button>
                        </div>
                        <MobCreateSheet />
                    </div>
                );

                // ── 대화 목록 화면 ──
                return (
                    <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:'calc(100dvh - 120px)'}}>
                        {/* 헤더: 유저 ID + 새 대화 */}
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'18px 20px 10px'}}>
                            <span style={{fontSize:'22px', fontWeight:900, color:'var(--text)', letterSpacing:'-0.5px'}}>{currentUser.id}</span>
                            <button onClick={()=>setShowCreate(true)}
                                style={{width:'36px', height:'36px', borderRadius:'12px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg)', cursor:'pointer', fontSize:'18px', color:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center'}}>✏️</button>
                        </div>

                        {/* 검색창 */}
                        <div style={{padding:'0 16px 14px'}}>
                            <KorInput value={roomSearch} onChange={e=>setRoomSearch(e.target.value)}
                                placeholder="검색"
                                style={{width:'100%', fontSize:'14px', fontWeight:600, padding:'10px 16px', borderRadius:'14px', background:'var(--glass-bg2)', border:'1px solid var(--glass-border)'}} />
                        </div>

                        {/* 대화 목록 */}
                        <div style={{flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch'}}>
                            {filteredRooms.length === 0 && (
                                <div style={{padding:'48px 20px', textAlign:'center', fontSize:'13px', fontWeight:700, opacity:0.2}}>
                                    {roomSearch ? '검색 결과 없음' : '대화가 없습니다'}
                                </div>
                            )}
                            {filteredRooms.map(room => {
                                const isActive = activeRoom?.id === room.id;
                                return (
                                    <div key={room.id} onClick={()=>{ setActiveRoom(room); setShowCreate(false); }}
                                        style={{display:'flex', alignItems:'center', gap:'14px', padding:'12px 20px', cursor:'pointer', background:isActive?'rgba(79,110,247,0.06)':'transparent', transition:'background 0.15s'}}>
                                        {/* 아바타 */}
                                        <div style={{width:'52px', height:'52px', borderRadius:'50%', background:'linear-gradient(135deg, var(--accent), var(--accent2))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:room.isGroup?'20px':'18px', fontWeight:900, color:'#fff', flexShrink:0}}>
                                            {getRoomInitial(room)}
                                        </div>
                                        <div style={{flex:1, minWidth:0}}>
                                            <div style={{fontSize:'15px', fontWeight:800, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{getRoomName(room)}</div>
                                            <div style={{fontSize:'12px', fontWeight:500, opacity:0.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginTop:'2px'}}>{room.lastMessage || '대화를 시작하세요'}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <MobCreateSheet />
                    </div>
                );
            }

            // ── 데스크톱 레이아웃 ─────────────────────────────────────────────
            return (
                <div className="anim-fade-up" style={{display:'flex', height:'calc(100vh - 140px)', borderRadius:'24px', overflow:'hidden', border:'1px solid var(--glass-border)', background:'var(--glass-bg)', backdropFilter:'blur(28px) saturate(180%)', WebkitBackdropFilter:'blur(28px) saturate(180%)', boxShadow:'var(--glass-shadow)'}}>

                    {/* ── 왼쪽: 대화방 목록 ── */}
                    <div style={{width:'300px', flexShrink:0, borderRight:'1px solid var(--glass-border)', display:'flex', flexDirection:'column', background:'var(--glass-bg2)'}}>
                        {/* 헤더 */}
                        <div style={{padding:'20px 18px 14px', borderBottom:'1px solid var(--glass-border)'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px'}}>
                                <span style={{fontSize:'16px', fontWeight:900, color:'var(--text)'}}>Messages</span>
                                <button onClick={()=>{setShowCreate(true); setActiveRoom(null);}}
                                    style={{width:'32px', height:'32px', borderRadius:'10px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg)', cursor:'pointer', fontSize:'18px', color:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s'}}
                                    onMouseEnter={e=>{e.currentTarget.style.background='rgba(79,110,247,0.12)';}}
                                    onMouseLeave={e=>{e.currentTarget.style.background='var(--glass-bg)';}}>✏️</button>
                            </div>
                            <KorInput value={roomSearch} onChange={e=>setRoomSearch(e.target.value)}
                                placeholder="🔍  대화 검색"
                                style={{width:'100%', fontSize:'12px', fontWeight:700, padding:'9px 14px', borderRadius:'12px'}} />
                        </div>

                        {/* 대화방 목록 */}
                        <div style={{flex:1, overflowY:'auto'}}>
                            {filteredRooms.length === 0 && (
                                <div style={{padding:'40px 20px', textAlign:'center', fontSize:'11px', fontWeight:700, opacity:0.2, textTransform:'uppercase', letterSpacing:'0.12em'}}>

                                </div>
                            )}
                            {filteredRooms.map(room => {
                                const isActive = activeRoom?.id === room.id;

                                    <div key={room.id} onClick={()=>{setActiveRoom(room); setShowCreate(false);}}
                                        style={{display:'flex', alignItems:'center', gap:'12px', padding:'12px 18px', cursor:'pointer', transition:'background 0.15s', background: isActive ? 'rgba(79,110,247,0.1)' : 'transparent', borderLeft: isActive ? '3px solid var(--accent)' : '3px solid transparent'}}
                                        onMouseEnter={e=>{if(!isActive) e.currentTarget.style.background='var(--glass-bg)';}}
                                        onMouseLeave={e=>{if(!isActive) e.currentTarget.style.background='transparent';}}>
                                        {/* 아바타 */}
                                        <div style={{width:'44px', height:'44px', borderRadius:'50%', background: isActive ? 'linear-gradient(135deg, var(--accent), var(--accent2))' : 'var(--glass-bg)', border:'1.5px solid var(--glass-border)', display:'flex', alignItems:'center', justifyContent:'center', fontSize: room.isGroup ? '18px' : '16px', fontWeight:900, color: isActive ? '#fff' : 'var(--text)', flexShrink:0}}>
                                            {getRoomInitial(room)}

                                        <div style={{flex:1, minWidth:0}}>

                                            <div style={{fontSize:'11px', fontWeight:600, opacity:0.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginTop:'2px'}}>{room.lastMessage || '대화를 시작하세요'}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* ── 오른쪽: 채팅 영역 ── */}
                    <div style={{flex:1, display:'flex', flexDirection:'column', minWidth:0}}>
                        {showCreate ? (
                            <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'40px'}}>
                                <div style={{width:'100%', maxWidth:'380px'}}>
                                    <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', marginBottom:'6px'}}>새 대화 시작</h3>
                                    <p style={{fontSize:'12px', fontWeight:700, opacity:0.35, marginBottom:'28px'}}>1:1 또는 여러 명의 ID를 쉼표로 구분해 입력하세요</p>
                                    <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
                                        <div>
                                            <label style={{fontSize:'9px', fontWeight:900, opacity:0.4, textTransform:'uppercase', letterSpacing:'0.18em', display:'block', marginBottom:'8px', color:'var(--text)'}}>참여자 ID *</label>
                                            <KorInput autoFocus value={createIds} onChange={e=>setCreateIds(e.target.value)}
                                                onKeyDown={e=>e.key==='Enter'&&createRoom()}
                                                placeholder="예: user1 또는 user1, user2, user3"
                                                style={{width:'100%', fontSize:'14px', fontWeight:700}} />
                                        </div>
                                        <div>
                                            <label style={{fontSize:'9px', fontWeight:900, opacity:0.4, textTransform:'uppercase', letterSpacing:'0.18em', display:'block', marginBottom:'8px', color:'var(--text)'}}>대화방 이름 (선택)</label>
                                            <KorInput value={createName} onChange={e=>setCreateName(e.target.value)}
                                                onKeyDown={e=>e.key==='Enter'&&createRoom()}
                                                placeholder="그룹 이름 (비우면 자동 설정)"
                                                style={{width:'100%', fontSize:'14px', fontWeight:700}} />
                                        </div>
                                        <div style={{display:'flex', gap:'10px', marginTop:'8px'}}>
                                            <button onClick={()=>setShowCreate(false)} style={{flex:1, padding:'12px', borderRadius:'16px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', fontSize:'13px', fontWeight:800, color:'var(--text-sub)', fontFamily:'Pretendard,sans-serif'}}>취소</button>
                                            <button onClick={createRoom} disabled={creating||!createIds.trim()} className="btn-primary" style={{flex:1, padding:'12px', opacity:!createIds.trim()?0.4:1}}>
                                                {creating ? '생성 중...' : '대화 시작'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : activeRoom ? (
                            <>
                                {/* 채팅 헤더 */}
                                <div style={{padding:'16px 24px', borderBottom:'1px solid var(--glass-border)', display:'flex', alignItems:'center', gap:'14px', flexShrink:0, background:'var(--glass-bg2)'}}>
                                    <div style={{width:'38px', height:'38px', borderRadius:'50%', background:'linear-gradient(135deg, var(--accent), var(--accent2))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'15px', fontWeight:900, color:'#fff', flexShrink:0}}>
                                        {getRoomInitial(activeRoom)}
                                    </div>
                                    <div>
                                        <div style={{fontSize:'15px', fontWeight:900, color:'var(--text)'}}>{getRoomName(activeRoom)}</div>
                                        {activeRoom.memberIds && (
                                            <div style={{fontSize:'10px', fontWeight:700, opacity:0.35, marginTop:'2px'}}>{activeRoom.memberIds.join(' · ')}</div>
                                        )}
                                    </div>
                                </div>

                                {/* 메시지 스크롤 영역 */}
                                <div style={{flex:1, overflowY:'auto', padding:'20px 24px', display:'flex', flexDirection:'column', gap:'6px'}}>
                                    {roomMessages.length === 0 && (
                                        <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', fontWeight:700, opacity:0.15, textTransform:'uppercase', letterSpacing:'0.15em'}}>대화를 시작해보세요</div>
                                    )}
                                    {roomMessages.map((m, i) => {
                                        const isMine = m.fromUid === currentUser.uid || m.fromId === currentUser.id;
                                        const prevMsg = roomMessages[i-1];
                                        const sameAuthor = prevMsg && (prevMsg.fromId === m.fromId);
                                        return (
                                            <div key={m.id || i} style={{display:'flex', flexDirection: isMine ? 'row-reverse' : 'row', alignItems:'flex-end', gap:'8px', marginTop: sameAuthor ? '2px' : '12px'}}>
                                                {/* 상대방 아바타 */}
                                                {!isMine && (
                                                    <div style={{width:'28px', height:'28px', borderRadius:'50%', background:'var(--glass-bg)', border:'1px solid var(--glass-border)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', fontWeight:900, flexShrink:0, opacity: sameAuthor ? 0 : 1}}>
                                                        {m.fromName?.[0] || '?'}
                                                    </div>
                                                )}
                                                <div style={{display:'flex', flexDirection:'column', alignItems: isMine ? 'flex-end' : 'flex-start', maxWidth:'65%'}}>
                                                    {!isMine && !sameAuthor && (
                                                        <span style={{fontSize:'10px', fontWeight:800, opacity:0.45, marginBottom:'4px', marginLeft:'4px'}}>{m.fromName}</span>
                                                    )}
                                                    <div style={{
                                                        padding:'10px 14px',
                                                        borderRadius: isMine ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
                                                        background: isMine ? 'linear-gradient(135deg, var(--accent), var(--accent2))' : 'var(--glass-bg)',
                                                        border: isMine ? 'none' : '1px solid var(--glass-border)',
                                                        backdropFilter:'blur(12px)',
                                                        boxShadow: isMine ? '0 2px 12px rgba(79,110,247,0.3)' : 'var(--card-shadow)',
                                                    }}>
                                                        <div style={{fontSize:'13px', fontWeight:600, lineHeight:1.5, color: isMine ? '#fff' : 'var(--text)', wordBreak:'break-word'}}>{m.text}</div>
                                                    </div>
                                                    <span style={{fontSize:'9px', fontWeight:700, opacity:0.3, marginTop:'3px', marginLeft:'4px', marginRight:'4px'}}>{m.time}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div ref={msgEndRef} />
                                </div>

                                {/* 메시지 입력바 */}
                                <div style={{padding:'14px 24px', borderTop:'1px solid var(--glass-border)', display:'flex', gap:'10px', alignItems:'flex-end', background:'var(--glass-bg2)', flexShrink:0}}>
                                    <KorTextarea ref={inputRef}
                                        value={msgInput} onChange={e=>setMsgInput(e.target.value)}
                                        onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }}
                                        placeholder="메시지 입력… (Enter 전송, Shift+Enter 줄바꿈)"
                                        rows={1}
                                        style={{flex:1, resize:'none', fontSize:'13px', fontWeight:600, lineHeight:1.6, background:'var(--glass-bg)', border:'1.5px solid var(--glass-border)', borderRadius:'16px', padding:'10px 16px', color:'var(--text)', fontFamily:'Pretendard,sans-serif', outline:'none', maxHeight:'120px', overflowY:'auto'}}
                                        onFocus={e=>{e.target.style.borderColor='var(--accent)'; e.target.style.boxShadow='0 0 0 3px rgba(79,110,247,0.1)';}}
                                        onBlur={e=>{e.target.style.borderColor='var(--glass-border)'; e.target.style.boxShadow='none';}}
                                        onInput={e=>{ e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight, 120)+'px'; }}
                                    />
                                    <button onClick={sendMsg} disabled={sending||!msgInput.trim()}
                                        style={{width:'40px', height:'40px', borderRadius:'14px', border:'none', cursor:'pointer', background: msgInput.trim() ? 'var(--accent)' : 'var(--glass-bg)', color: msgInput.trim() ? '#fff' : 'var(--text-sub)', fontSize:'18px', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s', flexShrink:0, boxShadow: msgInput.trim() ? '0 4px 12px rgba(79,110,247,0.35)' : 'none', opacity: sending ? 0.6 : 1}}>
                                        ↑
                                    </button>
                                </div>
                            </>
                        ) : (
                            /* 빈 상태 */
                            <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'16px', opacity:0.3}}>
                                <div style={{fontSize:'48px'}}>💬</div>
                                <div style={{fontSize:'14px', fontWeight:800, textTransform:'uppercase', letterSpacing:'0.15em'}}>대화를 선택하거나</div>
                                <div style={{fontSize:'12px', fontWeight:700, opacity:0.7}}>✏️ 버튼으로 새 대화를 시작하세요</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ─── SettingsView ────────────────────────────────────────────────────

        function SettingsSection({label, children}) {
            return (
                <div style={{marginBottom:'24px'}}>
                    <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'12px', color:'var(--text)'}}>{label}</p>
                    {children}
                </div>
            );
        }

        function SettingsView({ currentUser, userRole, theme, suneungDate, getDDay, onThemeChange, onRoleChange, onSuneungChange, onSchoolChange, onNameChange }) {
            const [school,    setSchool]    = useState(currentUser.school || '');
            const [nickname,  setNickname]  = useState(currentUser.name  || '');
            const [saved,     setSaved]     = useState(false);
            const [nameSaved, setNameSaved] = useState(false);
            const saveSchool = async () => { await onSchoolChange(school); setSaved(true); setTimeout(()=>setSaved(false), 2000); };
            const saveName   = async () => { await onNameChange(nickname); setNameSaved(true); setTimeout(()=>setNameSaved(false), 2000); };

            // 선생님 인증 모달
            const [roleModal,     setRoleModal]     = useState(false);  // 모달 표시 여부
            const [rolePw,        setRolePw]        = useState('');
            const [rolePwError,   setRolePwError]   = useState(false);
            const [pendingRole,   setPendingRole]   = useState(null);   // 클릭한 역할

            const handleRoleClick = (r) => {
                if (r.id === userRole) return;           // 이미 현재 역할
                if (r.id === '학생') { onRoleChange('학생'); return; }  // 학생은 자유
                if (r.id === '관리자') return;            // 관리자는 코드로만 부여
                // 선생님 → 모달
                setPendingRole(r.id);
                setRolePw('');
                setRolePwError(false);
                setRoleModal(true);
            };

            const confirmRolePw = async () => {
                if (rolePw === 'sunkist0313') {
                    await onRoleChange(pendingRole);
                    setRoleModal(false);
                } else {
                    setRolePwError(true);
                }
            };

            const THEMES = [{id:'light', icon:'☀️', label:'Light'},{id:'dark',icon:'🌙',label:'Dark'},{id:'midnight',icon:'🌑',label:'Midnight'}];
            const ROLES  = [{id:'학생',icon:'🎓'},{id:'선생님',icon:'👨‍🏫'},{id:'관리자',icon:'👑'}];

            return (
                <div style={{maxWidth:'560px', margin:'0 auto'}} className="anim-fade-up">
                    <div className="glass-card-lg" style={{padding:'32px'}}>
                        <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', marginBottom:'28px', paddingBottom:'16px', borderBottom:'1px solid var(--glass-border)'}}>⚙️ 계정 및 설정</h3>

                        {/* ID (변경 불가) */}
                        <SettingsSection label="ID (변경 불가)">
                            <div style={{padding:'13px 16px', borderRadius:'14px', background:'var(--glass-bg2)', border:'1.5px solid var(--glass-border)', fontSize:'14px', fontWeight:800, color:'var(--text)', opacity:0.5, letterSpacing:'0.05em'}}>
                                @{currentUser.id}
                            </div>
                        </SettingsSection>

                        {/* 닉네임 */}
                        <SettingsSection label="Nickname">
                            <div style={{display:'flex', gap:'10px'}}>
                                <KorInput value={nickname} onChange={e=>setNickname(e.target.value)} placeholder="표시 이름" style={{flex:1}} />
                                <button className="btn-primary" onClick={saveName} style={{flexShrink:0, padding:'12px 20px'}}>
                                    {nameSaved ? '✓ 저장됨' : '저장'}
                                </button>
                            </div>
                        </SettingsSection>

                        {/* 학교명 */}
                        <SettingsSection label="School Name">
                            <div style={{display:'flex', gap:'10px'}}>
                                <KorInput value={school} onChange={e=>setSchool(e.target.value)} placeholder="학교 이름" style={{flex:1}} />
                                <button className="btn-primary" onClick={saveSchool} style={{flexShrink:0, padding:'12px 20px'}}>
                                    {saved ? '✓ 저장됨' : '저장'}
                                </button>
                            </div>
                        </SettingsSection>

                        {/* 테마 */}
                        <SettingsSection label="Visual Theme">
                            <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'8px'}}>
                                {THEMES.map(t => (
                                    <button key={t.id} onClick={() => onThemeChange(t.id)}
                                        style={{padding:'14px', borderRadius:'18px', border: theme===t.id ? '2px solid var(--accent)' : '1.5px solid var(--glass-border)', background: theme===t.id ? 'rgba(79,110,247,0.12)' : 'var(--glass-bg2)', cursor:'pointer', transition:'all 0.2s', fontFamily:'Pretendard, sans-serif', fontWeight:800, fontSize:'12px', color: theme===t.id ? 'var(--accent)' : 'var(--text-sub)', display:'flex', flexDirection:'column', alignItems:'center', gap:'6px'}}>
                                        <span style={{fontSize:'20px'}}>{t.icon}</span>
                                        {t.label}
                                    </button>
                                ))}
                            </div>
                        </SettingsSection>

                        {/* 역할 */}
                        <SettingsSection label="Access Role">
                            <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'8px'}}>
                                {ROLES.map(r => {
                                    const isActive  = userRole === r.id;
                                    const isLocked  = r.id === '관리자' && userRole !== '관리자';
                                    return (
                                        <button key={r.id} onClick={() => handleRoleClick(r)}
                                            disabled={isLocked}
                                            style={{padding:'14px', borderRadius:'18px',
                                                border: isActive ? '2px solid var(--accent)' : '1.5px solid var(--glass-border)',
                                                background: isActive ? 'rgba(79,110,247,0.12)' : 'var(--glass-bg2)',
                                                cursor: isLocked ? 'not-allowed' : 'pointer',
                                                opacity: isLocked ? 0.35 : 1,
                                                transition:'all 0.2s', fontFamily:'Pretendard, sans-serif',
                                                fontWeight:800, fontSize:'12px',
                                                color: isActive ? 'var(--accent)' : 'var(--text-sub)',
                                                display:'flex', flexDirection:'column', alignItems:'center', gap:'6px'}}>
                                            <span style={{fontSize:'20px'}}>{r.icon}</span>
                                            {r.id}
                                            {r.id === '선생님' && !isActive && <span style={{fontSize:'9px', opacity:0.5}}>🔒 코드 필요</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </SettingsSection>

                        {/* 수능 D-Day */}
                        <SettingsSection label="수능 D-Day">
                            <KorInput type="date" value={suneungDate} onChange={e=>onSuneungChange(e.target.value)} />
                            <p style={{fontSize:'12px', fontWeight:800, color:'var(--accent)', marginTop:'10px', opacity:0.8}}>현재: {getDDay(suneungDate)}</p>
                        </SettingsSection>
                    </div>

                    {/* 선생님 인증 모달 */}
                    {roleModal && (
                        <div style={{position:'fixed', inset:0, zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.55)', backdropFilter:'blur(6px)'}}
                            onClick={()=>setRoleModal(false)}>
                            <div className="glass-card-lg" style={{padding:'32px 36px', width:'100%', maxWidth:'360px', textAlign:'center'}}
                                onClick={e=>e.stopPropagation()}>
                                <div style={{fontSize:'32px', marginBottom:'12px'}}>👨‍🏫</div>
                                <h3 style={{fontSize:'16px', fontWeight:900, color:'var(--text)', marginBottom:'6px'}}>선생님 인증</h3>
                                <p style={{fontSize:'12px', fontWeight:600, opacity:0.45, color:'var(--text)', marginBottom:'24px'}}>교사 인증 코드를 입력해 주세요</p>
                                <input
                                    type="password"
                                    value={rolePw}
                                    onChange={e=>{ setRolePw(e.target.value); setRolePwError(false); }}
                                    onKeyDown={e=>{ if(e.key==='Enter') confirmRolePw(); }}
                                    placeholder="인증 코드"
                                    autoFocus
                                    style={{width:'100%', textAlign:'center', fontSize:'16px', fontWeight:800, letterSpacing:'0.2em',
                                        borderColor: rolePwError ? '#ef4444' : undefined,
                                        boxShadow: rolePwError ? '0 0 0 3px rgba(239,68,68,0.15)' : undefined}}
                                />
                                {rolePwError && <p style={{fontSize:'11px', fontWeight:800, color:'#ef4444', marginTop:'8px'}}>코드가 올바르지 않습니다</p>}
                                <div style={{display:'flex', gap:'10px', marginTop:'20px'}}>
                                    <button onClick={()=>setRoleModal(false)}
                                        style={{flex:1, padding:'12px', borderRadius:'14px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', fontSize:'13px', fontWeight:800, color:'var(--text-sub)', fontFamily:'Pretendard,sans-serif'}}>
                                        취소
                                    </button>
                                    <button onClick={confirmRolePw} className="btn-primary" style={{flex:1, padding:'12px'}}>
                                        확인
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ─── 공통 배경 블롭 (AuthPage / SetupPage 공유) ────────────────────
        function AuroraBackground() {
            return <>
                <div style={{position:'absolute', top:'-20%', left:'-15%', width:'68%', height:'66%', background:'radial-gradient(ellipse at 38% 42%, #4338ca 0%, #3730a3 28%, transparent 68%)', filter:'blur(58px)', borderRadius:'62% 38% 54% 46% / 48% 62% 38% 52%', animation:'drift1 26s cubic-bezier(0.45,0.05,0.55,0.95) infinite'}}></div>
                <div style={{position:'absolute', bottom:'-20%', right:'-15%', width:'62%', height:'62%', background:'radial-gradient(ellipse at 58% 58%, #7c3aed 0%, #6d28d9 25%, transparent 65%)', filter:'blur(64px)', borderRadius:'44% 56% 38% 62% / 56% 44% 56% 44%', animation:'drift2 32s cubic-bezier(0.45,0.05,0.55,0.95) infinite'}}></div>
                <div style={{position:'absolute', bottom:'-10%', left:'-6%', width:'42%', height:'42%', background:'radial-gradient(ellipse at 40% 60%, #be185d 0%, #9d174d 22%, transparent 65%)', filter:'blur(56px)', borderRadius:'52% 48% 44% 56% / 58% 42% 58% 42%', animation:'drift3 28s cubic-bezier(0.45,0.05,0.55,0.95) infinite 4s'}}></div>

                <div style={{position:'absolute', top:'32%', left:'30%', width:'30%', height:'30%', background:'radial-gradient(ellipse, #2563eb 0%, transparent 62%)', filter:'blur(48px)', borderRadius:'50%', animation:'drift5 16s cubic-bezier(0.45,0.05,0.55,0.95) infinite 1s'}}></div>

            </>;
