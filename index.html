        function Dashboard({ announcements, todos, resources, posts, studyTime, suneungDate, getDDay, setView, currentUser }) {
            const todayCount = todos.filter(t => t.date === new Date().toISOString().split('T')[0]).length;
            const getGreeting = () => {
                const h = new Date().getHours(), n = currentUser?.name || '';
                const g = h>=5&&h<9   ? [`좋은 아침이에요, ${n}님 ☀️`,`오늘도 화이팅이에요, ${n}님 🌅`]
                        : h>=9&&h<12  ? [`오전 공부 시작해볼까요, ${n}님 📖`,`집중할 시간이에요, ${n}님 ⚡`]
                        : h>=12&&h<14 ? [`점심 시간이네요, ${n}님 🍱`,`잠깐 쉬어가요, ${n}님 😌`]
                        : h>=14&&h<18 ? [`오후도 힘내요, ${n}님 💪`,`조금만 더, ${n}님 🔥`]
                        : h>=18&&h<21 ? [`좋은 저녁이에요, ${n}님 🌆`,`오늘 하루 어땠나요, ${n}님 ✨`]
                        : h>=21&&h<24 ? [`오늘 수고했어요, ${n}님 🌙`,`내일도 화이팅이에요, ${n}님 ⭐`]
                        :               [`늦은 밤이네요, ${n}님 🌌`,`몸 챙기면서 공부해요, ${n}님 💙`];
                return g[Math.floor(Math.random()*g.length)];
            };
            const [winW, setWinW] = useState(window.innerWidth);
            useEffect(() => {
                const h = () => setWinW(window.innerWidth);
                window.addEventListener('resize', h);
                return () => window.removeEventListener('resize', h);
            }, []);
            const mob = winW < 1100;

            const stats = [
                {l:'Tasks', v: todayCount,              u:'개', icon:'✅'},
                {l:'Study',  v: Math.floor(studyTime/60),u:'분', icon:'⏱️'},
                {l:'D-Day',  v: getDDay(suneungDate),    u:'',   icon:'🎯'},
                {l:'자료',   v: resources.length,        u:'개', icon:'📚'},
            ];
            return (
                <div style={{display:'flex', flexDirection:'column', gap: mob ? '12px' : '20px'}}>
                    {/* 히어로 배너 */}
                    <div className="hero-banner anim-fade-up" style={mob ? {padding:'16px 18px', borderRadius:'20px'} : {}}>
                        {!mob && <>
                            <div className="hero-blob" style={{width:'280px',height:'280px',top:'-80px',right:'-60px',animationDelay:'0s'}}></div>
                            <div className="hero-blob" style={{width:'180px',height:'180px',bottom:'-60px',left:'10%',animationDelay:'3s'}}></div>
                        </>}
                        <div style={{position:'relative', zIndex:1}}>
                            <p style={{fontSize: mob?'9px':'11px', fontWeight:800, textTransform:'uppercase', letterSpacing:'0.2em', opacity:0.7, marginBottom: mob?'4px':'8px'}}>Welcome Back</p>
                            <h3 style={{fontSize: mob?'17px':'26px', fontWeight:900, letterSpacing:'-0.5px', marginBottom: mob?'4px':'6px', lineHeight:1.25}}>
                                수능까지 {getDDay(suneungDate)} 🌟
                            </h3>
                            <p style={{fontSize: mob?'11px':'13px', opacity:0.7, fontWeight:600, marginBottom: mob?'14px':'28px'}}>{getGreeting()}</p>
                            <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap: mob?'8px':'12px'}}>
                                {stats.map((s,i) => (
                                    <div key={i} className="stat-card" style={{animationDelay:`${i*0.08}s`, padding: mob?'10px 8px':'16px 12px'}}>
                                        <div style={{fontSize: mob?'14px':'18px', marginBottom: mob?'3px':'6px'}}>{s.icon}</div>
                                        <div style={{fontSize:'8px', fontWeight:800, textTransform:'uppercase', letterSpacing:'0.12em', opacity:0.5, marginBottom:'3px'}}>{s.l}</div>
                                        <div style={{fontSize: mob?'16px':'24px', fontWeight:900, letterSpacing:'-0.5px'}}>{s.v}<span style={{fontSize:'9px', opacity:0.45, fontWeight:700, marginLeft:'2px'}}>{s.u}</span></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 하단 카드 — 모바일 1열 / 데스크탑 2열 */}
                    <div style={{display:'grid', gridTemplateColumns: mob?'1fr':'1fr 1fr', gap: mob?'10px':'16px'}}>
                        {/* 공지 */}
                        <div className="glass-card anim-fade-up delay-1" style={{padding: mob?'14px':'24px'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: mob?'10px':'16px'}}>
                                <h3 style={{fontSize: mob?'13px':'14px', fontWeight:800, color:'var(--text)'}}>📢 공지사항</h3>
                                <span style={{fontSize:'9px', fontWeight:800, opacity:0.3, textTransform:'uppercase', letterSpacing:'0.1em'}}>Latest 3</span>
                            </div>
                            <div style={{display:'flex', flexDirection:'column', gap:'6px'}}>
                                {announcements.slice(0,3).map((a,i) => (
                                    <div key={a.id} className="glass-inset" style={{padding: mob?'8px 12px':'12px 16px', animation:`fadeInUp 0.3s ease ${i*0.06}s both`}}>
                                        <div style={{fontSize: mob?'12px':'13px', fontWeight:800, color:'var(--text)', marginBottom:'2px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.title}</div>
                                        <div style={{fontSize:'9px', fontWeight:700, opacity:0.35}}>{a.date}</div>
                                    </div>
                                ))}
                                {announcements.length === 0 && (
                                    <div style={{textAlign:'center', padding:'20px', fontSize:'11px', fontWeight:700, opacity:0.2, textTransform:'uppercase', letterSpacing:'0.1em'}}>등록된 공지가 없습니다</div>
                                )}
                            </div>
                        </div>

                        {/* 커뮤니티 */}
                        <div className="glass-card anim-fade-up delay-2" style={{padding: mob?'14px':'24px'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: mob?'10px':'16px'}}>
                                <h3 style={{fontSize: mob?'13px':'14px', fontWeight:800, color:'var(--text)'}}>🔥 Community</h3>
                                <button onClick={()=>setView('커뮤니티')} style={{fontSize:'9px', fontWeight:800, opacity:0.45, textTransform:'uppercase', letterSpacing:'0.1em', background:'none', border:'none', cursor:'pointer', color:'var(--accent)', fontFamily:'Pretendard,sans-serif'}}>더보기 →</button>
                            </div>
                            <div style={{display:'flex', flexDirection:'column', gap:'6px'}}>
                                {posts.length > 0 ? posts.slice(0,3).map((p,i) => (
                                    <div key={p.id} className="glass-inset" style={{padding: mob?'8px 12px':'12px 16px', display:'flex', alignItems:'center', gap:'10px', cursor:'pointer', transition:'all 0.2s', animation:`fadeInUp 0.3s ease ${i*0.06}s both`}}
                                        onClick={()=>setView('커뮤니티')}>
                                        <div style={{width:'28px', height:'28px', borderRadius:'9px', background:'var(--glass-bg)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', flexShrink:0, color:'var(--accent)'}}>
                                            {p.category==='공부'?'📖':p.category==='질문'?'❓':p.category==='잡담'?'💬':'📝'}
                                        </div>
                                        <div style={{flex:1, minWidth:0}}>
                                            <div style={{fontSize:'12px', fontWeight:800, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.title}</div>
                                            <div style={{fontSize:'9px', fontWeight:700, opacity:0.4, marginTop:'1px'}}>{p.authorName}</div>
                                        </div>
                                    </div>
                                )) : (
                                    [{icon:'👑', text:'커뮤니티에 첫 글을 남겨보세요!'},{icon:'⚡', text:'공부 팁, 질문을 자유롭게 공유'},{icon:'📖', text:'함께라면 더 멀리 갈 수 있어요'}].map((item,i) => (
                                        <div key={i} className="glass-inset" style={{padding: mob?'8px 12px':'12px 16px', display:'flex', alignItems:'center', gap:'10px', cursor:'pointer', animation:`fadeInUp 0.3s ease ${i*0.06}s both`}}
                                            onClick={()=>setView('커뮤니티')}>
                                            <div style={{width:'28px', height:'28px', borderRadius:'9px', background:'var(--glass-bg)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'13px', flexShrink:0}}>{item.icon}</div>
                                            <div style={{fontSize:'11px', fontWeight:700, opacity:0.75}}>{item.text}</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── CommunityView ───────────────────────────────────────────────────

        const CATEGORIES = ['전체','공부','질문','잡담','기타'];
        const CAT_ICON   = { '공부':'📖', '질문':'❓', '잡담':'💬', '기타':'📝' };

        function CommunityView({ posts, currentUser, onAddPost }) {
            const [mode, setMode]                 = useState('list');   // 'list' | 'write' | 'detail'
            const [selectedPost, setSelectedPost] = useState(null);
            const [filterCat, setFilterCat]       = useState('전체');
            const [submitting, setSubmitting]     = useState(false);

            // write form state
            const [wTitle,    setWTitle]   = useState('');
            const [wContent,  setWContent] = useState('');
            const [wCategory, setWCategory]= useState('공부');

            // comment state
            const [comments,      setComments]      = useState([]);
            const [localComments, setLocalComments] = useState({});   // { [postId]: [...] } for local-admin
            const [commentInput,  setCommentInput]  = useState('');
            const [commentLoading, setCommentLoading] = useState(false);
            const commentEndRef = useRef(null);

            const isLocalAdmin = currentUser?.uid === 'local-admin';

            // 댓글 로드: 상세 화면 진입 시 onSnapshot 구독 (로컬 어드민은 로컬 상태)
            useEffect(() => {
                if (mode !== 'detail' || !selectedPost) return;
                if (isLocalAdmin) {
                    setComments(localComments[selectedPost.id] || []);
                    return;
                }
                const unsub = db.collection('posts').doc(selectedPost.id)
                    .collection('comments')
                    .orderBy('createdAt', 'asc')
                    .onSnapshot(snap => {
                        setComments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    }, () => {});
                return () => unsub();
            }, [selectedPost?.id, mode]);

            useEffect(() => {
                commentEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [comments]);

            const submitPost = async () => {
                if (!wTitle.trim() || !wContent.trim()) return;
                setSubmitting(true);
                await onAddPost(wTitle.trim(), wContent.trim(), wCategory);
                setSubmitting(false);
                setWTitle(''); setWContent(''); setWCategory('공부');
                setMode('list');
            };

            const submitComment = async () => {
                if (!commentInput.trim() || commentLoading) return;
                setCommentLoading(true);
                const now = new Date();
                const newComment = {
                    id: String(Date.now()),
                    authorId: currentUser.id,
                    authorName: currentUser.name,
                    content: commentInput.trim(),
                    date: now.toLocaleDateString('ko-KR'),
                    time: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                };
                if (isLocalAdmin) {
                    const updated = [...(localComments[selectedPost.id] || []), newComment];
                    setLocalComments(prev => ({ ...prev, [selectedPost.id]: updated }));
                    setComments(updated);
                } else {
                    await db.collection('posts').doc(selectedPost.id).collection('comments').add({
                        authorId: currentUser.id,
                        authorName: currentUser.name,
                        content: commentInput.trim(),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    }).catch(() => {});
                    // onSnapshot이 자동으로 comments 업데이트
                }
                setCommentInput('');
                setCommentLoading(false);
            };

            const openDetail = (post) => { setSelectedPost(post); setComments([]); setCommentInput(''); setMode('detail'); };

            const filteredPosts = filterCat === '전체' ? posts : posts.filter(p => p.category === filterCat);

            /* ── Detail ── */
            if (mode === 'detail' && selectedPost) return (
                <div className="anim-fade-up" style={{maxWidth:'760px', margin:'0 auto'}}>
                    <button onClick={()=>setMode('list')} style={{background:'none', border:'none', cursor:'pointer', color:'var(--accent)', fontWeight:800, fontSize:'13px', fontFamily:'Pretendard,sans-serif', marginBottom:'16px', padding:'0', display:'flex', alignItems:'center', gap:'6px'}}>
                        ← 목록으로
                    </button>

                    {/* 본문 */}
                    <div className="glass-card-lg" style={{padding:'32px 36px', marginBottom:'16px'}}>
                        <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'20px'}}>
                            <span style={{padding:'4px 12px', borderRadius:'99px', background:'rgba(79,110,247,0.15)', border:'1px solid rgba(79,110,247,0.3)', fontSize:'11px', fontWeight:800, color:'var(--accent)'}}>
                                {CAT_ICON[selectedPost.category] || '📝'} {selectedPost.category}
                            </span>
                        </div>
                        <h2 style={{fontSize:'22px', fontWeight:900, color:'var(--text)', letterSpacing:'-0.3px', marginBottom:'12px', lineHeight:1.35}}>{selectedPost.title}</h2>
                        <div style={{display:'flex', gap:'16px', marginBottom:'28px', paddingBottom:'20px', borderBottom:'1px solid var(--glass-border)'}}>
                            <span style={{fontSize:'11px', fontWeight:700, opacity:0.45}}>{selectedPost.authorName}</span>
                            <span style={{fontSize:'11px', fontWeight:700, opacity:0.35}}>{selectedPost.date} {selectedPost.time}</span>
                        </div>
                        <p style={{fontSize:'15px', fontWeight:600, lineHeight:1.8, color:'var(--text)', opacity:0.85, whiteSpace:'pre-wrap'}}>{selectedPost.content}</p>
                    </div>

                    {/* 댓글 섹션 */}
                    <div className="glass-card" style={{padding:'24px 28px'}}>
                        <h4 style={{fontSize:'14px', fontWeight:900, color:'var(--text)', marginBottom:'20px'}}>
                            💬 댓글 <span style={{fontSize:'12px', fontWeight:700, opacity:0.35, marginLeft:'6px'}}>{comments.length}</span>
                        </h4>

                        {/* 댓글 목록 */}
                        <div style={{display:'flex', flexDirection:'column', gap:'12px', marginBottom:'20px'}}>
                            {comments.length === 0 && (
                                <div style={{textAlign:'center', padding:'28px', fontSize:'11px', fontWeight:700, opacity:0.2, textTransform:'uppercase', letterSpacing:'0.12em'}}>첫 댓글을 남겨보세요</div>
                            )}
                            {comments.map((c, i) => {
                                const isMine = c.authorId === currentUser.id;
                                return (
                                    <div key={c.id} className="glass-inset" style={{padding:'14px 18px', animation:`fadeInUp 0.25s ease ${i*0.04}s both`}}>
                                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}}>
                                            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                                                <div style={{width:'26px', height:'26px', borderRadius:'8px', background:'linear-gradient(135deg, var(--accent), var(--accent2))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', flexShrink:0}}>
                                                    {c.authorName?.[0] || '?'}
                                                </div>
                                                <span style={{fontSize:'12px', fontWeight:800, color: isMine ? 'var(--accent)' : 'var(--text)'}}>{c.authorName}{isMine && <span style={{fontSize:'9px', fontWeight:700, opacity:0.5, marginLeft:'5px'}}>나</span>}</span>
                                            </div>
                                            <span style={{fontSize:'10px', fontWeight:700, opacity:0.3}}>{c.time || ''}</span>
                                        </div>
                                        <p style={{fontSize:'13px', fontWeight:600, lineHeight:1.6, color:'var(--text)', opacity:0.8, margin:0, paddingLeft:'34px'}}>{c.content}</p>
                                    </div>
                                );
                            })}
                            <div ref={commentEndRef} />
                        </div>

                        {/* 댓글 입력 */}
                        <div style={{display:'flex', gap:'10px', alignItems:'flex-end'}}>
                            <KorTextarea
                                value={commentInput}
                                onChange={e=>setCommentInput(e.target.value)}
                                onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); submitComment(); } }}
                                placeholder="댓글을 입력하세요… (Enter로 전송, Shift+Enter로 줄바꿈)"
                                rows={2}
                                style={{flex:1, resize:'none', fontSize:'13px', fontWeight:600, lineHeight:1.6, background:'var(--glass-bg2)', border:'1.5px solid var(--glass-border)', borderRadius:'14px', padding:'12px 16px', color:'var(--text)', fontFamily:'Pretendard,sans-serif', outline:'none'}}
                                onFocus={e=>{e.target.style.borderColor='var(--accent)'; e.target.style.boxShadow='0 0 0 3px rgba(79,110,247,0.1)';}}
                                onBlur={e=>{e.target.style.borderColor='var(--glass-border)'; e.target.style.boxShadow='none';}}
                            />
                            <button
                                onClick={submitComment}
                                disabled={commentLoading || !commentInput.trim()}
                                className="btn-primary"
                                style={{flexShrink:0, padding:'12px 20px', opacity: !commentInput.trim() ? 0.4 : 1, alignSelf:'flex-end'}}>
                                {commentLoading ? '...' : '전송'}
                            </button>
                        </div>
                    </div>
                </div>
            );

            /* ── Write ── */
            if (mode === 'write') return (
                <div className="anim-fade-up" style={{maxWidth:'760px', margin:'0 auto'}}>
                    <button onClick={()=>setMode('list')} style={{background:'none', border:'none', cursor:'pointer', color:'var(--accent)', fontWeight:800, fontSize:'13px', fontFamily:'Pretendard,sans-serif', marginBottom:'16px', padding:'0'}}>
                        ← 취소
                    </button>
                    <div className="glass-card-lg" style={{padding:'32px 36px'}}>
                        <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', marginBottom:'24px'}}>✏️ 새 글 작성</h3>

                        {/* 카테고리 선택 */}
                        <div style={{marginBottom:'20px'}}>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'10px', color:'var(--text)'}}>Category</p>
                            <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
                                {CATEGORIES.filter(c=>c!=='전체').map(c => (
                                    <button key={c} onClick={()=>setWCategory(c)}
                                        style={{padding:'8px 18px', borderRadius:'99px', border: wCategory===c ? '2px solid var(--accent)' : '1.5px solid var(--glass-border)', background: wCategory===c ? 'rgba(79,110,247,0.15)' : 'var(--glass-bg2)', cursor:'pointer', fontSize:'12px', fontWeight:800, color: wCategory===c ? 'var(--accent)' : 'var(--text-sub)', fontFamily:'Pretendard,sans-serif', transition:'all 0.15s'}}>
                                        {CAT_ICON[c]} {c}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 제목 */}
                        <div style={{marginBottom:'16px'}}>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'8px', color:'var(--text)'}}>Title</p>
                            <input
                                value={wTitle} onChange={e=>setWTitle(e.target.value)}
                                placeholder="제목을 입력하세요"
                                style={{width:'100%', fontSize:'16px', fontWeight:800}}
                            />
                        </div>

                        {/* 본문 */}
                        <div style={{marginBottom:'24px'}}>
                            <p style={{fontSize:'9px', fontWeight:900, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.2em', marginBottom:'8px', color:'var(--text)'}}>Content</p>
                            <KorTextarea
                                value={wContent} onChange={e=>setWContent(e.target.value)}
                                placeholder="내용을 입력하세요..."
                                rows={10}
                                style={{width:'100%', resize:'vertical', fontSize:'14px', fontWeight:600, lineHeight:1.7, background:'var(--glass-bg2)', border:'1.5px solid var(--glass-border)', borderRadius:'16px', padding:'16px 18px', color:'var(--text)', fontFamily:'Pretendard,sans-serif', outline:'none'}}
                                onFocus={e=>{e.target.style.borderColor='var(--accent)'; e.target.style.boxShadow='0 0 0 3px rgba(79,110,247,0.12)';}}
                                onBlur={e=>{e.target.style.borderColor='var(--glass-border)'; e.target.style.boxShadow='none';}}
                            />
                        </div>

                        <div style={{display:'flex', gap:'10px', justifyContent:'flex-end'}}>
                            <button onClick={()=>setMode('list')} style={{padding:'12px 24px', borderRadius:'16px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', fontSize:'13px', fontWeight:800, color:'var(--text-sub)', fontFamily:'Pretendard,sans-serif'}}>취소</button>
                            <button onClick={submitPost} disabled={submitting || !wTitle.trim() || !wContent.trim()} className="btn-primary" style={{padding:'12px 32px', opacity: (!wTitle.trim()||!wContent.trim()) ? 0.4 : 1}}>
                                {submitting ? '게시 중...' : '게시하기'}
                            </button>
                        </div>
                    </div>
                </div>
            );

            /* ── List ── */
            return (
                <div className="anim-fade-up">
                    {/* 헤더 */}
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                        <div>
                            <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', letterSpacing:'-0.3px'}}>🔥 커뮤니티</h3>
                            <p style={{fontSize:'10px', fontWeight:700, opacity:0.3, textTransform:'uppercase', letterSpacing:'0.15em', marginTop:'3px'}}>{posts.length} Posts</p>
                        </div>
                        <button className="btn-primary" onClick={()=>setMode('write')}>+ 글 쓰기</button>
                    </div>

                    {/* 카테고리 필터 */}
                    <div style={{display:'flex', gap:'8px', marginBottom:'20px', flexWrap:'wrap'}}>
                        {CATEGORIES.map(c => (
                            <button key={c} onClick={()=>setFilterCat(c)}
                                style={{padding:'7px 16px', borderRadius:'99px', border: filterCat===c ? '2px solid var(--accent)' : '1.5px solid var(--glass-border)', background: filterCat===c ? 'rgba(79,110,247,0.15)' : 'var(--glass-bg2)', cursor:'pointer', fontSize:'11px', fontWeight:800, color: filterCat===c ? 'var(--accent)' : 'var(--text-sub)', fontFamily:'Pretendard,sans-serif', transition:'all 0.15s'}}>
                                {c === '전체' ? '# 전체' : `${CAT_ICON[c]} ${c}`}
                            </button>
                        ))}
                    </div>

                    {/* 게시글 목록 */}
                    <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                        {filteredPosts.map((p,i) => (
                            <div key={p.id} className="glass-card" onClick={()=>openDetail(p)}
                                style={{padding:'20px 24px', cursor:'pointer', transition:'all 0.2s', animation:`fadeInUp 0.3s ease ${i*0.05}s both'`}}
                                onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 8px 32px rgba(79,110,247,0.15)';}}
                                onMouseLeave={e=>{e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='';}}>
                                <div style={{display:'flex', alignItems:'flex-start', gap:'14px'}}>
                                    <div style={{width:'40px', height:'40px', borderRadius:'14px', background:'rgba(79,110,247,0.1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'18px', flexShrink:0}}>{CAT_ICON[p.category] || '📝'}</div>
                                    <div style={{flex:1, minWidth:0}}>
                                        <div style={{display:'flex', alignItems:'center', gap:'8px', marginBottom:'6px'}}>
                                            <span style={{padding:'2px 10px', borderRadius:'99px', background:'rgba(79,110,247,0.1)', fontSize:'10px', fontWeight:800, color:'var(--accent)'}}>{p.category}</span>
                                        </div>
                                        <div style={{fontSize:'15px', fontWeight:800, color:'var(--text)', marginBottom:'6px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.title}</div>
                                        <div style={{fontSize:'12px', fontWeight:600, opacity:0.5, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', lineHeight:1.5}}>{p.content}</div>
                                        <div style={{display:'flex', gap:'12px', marginTop:'10px'}}>
                                            <span style={{fontSize:'10px', fontWeight:700, opacity:0.4}}>{p.authorName}</span>
                                            <span style={{fontSize:'10px', fontWeight:700, opacity:0.3}}>{p.date}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {filteredPosts.length === 0 && (
                            <div style={{textAlign:'center', padding:'60px', fontSize:'12px', fontWeight:700, opacity:0.2, textTransform:'uppercase', letterSpacing:'0.15em'}}>
                                {filterCat === '전체' ? '첫 글을 작성해보세요' : `${filterCat} 카테고리의 글이 없습니다`}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ─── NoticeView ──────────────────────────────────────────────────────

        function NoticeView({ isAdmin, announcements, onAdd }) {
            const [showForm, setShowForm] = useState(false);
            const [title,   setTitle]    = useState('');
            const [content, setContent]  = useState('');
            const [loading, setLoading]  = useState(false);

            const submit = async () => {
                if (!title.trim() || !content.trim()) return;
                setLoading(true);
                await onAdd(title.trim(), content.trim());
                setLoading(false);
                setTitle(''); setContent(''); setShowForm(false);
            };

            return (
                <div className="anim-fade-up">
                    {/* 공지 작성 폼 */}
                    {isAdmin && showForm && (
                        <div className="glass-card" style={{padding:'24px 28px', marginBottom:'16px'}}>
                            <h4 style={{fontSize:'14px', fontWeight:900, color:'var(--text)', marginBottom:'18px'}}>📢 공지 작성</h4>
                            <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
                                <KorInput value={title} onChange={e=>setTitle(e.target.value)} placeholder="공지 제목" style={{fontSize:'15px', fontWeight:800}} />
                                <KorTextarea value={content} onChange={e=>setContent(e.target.value)} placeholder="공지 내용을 입력하세요..." rows={5}
                                    style={{resize:'vertical', fontSize:'13px', fontWeight:600, lineHeight:1.7, background:'var(--glass-bg2)', border:'1.5px solid var(--glass-border)', borderRadius:'16px', padding:'14px 18px', color:'var(--text)', fontFamily:'Pretendard,sans-serif', outline:'none'}}
                                    onFocus={e=>{e.target.style.borderColor='var(--accent)';}} onBlur={e=>{e.target.style.borderColor='var(--glass-border)';}} />
                                <div style={{display:'flex', gap:'10px', justifyContent:'flex-end'}}>
                                    <button onClick={()=>setShowForm(false)} style={{padding:'10px 20px', borderRadius:'14px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', fontSize:'12px', fontWeight:800, color:'var(--text-sub)', fontFamily:'Pretendard,sans-serif'}}>취소</button>
                                    <button className="btn-primary" onClick={submit} disabled={loading || !title.trim() || !content.trim()} style={{padding:'10px 24px', opacity:(!title.trim()||!content.trim())?0.4:1}}>
                                        {loading ? '등록 중...' : '공지 등록'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="glass-card-lg" style={{padding:'32px'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'24px'}}>
                            <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', letterSpacing:'-0.3px'}}>📢 공지사항</h3>
                            {isAdmin && !showForm && (
                                <button className="btn-primary" onClick={()=>setShowForm(true)}>+ 공지 등록</button>
                            )}
                        </div>
                        <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
                            {announcements.map((a,i) => (
                                <div key={a.id} className="glass-inset" style={{padding:'20px 24px', animation:`fadeInUp 0.3s ease ${i*0.06}s both`, transition:'all 0.2s'}}
                                    onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)'}}
                                    onMouseLeave={e=>{e.currentTarget.style.transform=''}}>
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px'}}>
                                        <h4 style={{fontSize:'15px', fontWeight:800, color:'var(--accent)'}}>{a.title}</h4>
                                        <span style={{fontSize:'9px', fontWeight:700, opacity:0.3, textTransform:'uppercase', letterSpacing:'0.1em', flexShrink:0, marginLeft:'12px'}}>{a.date}</span>
                                    </div>
                                    <p style={{fontSize:'13px', fontWeight:600, opacity:0.65, lineHeight:1.6}}>{a.content}</p>
                                </div>
                            ))}
                            {announcements.length === 0 && (
                                <div style={{textAlign:'center', padding:'48px', fontSize:'12px', fontWeight:700, opacity:0.2, textTransform:'uppercase', letterSpacing:'0.15em'}}>등록된 공지가 없습니다</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Planner ─────────────────────────────────────────────────────────

        function Planner({ todos, selectedDate, setSelectedDate, onAdd, onToggle, onDelete }) {
            const add = async (e) => {
                if (e.key === 'Enter' && e.target.value.trim()) {
                    await onAdd(e.target.value.trim(), selectedDate);
                    e.target.value = '';
                }
            };
            const filtered = todos.filter(t => t.date === selectedDate);
            const done = filtered.filter(t => t.completed).length;
            const progress = filtered.length ? Math.round(done/filtered.length*100) : 0;

            return (
                <div style={{maxWidth:'720px', margin:'0 auto'}} className="anim-fade-up">
                    {/* 헤더 */}
                    <div className="glass-card" style={{padding:'24px 28px', marginBottom:'16px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <div>
                            <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)', marginBottom:'4px'}}>📅 데일리 플래너</h3>
                            <div style={{fontSize:'11px', fontWeight:700, color:'var(--text-sub)'}}>
                                {filtered.length > 0 ? `${done}/${filtered.length} 완료 · ${progress}%` : '오늘의 목표를 추가해보세요'}
                            </div>
                        </div>
                        <KorInput type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} />
                    </div>

                    {/* 프로그레스 바 */}
                    {filtered.length > 0 && (
                        <div style={{height:'4px', background:'var(--glass-bg2)', borderRadius:'99px', marginBottom:'16px', overflow:'hidden'}}>
                            <div style={{height:'100%', width:`${progress}%`, background:'linear-gradient(90deg, var(--accent), var(--accent2))', borderRadius:'99px', transition:'width 0.5s ease'}}></div>
                        </div>
                    )}

                    {/* 입력 */}
                    <div style={{position:'relative', marginBottom:'16px'}}>
                        <input
                            style={{paddingRight:'48px', fontSize:'15px', fontWeight:700}}
                            placeholder="⏎  새 목표 입력 후 Enter"
                            onKeyDown={add}
                        />
                    </div>

                    {/* 투두 리스트 */}
                    <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                        {filtered.map((t,i) => (
                            <div key={t.id} className="todo-item" style={{animationDelay:`${i*0.05}s`}}>
                                <div style={{display:'flex', alignItems:'center', gap:'14px', flex:1}}>
                                    <div
                                        onClick={() => onToggle(t.id)}
                                        style={{width:'24px', height:'24px', borderRadius:'8px', flexShrink:0, cursor:'pointer', transition:'all 0.2s', border: t.completed ? 'none' : '2px solid var(--glass-border)', background: t.completed ? 'var(--accent)' : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', boxShadow: t.completed ? '0 2px 8px rgba(79,110,247,0.35)' : 'none'}}>
                                        {t.completed && <span style={{color:'#fff', fontSize:'12px', fontWeight:900}}>✓</span>}
                                    </div>
                                    <span style={{fontSize:'14px', fontWeight:700, color:'var(--text)', textDecoration: t.completed ? 'line-through' : 'none', opacity: t.completed ? 0.3 : 1, transition:'all 0.2s'}}>{t.text}</span>
                                </div>
                                <button
                                    onClick={() => onDelete(t.id)}
                                    style={{opacity:0, fontSize:'18px', color:'#ef4444', background:'none', border:'none', cursor:'pointer', padding:'4px 8px', transition:'opacity 0.2s'}}
                                    onMouseEnter={e=>e.currentTarget.style.opacity='1'}
                                    onMouseLeave={e=>e.currentTarget.style.opacity='0'}>×</button>
                            </div>
                        ))}
                        {filtered.length === 0 && (
                            <div style={{textAlign:'center', padding:'48px', fontSize:'12px', fontWeight:700, opacity:0.2, textTransform:'uppercase', letterSpacing:'0.15em'}}>이 날은 아직 계획이 없어요</div>
                        )}
                    </div>
                </div>
            );
        }

        // ─── CalendarView ────────────────────────────────────────────────────

        function CalendarView({ calendarGroup, calendarEvents, onCreateGroup, onJoinGroup, onLeaveGroup, onAddEvent, onDeleteEvent, onKickMember, isMobileUI, currentUser, userRole }) {
            const now = new Date();
            const year = now.getFullYear(); const month = now.getMonth();
            const days = useMemo(() => {
                const first = new Date(year, month, 1).getDay();
                const last  = new Date(year, month + 1, 0).getDate();
                const arr = [];
                for (let i = 0; i < first; i++) arr.push(null);
                for (let i = 1; i <= last; i++) arr.push(i);
                return arr;
            }, [year, month]);

            const [addingDay,    setAddingDay]    = useState(null);
            const [eventText,    setEventText]    = useState('');
            const [eventEndDay,  setEventEndDay]  = useState('');
            const [saving,       setSaving]       = useState(false);
            // 그룹 관련 상태
            const [groupView,    setGroupView]    = useState('none'); // 'none'|'create'|'join'
            const [groupName,    setGroupName]    = useState('');
            const [joinCode,     setJoinCode]     = useState('');
            const [groupLoading, setGroupLoading] = useState(false);
            const [showGroupInfo, setShowGroupInfo] = useState(false); // 모바일: 그룹 정보 시트

            // 일정 추가/삭제 권한: 방장 또는 선생님/관리자
            const isCalAdmin = calendarGroup && (
                calendarGroup.ownerUid === currentUser?.uid ||
                userRole === '선생님' || userRole === '관리자'
            );
            // 방장 여부 (멤버 내보내기용)
            const isCalOwner = calendarGroup?.ownerUid === currentUser?.uid;

            const clickDay = (day) => {
                if (!calendarGroup || !day) return;
                setAddingDay(d => d === day ? null : day);
                setEventText(''); setEventEndDay('');
            };
            const confirmEvent = async () => {
                if (!eventText.trim()) return;
                setSaving(true);
                const endD = parseInt(eventEndDay);
                await onAddEvent(addingDay, month, year, eventText.trim(), (!isNaN(endD) && endD > addingDay) ? endD : null);
                setSaving(false); setAddingDay(null); setEventText(''); setEventEndDay('');
            };

            const createGroup = async () => {
                if (!groupName.trim() || groupLoading) return;
                setGroupLoading(true);
                await onCreateGroup(groupName.trim());
                setGroupLoading(false); setGroupName(''); setGroupView('none');
            };
            const joinGroup = async () => {
                if (!joinCode.trim() || groupLoading) return;
                setGroupLoading(true);
                await onJoinGroup(joinCode.trim());
                setGroupLoading(false); setJoinCode(''); setGroupView('none');
            };

            const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

            const gap = isMobileUI ? 3 : 6;

            // ── 공통: 달력 그리드 ──────────────────────────────────────────────
            const CalGrid = () => (
                <>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:`${gap}px`, marginBottom:`${gap}px`}}>
                        {['일','월','화','수','목','금','토'].map((d,i) => (
                            <div key={d} style={{textAlign:'center', fontSize: isMobileUI ? '9px' : '10px', fontWeight:800, opacity:0.3, padding:'4px 0', color: i===0?'#ef4444':i===6?'#60a5fa':'var(--text-sub)'}}>{d}</div>
                        ))}
                    </div>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:`${gap}px`}}>
                        {days.map((d, i) => {
                            const isToday = d === now.getDate();
                            const events  = d ? calendarEvents.filter(e => e.month === month && e.year === year && d >= e.day && d <= (e.endDay || e.day)) : [];
                            const isSelected = addingDay === d;
                            return (
                                <div key={i}
                                    className={d ? (isMobileUI ? 'cal-cell-mob' : 'cal-cell') : ''}
                                    style={{cursor: d ? 'pointer' : 'default', opacity: d ? 1 : 0,
                                        border: isSelected ? '2px solid var(--accent)' : isToday ? '2px solid var(--accent)' : undefined,
                                        background: isSelected ? 'rgba(79,110,247,0.12)' : isToday ? 'rgba(79,110,247,0.06)' : undefined}}
                                    onClick={() => clickDay(d)}>
                                    {d && <>
                                        <div style={{fontSize: isMobileUI ? '10px' : '12px', fontWeight: isToday ? 900 : 700, color: isToday||isSelected ? 'var(--accent)' : 'var(--text)', opacity: isToday||isSelected ? 1 : 0.6, marginBottom: isMobileUI ? '2px' : '4px', textAlign: isMobileUI ? 'center' : undefined}}>{d}</div>
                                        {isMobileUI ? (
                                            events.length > 0 && (
                                                <div style={{display:'flex', justifyContent:'center', gap:'2px', flexWrap:'wrap'}}>
                                                    {events.slice(0,3).map((_,idx) => <div key={idx} style={{width:'5px', height:'5px', borderRadius:'50%', background:'var(--accent)', flexShrink:0}} />)}
                                                </div>
                                            )
                                        ) : (
                                            <div style={{display:'flex', flexDirection:'column', gap:'3px'}}>
                                                {events.map((e, idx) => (
                                                    <div key={idx} onClick={ev=>ev.stopPropagation()}
                                                        style={{display:'flex', alignItems:'center', gap:'3px', padding:'2px 5px 2px 6px', borderRadius:'6px', fontSize:'8px', fontWeight:800, color:'#fff', background:'var(--accent)', overflow:'hidden', minWidth:0}}>
                                                        <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1}}>{e.text}</span>
                                                        <span onClick={()=>onDeleteEvent(e.id)} style={{flexShrink:0, cursor:'pointer', opacity:0.6, fontSize:'10px', lineHeight:1, marginLeft:'2px'}}
                                                            onMouseEnter={ev=>ev.currentTarget.style.opacity='1'} onMouseLeave={ev=>ev.currentTarget.style.opacity='0.6'}>×</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </>}
                                </div>
                            );
                        })}
                    </div>

                    {/* 날짜 클릭 시 일정 패널 */}
                    {addingDay && (
                        <div style={{marginTop: isMobileUI ? '12px' : '20px', padding: isMobileUI ? '12px 14px' : '14px 20px', borderRadius:'16px', background:'var(--glass-bg2)', border:'1px solid var(--glass-border)', animation:'slideUp 0.2s ease both'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px'}}>
                                <span style={{fontSize:'13px', fontWeight:900, color:'var(--accent)'}}>{addingDay}일 일정</span>
                                <button onClick={()=>setAddingDay(null)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:'var(--text-sub)',opacity:0.4,lineHeight:1}}>×</button>
                            </div>
                            {(() => {
                                const dayEvts = calendarEvents.filter(e => e.month === month && e.year === year && addingDay >= e.day && addingDay <= (e.endDay || e.day));
                                return dayEvts.length > 0 ? (
                                    <div style={{display:'flex', flexDirection:'column', gap:'6px', marginBottom:'10px'}}>
                                        {dayEvts.map((e, idx) => (
                                            <div key={idx} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 12px', borderRadius:'10px', background:'rgba(79,110,247,0.08)', border:'1px solid rgba(79,110,247,0.18)'}}>
                                                <div style={{flex:1, minWidth:0}}>
                                                    <span style={{fontSize:'13px', fontWeight:700, color:'var(--text)'}}>{e.text}</span>
                                                    {e.endDay && e.endDay !== e.day && <span style={{fontSize:'10px', fontWeight:700, opacity:0.45, marginLeft:'8px'}}>{e.day}~{e.endDay}일</span>}
                                                </div>
                                                {isCalAdmin && <button onClick={()=>onDeleteEvent(e.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:'16px',color:'#ef4444',opacity:0.5,lineHeight:1,flexShrink:0}}
                                                    onMouseEnter={ev=>ev.currentTarget.style.opacity='1'} onMouseLeave={ev=>ev.currentTarget.style.opacity='0.5'}>×</button>}
                                            </div>
                                        ))}
                                    </div>
                                ) : <div style={{fontSize:'11px', opacity:0.3, marginBottom:'10px', fontWeight:700}}>등록된 일정이 없습니다</div>;
                            })()}
                            {isCalAdmin && (
                                <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                                    <div style={{display:'flex', gap:'8px'}}>
                                        <KorInput autoFocus value={eventText} onChange={e=>setEventText(e.target.value)}
                                            onKeyDown={e=>{ if(e.key==='Enter') confirmEvent(); if(e.key==='Escape') setAddingDay(null); }}
                                            placeholder="일정 이름 입력"
                                            style={{flex:1, fontSize:'13px', fontWeight:700}} />
                                        <button className="btn-primary" onClick={confirmEvent} disabled={saving||!eventText.trim()} style={{flexShrink:0, padding:'10px 16px', opacity:!eventText.trim()?0.4:1}}>
                                            {saving?'...':'추가'}
                                        </button>
                                    </div>
                                    <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
                                        <span style={{fontSize:'11px', fontWeight:700, opacity:0.4, whiteSpace:'nowrap'}}>{addingDay}일</span>
                                        <span style={{fontSize:'11px', opacity:0.3}}>~</span>
                                        <KorInput type="number" value={eventEndDay} onChange={e=>setEventEndDay(e.target.value)}
                                            placeholder={`종료일 (선택, ${addingDay+1}~31)`} min={addingDay+1} max={31}
                                            style={{flex:1, fontSize:'12px', fontWeight:700}} />
                                        <span style={{fontSize:'11px', fontWeight:700, opacity:0.4}}>일</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </>
            );

            // ── 그룹 없음: 모바일 ─────────────────────────────────────────────
            if (!calendarGroup && isMobileUI) return (
                <div className="anim-fade-up" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'60vh', padding:'32px 24px', gap:'0'}}>
                    <div style={{fontSize:'52px', marginBottom:'16px'}}>🗓️</div>
                    <h3 style={{fontSize:'20px', fontWeight:900, color:'var(--text)', marginBottom:'8px', textAlign:'center'}}>달력 그룹</h3>
                    <p style={{fontSize:'13px', fontWeight:700, opacity:0.4, textAlign:'center', marginBottom:'32px', lineHeight:1.6}}>그룹을 만들거나 참여하면<br/>멤버들과 일정을 공유할 수 있어요</p>

                    {groupView === 'none' && (
                        <div style={{display:'flex', flexDirection:'column', gap:'12px', width:'100%', maxWidth:'320px'}}>
                            <button onClick={()=>setGroupView('create')} className="btn-primary" style={{padding:'16px', fontSize:'15px', fontWeight:900, borderRadius:'18px'}}>
                                + 그룹 만들기
                            </button>
                            <button onClick={()=>setGroupView('join')}
                                style={{padding:'16px', fontSize:'15px', fontWeight:900, borderRadius:'18px', border:'1.5px solid var(--glass-border)', background:'var(--glass-bg2)', cursor:'pointer', color:'var(--text)', fontFamily:'Pretendard,sans-serif'}}>
                                코드로 참여하기
                            </button>
                        </div>
                    )}

                    {groupView === 'create' && (
                        <div style={{width:'100%', maxWidth:'320px', display:'flex', flexDirection:'column', gap:'12px'}}>
                            <p style={{fontSize:'11px', fontWeight:900, opacity:0.4, textTransform:'uppercase', letterSpacing:'0.15em', color:'var(--text)'}}>그룹 이름</p>
                            <KorInput autoFocus value={groupName} onChange={e=>setGroupName(e.target.value)}
                                onKeyDown={e=>e.key==='Enter'&&createGroup()}
                                placeholder="예: 3학년 5반" style={{width:'100%', fontSize:'14px', fontWeight:700}} />
                            <div style={{display:'flex', gap:'8px'}}>
                                <button onClick={()=>{setGroupView('none');setGroupName('');}} style={{flex:1,padding:'13px',borderRadius:'14px',border:'1.5px solid var(--glass-border)',background:'var(--glass-bg2)',cursor:'pointer',fontSize:'13px',fontWeight:800,color:'var(--text-sub)',fontFamily:'Pretendard,sans-serif'}}>취소</button>
                                <button onClick={createGroup} disabled={!groupName.trim()||groupLoading} className="btn-primary" style={{flex:1,padding:'13px',opacity:!groupName.trim()?0.4:1}}>{groupLoading?'생성 중..':'만들기'}</button>
                            </div>
                        </div>
                    )}

                    {groupView === 'join' && (
                        <div style={{width:'100%', maxWidth:'320px', display:'flex', flexDirection:'column', gap:'12px'}}>
                            <p style={{fontSize:'11px', fontWeight:900, opacity:0.4, textTransform:'uppercase', letterSpacing:'0.15em', color:'var(--text)'}}>참여 코드</p>
                            <KorInput autoFocus value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())}
                                onKeyDown={e=>e.key==='Enter'&&joinGroup()}
                                placeholder="6자리 코드" style={{width:'100%', fontSize:'18px', fontWeight:900, textAlign:'center', letterSpacing:'0.3em', fontFamily:'monospace'}} />
                            <div style={{display:'flex', gap:'8px'}}>
                                <button onClick={()=>{setGroupView('none');setJoinCode('');}} style={{flex:1,padding:'13px',borderRadius:'14px',border:'1.5px solid var(--glass-border)',background:'var(--glass-bg2)',cursor:'pointer',fontSize:'13px',fontWeight:800,color:'var(--text-sub)',fontFamily:'Pretendard,sans-serif'}}>취소</button>

                        {groupView === 'join' && (

                                    <button onClick={joinGroup} disabled={!joinCode.trim()||groupLoading} className="btn-primary" style={{flex:1,padding:'8px',fontSize:'11px',opacity:!joinCode.trim()?0.4:1}}>{groupLoading?'..':'참여'}</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            // ── 그룹 있음: 모바일 ─────────────────────────────────────────────
            if (isMobileUI) return (
                <div className="anim-fade-up">
                    {/* 그룹 정보 바 */}
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'12px', padding:'10px 14px', borderRadius:'14px', background:'var(--glass-bg2)', border:'1px solid var(--glass-border)'}}>
                        <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                            <span style={{fontSize:'18px'}}>📅</span>
                            <div>
                                <div style={{fontSize:'13px', fontWeight:900, color:'var(--text)'}}>{calendarGroup.name}</div>
                                <div style={{fontSize:'10px', fontWeight:800, color:'var(--accent)', fontFamily:'monospace', letterSpacing:'0.15em'}}>코드: {calendarGroup.code}</div>
                            </div>
                        </div>
                        <button onClick={()=>{ if(window.confirm('그룹에서 나가시겠습니까?')) onLeaveGroup(); }}
                            style={{padding:'6px 12px', borderRadius:'10px', border:'1px solid rgba(239,68,68,0.3)', background:'rgba(239,68,68,0.06)', cursor:'pointer', fontSize:'11px', fontWeight:800, color:'#ef4444', fontFamily:'Pretendard,sans-serif'}}>
                            나가기
                        </button>
                    </div>

                    {/* 달력 */}
                    <div className="glass-card-lg" style={{padding:'16px'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'12px'}}>
                            <div>
                                <h3 style={{fontSize:'15px', fontWeight:900, color:'var(--text)'}}>🗓️ 공용 달력</h3>
                                <p style={{fontSize:'10px', fontWeight:700, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.15em', marginTop:'2px'}}>{MONTHS[month]} {year}</p>
                            </div>
                            <span style={{fontSize:'10px', fontWeight:800, opacity:0.4, color:'var(--accent)'}}>날짜 탭 → 일정</span>
                        </div>

                    </div>

            // ── 그룹 있음: PC ─────────────────────────────────────────────────
            return (
                <div className="anim-fade-up" style={{display:'grid', gridTemplateColumns:'1fr 280px', gap:'20px', alignItems:'start'}}>

                    <div className="glass-card-lg" style={{padding:'28px 32px'}}>
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                            <div>
                                <h3 style={{fontSize:'18px', fontWeight:900, color:'var(--text)'}}>🗓️ 공용 달력</h3>
                                <p style={{fontSize:'10px', fontWeight:700, opacity:0.35, textTransform:'uppercase', letterSpacing:'0.15em', marginTop:'2px'}}>{MONTHS[month]} {year}</p>

                    {/* 사이드: 그룹 정보 */}

                                {(calendarGroup.members||[]).map(uid => {
                                    const isOwner = uid === calendarGroup.ownerUid;
                                    const isMe = uid === currentUser?.uid;
                                    return (
                                        <div key={uid} style={{display:'flex', alignItems:'center', gap:'8px', padding:'6px 8px', borderRadius:'10px', background:'var(--glass-bg2)'}}>

                                            <span style={{flex:1, fontSize:'11px', fontWeight:700, color:'var(--text)', opacity:0.8}}>{uid.substring(0,8)}…{isMe?' (나)':''}</span>
                                            {isOwner && <span style={{fontSize:'8px', fontWeight:900, padding:'1px 5px', borderRadius:'99px', background:'rgba(251,191,36,0.15)', color:'#f59e0b'}}>방장</span>}
