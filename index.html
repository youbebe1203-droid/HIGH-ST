    <style>

        :root {

        }

        }
        .theme-midnight {
            --bg:           #000000;
            --bg2:          #080808;
            --text:         #ffffff;
            --text-sub:     #555555;
            --accent:       #a78bfa;
            --accent2:      #7c3aed;
            --glass-bg:     rgba(255,255,255,0.04);
            --glass-bg2:    rgba(255,255,255,0.02);
            --glass-border: rgba(255,255,255,0.06);
            --glass-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.03) inset;
            --card-shadow:  0 4px 32px rgba(0,0,0,0.6);
        }

        /* в”Җв”Җ кё°ліё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);

        /* в”Җв”Җ лӘЁл°”мқј / нғңлё”лҰҝ л Ҳмқҙм•„мӣғ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .mobile-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--glass-bg);

            border-bottom: 1px solid var(--glass-border);

        }

        }

        /* в”Җв”Җ нӮӨн”„л Ҳмһ„ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes floatY {
            0%,100% { transform: translateY(0px); }

        }
        @keyframes breathe {
            0%,100% { transform: scale(1)   rotate(0deg);   opacity: 0.5; }
            33%      { transform: scale(1.08) rotate(3deg);  opacity: 0.7; }
            66%      { transform: scale(0.95) rotate(-2deg); opacity: 0.4; }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        @keyframes pulseGlow {

        }
        @keyframes gradientSlide {
            0%   { background-position: 0%   50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0%   50%; }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-16px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(16px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.93); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes timerPulse {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.6; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* в”Җв”Җ лЎңк·ёмқё л°°кІҪ мҳӨлЎңлқј м• лӢҲл©”мқҙм…ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        @keyframes drift1 {
            0%   { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
            18%  { transform: translate(12vw,   6vh)  scale(1.1)  rotate(8deg); }
            40%  { transform: translate(20vw,  -4vh)  scale(0.97) rotate(-5deg); }
            62%  { transform: translate(8vw,   14vh)  scale(1.06) rotate(6deg); }
            80%  { transform: translate(-6vw,   8vh)  scale(1.03) rotate(-3deg); }

        }
        @keyframes drift2 {
            0%   { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
            22%  { transform: translate(-14vw, -8vh)  scale(1.12) rotate(-10deg); }
            48%  { transform: translate(-22vw,  6vh)  scale(0.94) rotate(6deg); }
            70%  { transform: translate(-8vw,  -14vh) scale(1.06) rotate(-4deg); }
            88%  { transform: translate(6vw,   -6vh)  scale(1.02) rotate(3deg); }
            100% { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
        }
        @keyframes drift3 {
            0%   { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }

            58%  { transform: translate(10vw,  -22vh) scale(0.91) rotate(-7deg); }
            80%  { transform: translate(-4vw,  -10vh) scale(1.05) rotate(5deg); }
            100% { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
        }
        @keyframes drift4 {
            0%   { transform: translate(0vw,   0vh)   scale(1)    rotate(0deg); }
            25%  { transform: translate(-10vw, 10vh)  scale(1.09) rotate(-9deg); }
            55%  { transform: translate(-18vw,  4vh)  scale(0.95) rotate(5deg); }
            78%  { transform: translate(-6vw,  14vh)  scale(1.04) rotate(-3deg); }
            100% { transform: translate(0vw,   0vh)   scale(1)    rotate(0deg); }
        }
        @keyframes drift5 {
            0%   { transform: translate(0vw,   0vh)   scale(1); }
            38%  { transform: translate(10vw, -8vh)   scale(1.18); }
            70%  { transform: translate(-8vw,  8vh)   scale(0.9); }
            100% { transform: translate(0vw,   0vh)   scale(1); }
        }

        /* в”Җв”Җ лІ„нҠј л¶„лҰ¬ / н•©м№ҳкё° м• лӢҲл©”мқҙм…ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        @keyframes splitBtnLeft {
            0%   { opacity: 0; filter: blur(8px); transform: translateX(22%); }
            45%  { filter: blur(0); opacity: 1; }
            72%  { transform: translateX(-3px); }
            100% { opacity: 1; filter: blur(0); transform: translateX(0); }
        }
        @keyframes splitBtnRight {
            0%   { opacity: 0; filter: blur(8px); transform: translateX(-22%); }

            100% { opacity: 1; filter: blur(0); transform: translateX(0); }
        }
        @keyframes mergeBtnLeft {
            0%   { opacity: 1; filter: blur(0); transform: translateX(0); }

            100% { opacity: 0; filter: blur(8px); transform: translateX(22%); }
        }
        @keyframes mergeBtnRight {
            0%   { opacity: 1; filter: blur(0); transform: translateX(0); }
            55%  { filter: blur(0); }
            100% { opacity: 0; filter: blur(8px); transform: translateX(-22%); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        /* в”Җв”Җ кёҖлһҳмҠӨ м№ҙл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 28px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glass-shadow), 0 12px 40px rgba(0,0,0,0.1);
        }
        .glass-card-lg {
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 40px;
        }
        .glass-inset {
            background: var(--glass-bg2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* в”Җв”Җ мӮ¬мқҙл“ңл°” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-right: 1px solid var(--glass-border);
            box-shadow: 4px 0 32px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            padding: 28px 20px;
            z-index: 30;
            overflow: hidden;
        }

        /* в”Җв”Җ мӮ¬мқҙл“ңл°” м•„мқҙн…ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 13px 18px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-sub);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            margin-bottom: 4px;
            position: relative;
            overflow: hidden;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: var(--glass-bg2);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .nav-item:hover::before { opacity: 1; }
        .nav-item:hover { color: var(--accent); transform: translateX(3px); }
        .nav-item.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 20px rgba(79,110,247,0.35);
            transform: none;
        }
        .nav-item.active::before { display: none; }
        .nav-item .icon { font-size: 16px; flex-shrink: 0; }

        /* в”Җв”Җ м„№м…ҳ л Ҳмқҙлё” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .nav-label {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-sub);
            opacity: 0.45;
            padding: 0 18px;
            margin: 18px 0 8px;
        }

        /* в”Җв”Җ лұғм§Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .badge-student  { background: rgba(34,197,94,0.12); color: #16a34a; }
        .badge-teacher  { background: rgba(168,85,247,0.12); color: #9333ea; }
        .badge-admin    { background: rgba(239,68,68,0.12);  color: #dc2626; }

        /* в”Җв”Җ мһ…л Ҙ н•„л“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        input:not([type=checkbox]):not([type=file]):not([type=date]),
        select, textarea {
            background: var(--glass-bg2);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            border-radius: 16px;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Pretendard', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            backdrop-filter: blur(12px);
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
        }
        input[type=date] {
            background: var(--glass-bg2);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Pretendard', sans-serif;
            outline: none;
        }

        /* в”Җв”Җ лІ„нҠј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 12px 24px;
            font-size: 12px;
            font-weight: 900;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(79,110,247,0.3);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,110,247,0.4); }
        .btn-primary:active:not(:disabled) { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.5; cursor: default; }

        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 14px;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

        /* в”Җв”Җ мҠӨнҒ¬лЎӨл°” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 99px; }

        /* в”Җв”Җ м• лӢҲл©”мқҙм…ҳ мң нӢё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .anim-fade-up   { animation: fadeInUp  0.4s ease both; }
        .anim-scale-in  { animation: scaleIn   0.35s ease both; }
        .anim-fade-in   { animation: fadeIn    0.3s ease both; }
        .anim-float     { animation: floatY    4s ease-in-out infinite; }

        /* в”Җв”Җ л©”мқё н—ӨлҚ” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
        }

        /* в”Җв”Җ нһҲм–ҙлЎң л°°л„Ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .hero-banner {
            background: linear-gradient(135deg, var(--accent), var(--accent2), #a855f7, var(--accent));
            background-size: 300% 300%;
            animation: gradientSlide 8s ease infinite;
            border-radius: 32px;
            padding: 40px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .hero-blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            filter: blur(40px);
            animation: breathe 7s ease-in-out infinite;
        }

        /* в”Җв”Җ stat м№ҙл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .stat-card {
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 20px 24px;
            animation: scaleIn 0.4s ease both;
        }

        /* в”Җв”Җ нғҖмқҙлЁё м„№м…ҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .timer-box {
            background: rgba(2,6,20,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
        }
        .timer-active {
            animation: pulseGlow 2s ease-in-out infinite;
        }
        .timer-digits {
            font-family: 'Pretendard', monospace;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #fff;
            line-height: 1;
        }

        /* в”Җв”Җ нҲ¬л‘җ м•„мқҙн…ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-radius: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            transition: all 0.2s ease;
            animation: fadeInUp 0.3s ease both;
        }
        .todo-item:hover { transform: translateX(4px); border-color: var(--accent); }

        /* в”Җв”Җ мәҳлҰ°лҚ” м…Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .cal-cell {
            min-height: 100px;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg2);
            transition: all 0.2s;
        }
        .cal-cell:hover { background: var(--glass-bg); transform: scale(1.04); z-index: 2; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }

        /* в”Җв”Җ л©”мӢңм§Җ лІ„лё” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .msg-bubble-out { animation: slideInRight 0.3s ease both; }
        .msg-bubble-in  { animation: slideInLeft  0.3s ease both; }

        /* в”Җв”Җ м„№м…ҳ м§„мһ… л”ңл Ҳмқҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.10s; }
        .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.20s; }
    </style>
</head>
<body class="theme-light">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // в”Җв”Җв”Җ кіјлӘ© мғҒмҲҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        const SUBJECTS = [
            { id: 'мҲҳн•ҷ', icon: 'рҹ“җ', color: '#3b82f6' },
            { id: 'көӯм–ҙ', icon: 'рҹ“қ', color: '#ef4444' },
            { id: 'мҳҒм–ҙ', icon: 'рҹҢҗ', color: '#10b981' },
            { id: 'нғҗкө¬', icon: 'рҹ”¬', color: '#f59e0b' },
            { id: 'кё°нғҖ', icon: 'рҹ“ҡ', color: '#8b5cf6' },
        ];

        // в”Җв”Җв”Җ App в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

        function App() {
            const [view, setView]               = useState('лҢҖмӢңліҙл“ң');
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading]         = useState(true);
            const [userRole, setUserRole]       = useState('н•ҷмғқ');
            const [theme, setTheme]             = useState('light');

            const [todos, setTodos]               = useState([]);
            const [resources, setResources]       = useState([]);
            const [announcements, setAnnouncements] = useState([]);
            const [rooms, setRooms]               = useState([]);
            const [localRoomMessages, setLocalRoomMessages] = useState({});
            const [sharedEvents, setSharedEvents] = useState([]);
            const [posts, setPosts]               = useState([]);

            const [studyTime, setStudyTime]       = useState(0);
            const [suneungDate, setSuneungDate]   = useState('2025-11-13');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [studyGroups, setStudyGroups]   = useState([]);

            const unsubRefs = useRef([]);

            // н…Ңл§Ҳ м Ғмҡ© (лЎңм»¬)
            useEffect(() => {
                document.body.className = `theme-${theme}`;
            }, [theme]);

            const [needsSetup, setNeedsSetup] = useState(null); // { uid, googleName }
            const [showMore,   setShowMore]   = useState(false);

            // л””л°”мқҙмҠӨ к°җм§Җ
            const [winW, setWinW] = useState(window.innerWidth);
            useEffect(() => {
                const h = () => setWinW(window.innerWidth);
                window.addEventListener('resize', h);
                return () => window.removeEventListener('resize', h);
            }, []);
            const isMobileUI = winW < 1100; // лӘЁл°”мқј + нғңлё”лҰҝ

            // Firebase Auth мғҒнғң к°җм§Җ
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (fbUser) => {
                    if (fbUser) {
                        const snap = await db.collection('users').doc(fbUser.uid).get();
                        if (snap.exists) {
                            const profile = snap.data();
                            setNeedsSetup(null);
                            setCurrentUser({ uid: fbUser.uid, ...profile });
                            setUserRole(profile.role || 'н•ҷмғқ');
                            setTheme(profile.theme || 'light');
                            await loadData(fbUser.uid, profile);
                        } else {
                            // мӢ к·ң Google мӮ¬мҡ©мһҗ вҶ’ н”„лЎңн•„ м„Өм • нҷ”л©ҙ
                            setNeedsSetup({ uid: fbUser.uid, googleName: fbUser.displayName || '' });
                        }
                    } else {
                        // лЎңк·ём•„мӣғ: лҰ¬мҠӨл„Ҳ н•ҙм ң л°Ҹ мғҒнғң мҙҲкё°нҷ”
                        unsubRefs.current.forEach(u => u());
                        unsubRefs.current = [];
                        setCurrentUser(null);
                        setNeedsSetup(null);
                        setTodos([]); setResources([]); setAnnouncements([]);
                        setRooms([]); setLocalRoomMessages({}); setSharedEvents([]); setPosts([]);
                        setStudyGroups([]); setStudyTime(0);
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            // Firestore лҚ°мқҙн„° лЎңл“ң
            const loadData = async (uid, profile) => {
                // к°ңмқё лҚ°мқҙн„° (1нҡҢ мқҪкё°)
                const todosSnap = await db.collection('users').doc(uid)
                    .collection('todos').orderBy('date').get();
                setTodos(todosSnap.docs.map(d => ({ id: d.id, ...d.data() })));

                // studyTime: лӮ м§ңк°Җ л°”лҖҢл©ҙ 0 лҰ¬м…Ӣ
                const today = new Date().toISOString().split('T')[0];
                setStudyTime(profile.studyDate === today ? (profile.studyTime || 0) : 0);
                setSuneungDate(profile.suneungDate || '2025-11-13');

                // кіөмҡ© лҚ°мқҙн„° (мӢӨмӢңк°„ лҰ¬мҠӨл„Ҳ)
                const unsubAnn = db.collection('announcements')
                    .orderBy('date', 'desc')
                    .onSnapshot(snap => setAnnouncements(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubEvents = db.collection('events')
                    .onSnapshot(snap => setSharedEvents(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubRes = db.collection('resources')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snap => setResources(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubPosts = db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snap => setPosts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubRooms = db.collection('rooms')
                    .where('members', 'array-contains', uid)
                    .onSnapshot(snap => {
                        const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        list.sort((a, b) => {
                            const t = r => r.lastTime?.toDate ? r.lastTime.toDate().getTime() : new Date(r.lastTime || 0).getTime();
                            return t(b) - t(a);
                        });
                        setRooms(list);
                    }, () => {});

                const unsubGroups = db.collection('studyGroups')
                    .where('members', 'array-contains', uid)
                    .onSnapshot(snap => setStudyGroups(snap.docs.map(d => ({ id: d.id, ...d.data() }))), () => {});

                unsubRefs.current = [unsubAnn, unsubEvents, unsubRes, unsubPosts, unsubRooms, unsubGroups];
            };

            // н”„лЎңн•„ м ҖмһҘ н—¬нҚј
            const saveProfile = async (fields) => {
                if (!currentUser) return;
                setCurrentUser(prev => ({ ...prev, ...fields }));
                if (isLocalAdmin()) return;
                await db.collection('users').doc(currentUser.uid).update(fields);
            };

            // D-Day кі„мӮ°
            const getDDay = (dateStr) => {
                const today = new Date(); today.setHours(0,0,0,0);
                const target = new Date(dateStr); target.setHours(0,0,0,0);
                const diff = target.getTime() - today.getTime();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                return days === 0 ? 'D-Day' : days > 0 ? `D-${days}` : `D+${Math.abs(days)}`;
            };

            // лЎңм»¬ м–ҙл“ңлҜј м—¬л¶Җ нҷ•мқё
            const isLocalAdmin = () => currentUser?.uid === 'local-admin';

            // Google лЎңк·ёмқё
            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                    // onAuthStateChangedк°Җ мқҙнӣ„ мІҳлҰ¬
                } catch (e) {
                    if (e.code !== 'auth/popup-closed-by-user') alert(e.message);
                }
            };

            // лЎңм»¬ м–ҙл“ңлҜј (к°ңл°ңмҡ©)
            const handleAdminLogin = () => {
                const today = new Date().toISOString().split('T')[0];
                setCurrentUser({ uid: 'local-admin', id: 'admin', name: 'кҙҖлҰ¬мһҗ', school: 'HIGH.ST', role: 'кҙҖлҰ¬мһҗ', theme: 'light', studyTime: 0, studyDate: today, suneungDate: '2025-11-13' });
                setUserRole('кҙҖлҰ¬мһҗ');
                setLoading(false);
            };

            // мӢ к·ң мӮ¬мҡ©мһҗ н”„лЎңн•„ м„Өм • (Google лЎңк·ёмқё нӣ„)
            const handleSetupProfile = async (id, name) => {
                const { uid } = needsSetup;
                const idDoc = await db.collection('userIds').doc(id).get();
                if (idDoc.exists) return 'duplicate';
                const today = new Date().toISOString().split('T')[0];
                const profile = {
                    id, name, school: 'лҜём„Өм • н•ҷкөҗ',
                    role: 'н•ҷмғқ', theme: 'light',
                    studyTime: 0, studyDate: today,
                    suneungDate: '2025-11-13'
                };
                await db.collection('users').doc(uid).set(profile);
                await db.collection('userIds').doc(id).set({ uid });
                setNeedsSetup(null);
                setCurrentUser({ uid, ...profile });
                setUserRole('н•ҷмғқ');
                await loadData(uid, profile);
                return 'ok';
            };

            const handleLogout = async () => {
                if (isLocalAdmin()) { setCurrentUser(null); return; }
                await auth.signOut();
            };

            // в”Җв”Җ Todo н•ёл“Өлҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleAddTodo = async (text, date) => {
                const newTodo = { text, completed: false, date };
                if (isLocalAdmin()) { setTodos(prev => [...prev, { id: String(Date.now()), ...newTodo }]); return; }
                const ref = await db.collection('users').doc(currentUser.uid)
                    .collection('todos').add(newTodo);
                setTodos(prev => [...prev, { id: ref.id, ...newTodo }]);
            };

            const handleToggleTodo = async (id) => {
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const updated = !todo.completed;
                if (!isLocalAdmin()) {
                    await db.collection('users').doc(currentUser.uid)
                        .collection('todos').doc(id).update({ completed: updated });
                }
                setTodos(prev => prev.map(t => t.id === id ? { ...t, completed: updated } : t));
            };

            const handleDeleteTodo = async (id) => {
                if (!isLocalAdmin()) {
                    await db.collection('users').doc(currentUser.uid)
                        .collection('todos').doc(id).delete();
                }
                setTodos(prev => prev.filter(t => t.id !== id));
            };

            // в”Җв”Җ кіөм§ҖмӮ¬н•ӯ н•ёл“Өлҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleAddAnnouncement = async (title, content) => {
                const newAnn = { id: String(Date.now()), title, content, date: new Date().toLocaleDateString(), authorUid: currentUser.uid };
                if (isLocalAdmin()) { setAnnouncements(prev => [newAnn, ...prev]); return; }
                await db.collection('announcements').add({ title, content, date: newAnn.date, authorUid: currentUser.uid });
            };

            // в”Җв”Җ кіөмҡ© лӢ¬л Ҙ н•ёл“Өлҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleAddEvent = async (day, text) => {
                const now = new Date();
                const newEvent = { id: String(Date.now()), day, text, color: 'bg-indigo-600', month: now.getMonth(), year: now.getFullYear() };
                if (isLocalAdmin()) { setSharedEvents(prev => [...prev, newEvent]); return; }
                await db.collection('events').add({ day, text, color: 'bg-indigo-600', month: now.getMonth(), year: now.getFullYear() });
            };

            // в”Җв”Җ мһҗлЈҢмӢӨ н•ёл“Өлҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleAddResource = async (title, subject, description, files) => {
                const now  = new Date();
                const date = now.toLocaleDateString('ko-KR');
                const time = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const fileArr = Array.from(files || []);
                if (isLocalAdmin()) {
                    setResources(prev => [{
                        id: String(Date.now()), title, subject, description,
                        authorName: currentUser.name, authorId: currentUser.id,
                        date, time,
                        files: fileArr.map(f => ({ fileName: f.name, downloadURL: null })),
                        fileCount: fileArr.length,
                    }, ...prev]);
                    return;
                }
                const uploadedFiles = [];
                for (const file of fileArr) {
                    const sp  = `resources/${currentUser.uid}/${Date.now()}_${file.name}`;
                    const ref = storage.ref(sp);
                    const sn  = await ref.put(file);
                    const url = await sn.ref.getDownloadURL();
                    uploadedFiles.push({ fileName: file.name, storagePath: sp, downloadURL: url });
                }
                await db.collection('resources').add({
                    title, subject, description,
                    authorUid: currentUser.uid, authorName: currentUser.name,
                    date, time,
                    files: uploadedFiles,
                    fileCount: uploadedFiles.length,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            // в”Җв”Җ кіөмҡ© лӢ¬л Ҙ мқјм • мӮӯм ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleDeleteEvent = async (id) => {
                if (isLocalAdmin()) { setSharedEvents(prev => prev.filter(e => e.id !== id)); return; }
                await db.collection('events').doc(id).delete().catch(() => {});
            };

            // в”Җв”Җ кіөл¶Җ н•ёл“Өлҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleStudyStart = async (subject) => {
                if (isLocalAdmin()) return;
                for (const g of studyGroups) {
                    db.collection('studyGroups').doc(g.id).collection('presence').doc(currentUser.uid).set(
                        { isStudying: true, subject, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() },
                        { merge: true }
                    ).catch(() => {});
                }
            };

            const handleStudyStop = async (subject, durationSec, date) => {
                if (durationSec < 5) return;
                const newTotal = studyTime + durationSec;
                setStudyTime(newTotal);
                if (isLocalAdmin()) return;
                const uid = currentUser.uid;
                const batch = db.batch();
                batch.set(db.collection('users').doc(uid).collection('studySessions').doc(), {
                    subject, duration: durationSec, date,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                batch.set(db.collection('users').doc(uid).collection('studyDays').doc(date), {
                    seconds: firebase.firestore.FieldValue.increment(durationSec),
                    subjects: { [subject]: firebase.firestore.FieldValue.increment(durationSec) }
                }, { merge: true });
                batch.update(db.collection('users').doc(uid), {
                    studyTime: newTotal, studyDate: date
                });
                await batch.commit().catch(() => {});
                for (const g of studyGroups) {
                    db.collection('studyGroups').doc(g.id).collection('presence').doc(uid).set(
                        { isStudying: false, subject: '', todaySeconds: newTotal, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() },
                        { merge: true }
                    ).catch(() => {});
                }
            };

            const handleCreateStudyGroup = async (name) => {
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                if (isLocalAdmin()) {
                    setStudyGroups(prev => [...prev, { id: `local-${Date.now()}`, name, code, members: [currentUser.uid], memberData: { [currentUser.uid]: { id: currentUser.id, name: currentUser.name } } }]);
                    return;
                }
                await db.collection('studyGroups').add({
                    name, code, members: [currentUser.uid],
                    memberData: { [currentUser.uid]: { id: currentUser.id, name: currentUser.name } },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const handleJoinStudyGroup = async (code) => {
                if (isLocalAdmin()) { alert('лЎңм»¬ м–ҙл“ңлҜјмқҖ к·ёлЈ№ м°ём—¬ л¶Ҳк°Җ'); return; }
                const snap = await db.collection('studyGroups').where('code', '==', code.toUpperCase()).limit(1).get().catch(() => null);
                if (!snap || snap.empty) { alert('мһҳлӘ»лҗң мҪ”л“ңмһ…лӢҲлӢӨ.'); return; }
                const doc = snap.docs[0];
                if ((doc.data().members || []).includes(currentUser.uid)) { alert('мқҙлҜё к°Җмһ…лҗң к·ёлЈ№мһ…лӢҲлӢӨ.'); return; }
                await db.collection('studyGroups').doc(doc.id).update({
                    members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
                    [`memberData.${currentUser.uid}`]: { id: currentUser.id, name: currentUser.name }
                });
            };

            const handleLeaveStudyGroup = async (groupId) => {
                if (isLocalAdmin()) { setStudyGroups(prev => prev.filter(g => g.id !== groupId)); return; }
                await db.collection('studyGroups').doc(groupId).update({
                    members: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                }).catch(() => {});
            };

            // в”Җв”Җ м»Өл®ӨлӢҲнӢ° н•ёл“Өлҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleAddPost = async (title, content, category) => {
                const now = new Date();
                const newPost = {
                    title, content, category,
                    authorId: currentUser.id,
                    authorName: currentUser.name,
                    date: now.toLocaleDateString('ko-KR'),
                    time: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                    views: 0, likes: 0,
                    createdAt: now.toISOString(),
                };
                if (isLocalAdmin()) {
                    setPosts(prev => [{ id: String(Date.now()), ...newPost }, ...prev]);
                    return;
                }
                await db.collection('posts').add({
                    ...newPost,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            // в”Җв”Җ л©”мӢңм§Җ(лҢҖнҷ”л°©) н•ёл“Өлҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const handleCreateRoom = async (memberIdsStr, groupName) => {
                const targetIds = memberIdsStr.split(',').map(s => s.trim()).filter(Boolean);
                if (!targetIds.length) return null;
                const allIds = [currentUser.id, ...targetIds.filter(id => id !== currentUser.id)];
                const isGroup = allIds.length > 2;
                const roomName = groupName.trim() || (isGroup ? targetIds.join(', ') : targetIds[0]);

                if (isLocalAdmin()) {
                    const newRoom = {
                        id: `local-${Date.now()}`,
                        members: [currentUser.uid, ...targetIds],
                        memberIds: allIds,
                        memberNames: { [currentUser.uid]: currentUser.name },
                        isGroup, name: roomName,
                        lastMessage: '', lastTime: new Date().toISOString(),
                    };
                    setRooms(prev => [newRoom, ...prev]);
                    return newRoom.id;
                }

                const memberUids = [currentUser.uid];
                const memberIds  = [currentUser.id];
                const memberNames = { [currentUser.uid]: currentUser.name };
                for (const id of targetIds) {
                    if (id === currentUser.id) continue;
                    try {
                        const snap = await db.collection('userIds').doc(id).get();
                        if (!snap.exists) { alert(`'${id}' мӮ¬мҡ©мһҗлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.`); return null; }
                        const uid = snap.data().uid;
                        const uSnap = await db.collection('users').doc(uid).get();
                        memberUids.push(uid); memberIds.push(id);
                        memberNames[uid] = uSnap.data()?.name || id;
                    } catch { return null; }
                }
                const isGroupFinal = memberUids.length > 2;
                const ref = await db.collection('rooms').add({
                    members: memberUids, memberIds, memberNames,
                    isGroup: isGroupFinal,
                    name: groupName.trim() || (isGroupFinal
                        ? memberIds.filter(id => id !== currentUser.id).join(', ')
                        : memberIds.find(id => id !== currentUser.id) || ''),
                    lastMessage: '',
                    lastTime: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                });
                return ref.id;
            };

            const handleSendInRoom = async (roomId, text) => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                if (isLocalAdmin()) {
                    const newMsg = { id: String(Date.now()), fromUid: 'local-admin', fromId: currentUser.id, fromName: currentUser.name, text, time: timeStr, createdAt: now.toISOString() };
                    setLocalRoomMessages(prev => ({ ...prev, [roomId]: [...(prev[roomId] || []), newMsg] }));
                    setRooms(prev => prev.map(r => r.id === roomId ? { ...r, lastMessage: text, lastTime: now.toISOString() } : r));
                    return;
                }
                await db.collection('rooms').doc(roomId).collection('messages').add({
                    fromUid: currentUser.uid, fromId: currentUser.id, fromName: currentUser.name,
                    text, time: timeStr,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                });
                await db.collection('rooms').doc(roomId).update({
                    lastMessage: text,
                    lastTime: firebase.firestore.FieldValue.serverTimestamp(),
                }).catch(() => {});
            };

            // в”Җв”Җ лЎңл”© / лҜёмқёмҰқ нҷ”л©ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            if (loading) return (
                <div style={{height:'100vh', width:'100vw', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'#000', gap:'20px'}}>
                    <div style={{fontSize:'36px', fontWeight:900, letterSpacing:'-1px', color:'#fff', animation:'fadeIn 0.6s ease'}}>
                        HIGH.<span style={{color:'#60a5fa'}}>ST</span>
                    </div>
                    <div style={{width:'40px', height:'40px', border:'3px solid rgba(96,165,250,0.2)', borderTop:'3px solid #60a5fa', borderRadius:'50%', animation:'spin 0.8s linear infinite'}}></div>
                </div>
            );

            if (needsSetup) return <SetupPage info={needsSetup} onSetup={handleSetupProfile} onCancel={()=>auth.signOut()} />;
            if (!currentUser) return <AuthPage onGoogleLogin={handleGoogleLogin} onAdminLogin={handleAdminLogin} />;

            const canManageSystem = userRole === 'м„ мғқлӢҳ' || userRole === 'кҙҖлҰ¬мһҗ';

            // в”Җв”Җ кіөнҶө л·° л ҢлҚ”лҹ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            const renderView = () => (<>
                {view === 'лҢҖмӢңліҙл“ң' && <Dashboard announcements={announcements} todos={todos} resources={resources} posts={posts} studyTime={studyTime} suneungDate={suneungDate} getDDay={getDDay} setView={setView} currentUser={currentUser} />}
                {view === 'н•ҷмҠө'     && <StudyView currentUser={currentUser} studyGroups={studyGroups} studyTime={studyTime} suneungDate={suneungDate} getDDay={getDDay} todos={todos} selectedDate={selectedDate} setSelectedDate={setSelectedDate} onAddTodo={handleAddTodo} onToggleTodo={handleToggleTodo} onDeleteTodo={handleDeleteTodo} onStudyStart={handleStudyStart} onStudyStop={handleStudyStop} onCreateGroup={handleCreateStudyGroup} onJoinGroup={handleJoinStudyGroup} onLeaveGroup={handleLeaveStudyGroup} isMobileUI={isMobileUI} />}
                {view === 'н”Ңлһҳл„Ҳ'   && <Planner todos={todos} selectedDate={selectedDate} setSelectedDate={setSelectedDate} onAdd={handleAddTodo} onToggle={handleToggleTodo} onDelete={handleDeleteTodo} />}
                {view === 'кіөм§ҖмӮ¬н•ӯ' && <NoticeView isAdmin={canManageSystem} announcements={announcements} onAdd={handleAddAnnouncement} />}
                {view === 'м»Өл®ӨлӢҲнӢ°' && <CommunityView posts={posts} currentUser={currentUser} onAddPost={handleAddPost} />}
                {view === 'кіөмҡ©лӢ¬л Ҙ' && <CalendarView isAdmin={canManageSystem} sharedEvents={sharedEvents} onAddEvent={handleAddEvent} onDeleteEvent={handleDeleteEvent} />}
                {view === 'мһҗлЈҢмӢӨ'   && <ResourceView resources={resources} currentUser={currentUser} onAdd={handleAddResource} />}
                {view === 'л©”мӢңм§Җ'   && <MessageView rooms={rooms} currentUser={currentUser} localRoomMessages={localRoomMessages} onCreateRoom={handleCreateRoom} onSendInRoom={handleSendInRoom} />}
                {view === 'м„Өм •'     && <SettingsView currentUser={currentUser} userRole={userRole} theme={theme} suneungDate={suneungDate} getDDay={getDDay} onThemeChange={async (t) => { setTheme(t); await saveProfile({ theme: t }); }} onRoleChange={async (r) => { setUserRole(r); await saveProfile({ role: r }); }} onSuneungChange={async (d) => { setSuneungDate(d); await saveProfile({ suneungDate: d }); }} onSchoolChange={async (s) => await saveProfile({ school: s })} onNameChange={async (n) => { await saveProfile({ name: n }); }} />}
            </>);

            const goView = (v) => { setView(v); setShowMore(false); };
            const NAV_PRIMARY = [['лҢҖмӢңліҙл“ң','рҹҸ ','нҷҲ'],['н•ҷмҠө','вҸұпёҸ','н•ҷмҠө'],['н”Ңлһҳл„Ҳ','рҹ“…','н”Ңлһҳл„Ҳ'],['л©”мӢңм§Җ','рҹ’¬','л©”мӢңм§Җ']];
            const NAV_MORE    = [['кіөм§ҖмӮ¬н•ӯ','рҹ“ў','кіөм§Җ'],['м»Өл®ӨлӢҲнӢ°','рҹ”Ҙ','м»Өл®ӨлӢҲнӢ°'],['кіөмҡ©лӢ¬л Ҙ','рҹ—“пёҸ','лӢ¬л Ҙ'],['мһҗлЈҢмӢӨ','рҹ“ҡ','мһҗлЈҢмӢӨ'],['м„Өм •','вҡҷпёҸ','м„Өм •']];

            // в”Җв”Җ лӘЁл°”мқј / нғңлё”лҰҝ л Ҳмқҙм•„мӣғ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            if (isMobileUI) return (
                <div style={{display:'flex', flexDirection:'column', height:'100dvh', width:'100vw', overflow:'hidden'}}>
                    <header className="mobile-header" style={{flexDirection:'column', alignItems:'stretch', gap:'2px', padding:'12px 16px 10px'}}>
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                            <div onClick={()=>goView('лҢҖмӢңліҙл“ң')} style={{cursor:'pointer', userSelect:'none'}}>
                                <div style={{fontSize:'18px', fontWeight:900, letterSpacing:'-0.5px', color:'var(--text)', lineHeight:1}}>
                                    HIGH.<span style={{color:'var(--accent)'}}>ST</span>
                                </div>
                                <div style={{fontSize:'12px', fontWeight:700, color:'var(--text)', opacity:0.75, marginTop:'3px', letterSpacing:'-0.2px'}}>
                                    {(()=>{
                                        const h = new Date().getHours();
                                        const n = currentUser.name;
                                        const greets = h>=5&&h<9   ? [`мўӢмқҖ м•„м№Ёмқҙм—җмҡ”, ${n}лӢҳ вҳҖпёҸ`,`мҳӨлҠҳлҸ„ нҷ”мқҙнҢ…мқҙм—җмҡ”, ${n}лӢҳ рҹҢ…`]
                                                     : h>=9&&h<12  ? [`мҳӨм „ кіөл¶Җ мӢңмһ‘н•ҙліјк№Ңмҡ”, ${n}лӢҳ рҹ“–`,`м§‘мӨ‘н•  мӢңк°„мқҙм—җмҡ”, ${n}лӢҳ вҡЎ`]
                                                     : h>=12&&h<14 ? [`м җмӢ¬ мӢңк°„мқҙл„Өмҡ”, ${n}лӢҳ рҹҚұ`,`мһ к№җ мү¬м–ҙк°Җмҡ”, ${n}лӢҳ рҹҳҢ`]
                                                     : h>=14&&h<18 ? [`мҳӨнӣ„лҸ„ нһҳлӮҙмҡ”, ${n}лӢҳ рҹ’Ә`,`мЎ°кёҲл§Ң лҚ”, ${n}лӢҳ рҹ”Ҙ`]
                                                     : h>=18&&h<21 ? [`мўӢмқҖ м Җл…Ғмқҙм—җмҡ”, ${n}лӢҳ рҹҢҶ`,`мҳӨлҠҳ н•ҳлЈЁ м–ҙл• лӮҳмҡ”, ${n}лӢҳ вңЁ`]
                                                     : h>=21&&h<24 ? [`мҳӨлҠҳ мҲҳкі н–Ҳм–ҙмҡ”, ${n}лӢҳ рҹҢҷ`,`лӮҙмқјлҸ„ нҷ”мқҙнҢ…мқҙм—җмҡ”, ${n}лӢҳ вӯҗ`]
                                                     :               [`лҠҰмқҖ л°Өмқҙл„Өмҡ”, ${n}лӢҳ рҹҢҢ`,`лӘё мұҷкё°л©ҙм„ң кіөл¶Җн•ҙмҡ”, ${n}лӢҳ рҹ’ҷ`];
                                        return greets[Math.floor(Math.random()*greets.length)];
                                    })()}
                                </div>
                            </div>
                            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                                <div style={{textAlign:'right'}}>
                                    <div style={{fontSize:'12px', fontWeight:900, color:'var(--accent)'}}>{getDDay(suneungDate)}</div>

        // в”Җв”Җв”Җ StudyHeatmap в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

        function StudyHeatmap({ heatmapData }) {
            const CELL = 13, GAP = 3;
            const DAYS_KR = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];

            const { weeks, monthLabels } = useMemo(() => {
                const today = new Date(); today.setHours(0,0,0,0);
                const todayStr = today.toISOString().split('T')[0];
                // end on nearest Saturday
                const end = new Date(today);
                while (end.getDay() !== 6) end.setDate(end.getDate() + 1);
                // start 26 weeks back, on Sunday
                const start = new Date(end);
                start.setDate(start.getDate() - 26 * 7 + 1);
                while (start.getDay() !== 0) start.setDate(start.getDate() - 1);

                const weeks = [];
                const monthLabels = {};
                let week = [];
                const cur = new Date(start);

                while (cur <= end) {
                    const dayOfWeek = cur.getDay();
                    if (dayOfWeek === 0 && week.length > 0) { weeks.push(week); week = []; }
                    const dateStr = cur.toISOString().split('T')[0];
                    week.push(cur <= today ? dateStr : null);
                    // month label: first week a month appears
                    if (cur.getDate() === 1) monthLabels[weeks.length] = cur.getMonth() + 1;
                    cur.setDate(cur.getDate() + 1);
                }
                if (week.length) weeks.push(week);
                if (!Object.keys(monthLabels).length) monthLabels[0] = new Date(start).getMonth() + 1;
                return { weeks, monthLabels };
            }, []);

            const getColor = (sec) => {
                if (!sec) return null;
                const m = sec / 60;
                if (m < 60)  return 'rgba(79,110,247,0.20)'; // < 1h
                if (m < 120) return 'rgba(79,110,247,0.42)'; // 1-2h
                if (m < 240) return 'rgba(79,110,247,0.65)'; // 2-4h
                if (m < 360) return 'rgba(79,110,247,0.82)'; // 4-6h
                return 'rgba(79,110,247,0.97)';               // 6h+
            };

            const todayStr = new Date().toISOString().split('T')[0];

            return (
                <div className="glass-card" style={{padding:'24px 28px', marginTop:'16px', overflowX:'auto'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px'}}>
                        <h4 style={{fontSize:'14px', fontWeight:900, color:'var(--text)'}}>рҹ“Ҡ н•ҷмҠө кё°лЎқ</h4>
                        <div style={{display:'flex', alignItems:'center', gap:'6px', fontSize:'10px', fontWeight:700, opacity:0.4}}>
                            <span>м ҒмқҢ</span>
                            {[0.20,0.42,0.65,0.82,0.97].map((o,i) => <div key={i} style={{width:'12px',height:'12px',borderRadius:'3px',background:`rgba(79,110,247,${o})`}}/>)}
                            <span>л§ҺмқҢ</span>
                        </div>
                    </div>
                    <div style={{display:'flex', gap:`${GAP}px`}}>
                        {/* мҡ”мқј лқјлІЁ */}
                        <div style={{display:'flex', flexDirection:'column', gap:`${GAP}px`, paddingTop:'18px', flexShrink:0}}>
                            {DAYS_KR.map((d,i) => (
                                <div key={d} style={{height:`${CELL}px`, fontSize:'9px', fontWeight:800, opacity:[1,3,5].includes(i)?0.4:0, color:'var(--text-sub)', display:'flex', alignItems:'center', paddingRight:'6px', minWidth:'16px'}}>{d}</div>
                            ))}
                        </div>
                        {/* мЈј м—ҙл“Ө */}
                        <div style={{display:'flex', flexDirection:'column'}}>
                            {/* мӣ” лқјлІЁ н–ү */}
                            <div style={{display:'flex', gap:`${GAP}px`, marginBottom:'4px', height:'14px'}}>
                                {weeks.map((_,wi) => (
                                    <div key={wi} style={{width:`${CELL}px`, flexShrink:0, fontSize:'9px', fontWeight:800, color:'var(--text-sub)', opacity:monthLabels[wi]?0.45:0, whiteSpace:'nowrap'}}>
                                        {monthLabels[wi]?`${monthLabels[wi]}мӣ”`:''}
                                    </div>
                                ))}
                            </div>
                            {/* 7н–ү Г— Nм—ҙ к·ёлҰ¬л“ң */}
                            {[0,1,2,3,4,5,6].map(dow => (
                                <div key={dow} style={{display:'flex', gap:`${GAP}px`, marginBottom:`${GAP}px`}}>
                                    {weeks.map((week,wi) => {
                                        const date = week[dow];
                                        const sec = date ? (heatmapData[date] || 0) : 0;
                                        const color = getColor(sec);
                                        const isToday = date === todayStr;
                                        const min = Math.round(sec/60);
                                        const label = date ? (min>=60 ? `${Math.floor(min/60)}h ${min%60}m` : min>0 ? `${min}m` : 'кё°лЎқм—ҶмқҢ') : '';
                                        return (
                                            <div key={wi} title={date?`${date} ${label}`:''}
                                                style={{width:`${CELL}px`, height:`${CELL}px`, flexShrink:0, borderRadius:'3px',
                                                    background: date?(color||'var(--glass-bg2)'):'transparent',
                                                    border: isToday?'1.5px solid var(--accent)':date?'1px solid rgba(255,255,255,0.04)':'none',
                                                    transition:'transform 0.1s', cursor:date?'default':'default'}}
                                                onMouseEnter={e=>{if(date)e.currentTarget.style.transform='scale(1.4)';}}
                                                onMouseLeave={e=>{e.currentTarget.style.transform='';}}
                                            />
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // в”Җв”Җв”Җ StudyView в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

        function StudyView({ currentUser, studyGroups, studyTime, suneungDate, getDDay, todos, selectedDate, setSelectedDate, onAddTodo, onToggleTodo, onDeleteTodo, onStudyStart, onStudyStop, onCreateGroup, onJoinGroup, onLeaveGroup, isMobileUI }) {
            const [isTimerOn,      setIsTimerOn]      = useState(false);
            const [isPaused,       setIsPaused]       = useState(false);
            const [isStopping,     setIsStopping]     = useState(false);
            const [btnKey,         setBtnKey]         = useState(0);
            const [timerSec,       setTimerSec]       = useState(0);
            const [currentSubject, setCurrentSubject] = useState('мҲҳн•ҷ');
            const [forceMinutes,   setForceMinutes]   = useState('');
            const [forceSubject,   setForceSubject]   = useState('мҲҳн•ҷ');
            const [todaySessions,  setTodaySessions]  = useState([]);
            const [groupPresence,  setGroupPresence]  = useState({});
            const [heatmapData,    setHeatmapData]    = useState({});
            const [showCreate,     setShowCreate]     = useState(false);
            const [showJoin,       setShowJoin]       = useState(false);
            const [newGroupName,   setNewGroupName]   = useState('');
            const [joinCode,       setJoinCode]       = useState('');
            const [creating,        setCreating]        = useState(false);
            const [joining,         setJoining]         = useState(false);
            const [showGroupSheet,  setShowGroupSheet]  = useState(false);
            const [customSubjects,  setCustomSubjects]  = useState([]);
            const [showAddSubject,  setShowAddSubject]  = useState(false);
            const [newSubjectName,  setNewSubjectName]  = useState('');
            const [newSubjectIcon,  setNewSubjectIcon]  = useState('рҹ“Ң');
            const [newSubjectColor, setNewSubjectColor] = useState('#6366f1');
            const [addingSubject,   setAddingSubject]   = useState(false);
            const sessionStartRef = useRef(null);
            const isLocalAdmin = currentUser?.uid === 'local-admin';
            const today = new Date().toISOString().split('T')[0];

            // нғҖмқҙлЁё мқён„°лІҢ (мқјмӢң м •м§Җ мғҒнғңм—җм„ңлҠ” л©Ҳм¶Ө)
            useEffect(() => {
                let iv;
                if (isTimerOn && !isPaused) iv = setInterval(() => setTimerSec(p => p + 1), 1000);
                return () => clearInterval(iv);
            }, [isTimerOn, isPaused]);

            // мҳӨлҠҳ м„ём…ҳ лЎңл“ң
            useEffect(() => {
                if (isLocalAdmin || !currentUser) return;
                db.collection('users').doc(currentUser.uid).collection('studySessions')
                    .where('date', '==', today).orderBy('createdAt', 'desc').get()
                    .then(snap => setTodaySessions(snap.docs.map(d => ({ id: d.id, ...d.data() }))))
                    .catch(() => {});
            }, [currentUser?.uid]);

            // нһҲнҠёл§ө лҚ°мқҙн„° лЎңл“ң
            useEffect(() => {
                if (isLocalAdmin || !currentUser) return;
                const startDate = new Date(); startDate.setDate(startDate.getDate() - 182);
                const startStr = startDate.toISOString().split('T')[0];
                db.collection('users').doc(currentUser.uid).collection('studyDays')
                    .where(firebase.firestore.FieldPath.documentId(), '>=', startStr).get()
                    .then(snap => {
                        const data = {};
                        snap.docs.forEach(d => { data[d.id] = d.data().seconds || 0; });
                        setHeatmapData(data);
                    }).catch(() => {});
            }, [currentUser?.uid]);

            // м»ӨмҠӨн…Җ кіјлӘ© лЎңл“ң
            useEffect(() => {
                if (isLocalAdmin || !currentUser) return;
                db.collection('users').doc(currentUser.uid).get()
                    .then(snap => { if (snap.exists) setCustomSubjects(snap.data().customSubjects || []); })
                    .catch(() => {});
            }, [currentUser?.uid]);

            // к·ёлЈ№ presence кө¬лҸ…
            useEffect(() => {
                if (!studyGroups.length || isLocalAdmin) return;
                const unsubs = studyGroups.map(g =>
                    db.collection('studyGroups').doc(g.id).collection('presence')
                        .onSnapshot(snap => {
                            const p = {};
                            snap.docs.forEach(d => { p[d.id] = d.data(); });
                            setGroupPresence(prev => ({ ...prev, [g.id]: p }));
                        }, () => {})
                );
                return () => unsubs.forEach(u => u());
            }, [studyGroups.map(g => g.id).join(',')]);

        function Dashboard({ announcements, todos, resources, posts, studyTime, suneungDate, getDDay, setView, currentUser }) {
            const todayCount = todos.filter(t => t.date === new Date().toISOString().split('T')[0]).length;

                const h = new Date().getHours(), n = currentUser?.name || '';
                const g = h>=5&&h<9   ? [`мўӢмқҖ м•„м№Ёмқҙм—җмҡ”, ${n}лӢҳ вҳҖпёҸ`,`мҳӨлҠҳлҸ„ нҷ”мқҙнҢ…мқҙм—җмҡ”, ${n}лӢҳ рҹҢ…`]

                        : h>=12&&h<14 ? [`м җмӢ¬ мӢңк°„мқҙл„Өмҡ”, ${n}лӢҳ рҹҚұ`,`мһ к№җ мү¬м–ҙк°Җмҡ”, ${n}лӢҳ рҹҳҢ`]
                        : h>=14&&h<18 ? [`мҳӨнӣ„лҸ„ нһҳлӮҙмҡ”, ${n}лӢҳ рҹ’Ә`,`мЎ°кёҲл§Ң лҚ”, ${n}лӢҳ рҹ”Ҙ`]
                        : h>=18&&h<21 ? [`мўӢмқҖ м Җл…Ғмқҙм—җмҡ”, ${n}лӢҳ рҹҢҶ`,`мҳӨлҠҳ н•ҳлЈЁ м–ҙл• лӮҳмҡ”, ${n}лӢҳ вңЁ`]
                        : h>=21&&h<24 ? [`мҳӨлҠҳ мҲҳкі н–Ҳм–ҙмҡ”, ${n}лӢҳ рҹҢҷ`,`лӮҙмқјлҸ„ нҷ”мқҙнҢ…мқҙм—җмҡ”, ${n}лӢҳ вӯҗ`]
                        :               [`лҠҰмқҖ л°Өмқҙл„Өмҡ”, ${n}лӢҳ рҹҢҢ`,`лӘё мұҷкё°л©ҙм„ң кіөл¶Җн•ҙмҡ”, ${n}лӢҳ рҹ’ҷ`];
                return g[Math.floor(Math.random()*g.length)];
            };
            const [winW, setWinW] = useState(window.innerWidth);
            useEffect(() => {
                const h = () => setWinW(window.innerWidth);
                window.addEventListener('resize', h);
                return () => window.removeEventListener('resize', h);
            }, []);
            const mob = winW < 1100;

            const stats = [
                {l:'Tasks', v: todayCount,              u:'к°ң', icon:'вң…'},
                {l:'Study',  v: Math.floor(studyTime/60),u:'л¶„', icon:'вҸұпёҸ'},
                {l:'D-Day',  v: getDDay(suneungDate),    u:'',   icon:'рҹҺҜ'},
                {l:'мһҗлЈҢ',   v: resources.length,        u:'к°ң', icon:'рҹ“ҡ'},
            ];
            return (
                <div style={{display:'flex', flexDirection:'column', gap: mob ? '12px' : '20px'}}>
                    {/* нһҲм–ҙлЎң л°°л„Ҳ */}
                    <div className="hero-banner anim-fade-up" style={mob ? {padding:'16px 18px', borderRadius:'20px'} : {}}>
                        {!mob && <>
