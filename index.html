    <style>
        /* ── 테마 변수 ─────────────────────────────────────── */
        :root {
            --bg:          #eef2ff;
            --bg2:         #f5f0ff;
            --text:        #0f172a;
            --text-sub:    #64748b;
            --accent:      #4f6ef7;
            --accent2:     #818cf8;
            --glass-bg:    rgba(255,255,255,0.55);
            --glass-bg2:   rgba(255,255,255,0.35);
            --glass-border:rgba(255,255,255,0.75);
            --glass-shadow:0 8px 32px rgba(80,100,220,0.10), 0 1.5px 0 rgba(255,255,255,0.7) inset;
            --card-shadow: 0 4px 24px rgba(80,100,200,0.08);
            --sidebar-w:   300px;
        }
        .theme-dark {
            --bg:           #080e1e;
            --bg2:          #0d1630;
            --text:         #e2e8f0;
            --text-sub:     #64748b;
            --accent:       #60a5fa;
            --accent2:      #818cf8;
            --glass-bg:     rgba(15,25,60,0.55);
            --glass-bg2:    rgba(10,18,45,0.45);
            --glass-border: rgba(255,255,255,0.07);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.05) inset;
            --card-shadow:  0 4px 24px rgba(0,0,0,0.35);
        }
        .theme-midnight {
            --bg:           #000000;
            --bg2:          #080808;
            --text:         #ffffff;
            --text-sub:     #555555;
            --accent:       #a78bfa;
            --accent2:      #7c3aed;
            --glass-bg:     rgba(255,255,255,0.04);
            --glass-bg2:    rgba(255,255,255,0.02);
            --glass-border: rgba(255,255,255,0.06);
            --glass-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.03) inset;
            --card-shadow:  0 4px 32px rgba(0,0,0,0.6);
        }

        /* ── 기본 ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
            min-height: 100vh;
            color: var(--text);
            transition: background 0.5s ease, color 0.3s ease;
            overflow: hidden;
        }

        /* ── 모바일 / 태블릿 레이아웃 ───────────────────────── */
        .mobile-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .mobile-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 88px;
            -webkit-overflow-scrolling: touch;
        }
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 62px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border-top: 1px solid var(--glass-border);
            display: flex;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .mobile-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-sub);
            font-family: 'Pretendard', sans-serif;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-tab.active { color: var(--accent); }
        .mobile-tab .tab-icon { font-size: 21px; line-height: 1; }
        .mobile-tab .tab-label { font-size: 9px; font-weight: 800; opacity: 0.55; letter-spacing: 0.02em; }
        .mobile-tab.active .tab-label { opacity: 1; }
        .mobile-more-drawer {
            position: fixed;
            bottom: 62px; left: 0; right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border-top: 1px solid var(--glass-border);
            z-index: 99;
            padding: 16px;
            animation: fadeInUp 0.18s ease both;
        }

        /* 모바일에서 카드 패딩 축소 */
        @media (max-width: 767px) {
            .glass-card-lg { padding: 18px 16px !important; border-radius: 20px !important; }
            .glass-card    { padding: 14px 16px !important; border-radius: 18px !important; }
        }

        /* ── 키프레임 ──────────────────────────────────────── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes floatY {
            0%,100% { transform: translateY(0px); }
            50%      { transform: translateY(-10px); }
        }
        @keyframes breathe {
            0%,100% { transform: scale(1)   rotate(0deg);   opacity: 0.5; }
            33%      { transform: scale(1.08) rotate(3deg);  opacity: 0.7; }
            66%      { transform: scale(0.95) rotate(-2deg); opacity: 0.4; }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        @keyframes pulseGlow {
            0%,100% { box-shadow: 0 0 0   0   rgba(239,68,68,0.3); }
            50%      { box-shadow: 0 0 24px 8px rgba(239,68,68,0.5); }
        }
        @keyframes pulseGlowBlue {
            0%,100% { box-shadow: 0 0 0   0   rgba(96,165,250,0.2); }
            50%      { box-shadow: 0 0 20px 6px rgba(96,165,250,0.45); }
        }
        @keyframes gradientSlide {
            0%   { background-position: 0%   50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0%   50%; }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-16px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(16px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.93); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes timerPulse {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.6; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 로그인 배경 오로라 애니메이션 ──────────────────── */
        @keyframes drift1 {
            0%   { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
            18%  { transform: translate(12vw,   6vh)  scale(1.1)  rotate(8deg); }
            40%  { transform: translate(20vw,  -4vh)  scale(0.97) rotate(-5deg); }
            62%  { transform: translate(8vw,   14vh)  scale(1.06) rotate(6deg); }
            80%  { transform: translate(-6vw,   8vh)  scale(1.03) rotate(-3deg); }
            100% { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
        }
        @keyframes drift2 {
            0%   { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
            22%  { transform: translate(-14vw, -8vh)  scale(1.12) rotate(-10deg); }
            48%  { transform: translate(-22vw,  6vh)  scale(0.94) rotate(6deg); }
            70%  { transform: translate(-8vw,  -14vh) scale(1.06) rotate(-4deg); }
            88%  { transform: translate(6vw,   -6vh)  scale(1.02) rotate(3deg); }
            100% { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
        }
        @keyframes drift3 {
            0%   { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
            30%  { transform: translate(16vw,  -12vh) scale(1.15) rotate(12deg); }
            58%  { transform: translate(10vw,  -22vh) scale(0.91) rotate(-7deg); }
            80%  { transform: translate(-4vw,  -10vh) scale(1.05) rotate(5deg); }
            100% { transform: translate(0vw,    0vh)  scale(1)    rotate(0deg); }
        }
        @keyframes drift4 {
            0%   { transform: translate(0vw,   0vh)   scale(1)    rotate(0deg); }
            25%  { transform: translate(-10vw, 10vh)  scale(1.09) rotate(-9deg); }
            55%  { transform: translate(-18vw,  4vh)  scale(0.95) rotate(5deg); }
            78%  { transform: translate(-6vw,  14vh)  scale(1.04) rotate(-3deg); }
            100% { transform: translate(0vw,   0vh)   scale(1)    rotate(0deg); }
        }
        @keyframes drift5 {
            0%   { transform: translate(0vw,   0vh)   scale(1); }
            38%  { transform: translate(10vw, -8vh)   scale(1.18); }
            70%  { transform: translate(-8vw,  8vh)   scale(0.9); }
            100% { transform: translate(0vw,   0vh)   scale(1); }
        }

        /* ── 버튼 분리 / 합치기 애니메이션 ─────────────────────── */
        @keyframes splitBtnLeft {
            0%   { opacity: 0; filter: blur(8px); transform: translateX(22%); }
            45%  { filter: blur(0); opacity: 1; }
            72%  { transform: translateX(-3px); }
            100% { opacity: 1; filter: blur(0); transform: translateX(0); }
        }
        @keyframes splitBtnRight {
            0%   { opacity: 0; filter: blur(8px); transform: translateX(-22%); }
            45%  { filter: blur(0); opacity: 1; }
            72%  { transform: translateX(3px); }
            100% { opacity: 1; filter: blur(0); transform: translateX(0); }
        }
        @keyframes mergeBtnLeft {
            0%   { opacity: 1; filter: blur(0); transform: translateX(0); }
            55%  { filter: blur(0); }
            100% { opacity: 0; filter: blur(8px); transform: translateX(22%); }
        }
        @keyframes mergeBtnRight {
            0%   { opacity: 1; filter: blur(0); transform: translateX(0); }
            55%  { filter: blur(0); }
            100% { opacity: 0; filter: blur(8px); transform: translateX(-22%); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        /* ── 글래스 카드 ────────────────────────────────────── */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 28px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glass-shadow), 0 12px 40px rgba(0,0,0,0.1);
        }
        .glass-card-lg {
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 40px;
        }
        .glass-inset {
            background: var(--glass-bg2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* ── 사이드바 ───────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-right: 1px solid var(--glass-border);
            box-shadow: 4px 0 32px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            padding: 28px 20px;
            z-index: 30;
            overflow: hidden;
        }

        /* ── 사이드바 아이템 ─────────────────────────────────── */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 13px 18px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-sub);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            margin-bottom: 4px;
            position: relative;
            overflow: hidden;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: var(--glass-bg2);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .nav-item:hover::before { opacity: 1; }
        .nav-item:hover { color: var(--accent); transform: translateX(3px); }
        .nav-item.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 20px rgba(79,110,247,0.35);
            transform: none;
        }
        .nav-item.active::before { display: none; }
        .nav-item .icon { font-size: 16px; flex-shrink: 0; }

        /* ── 섹션 레이블 ─────────────────────────────────────── */
        .nav-label {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-sub);
            opacity: 0.45;
            padding: 0 18px;
            margin: 18px 0 8px;
        }

        /* ── 뱃지 ───────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .badge-student  { background: rgba(34,197,94,0.12); color: #16a34a; }
        .badge-teacher  { background: rgba(168,85,247,0.12); color: #9333ea; }
        .badge-admin    { background: rgba(239,68,68,0.12);  color: #dc2626; }

        /* ── 입력 필드 ──────────────────────────────────────── */
        input:not([type=checkbox]):not([type=file]):not([type=date]),
        select, textarea {
            background: var(--glass-bg2);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            border-radius: 16px;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Pretendard', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            backdrop-filter: blur(12px);
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
        }
        input[type=date] {
            background: var(--glass-bg2);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Pretendard', sans-serif;
            outline: none;
        }

        /* ── 버튼 ───────────────────────────────────────────── */
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 12px 24px;
            font-size: 12px;
            font-weight: 900;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(79,110,247,0.3);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,110,247,0.4); }
        .btn-primary:active:not(:disabled) { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.5; cursor: default; }

        .btn-danger {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 14px;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

        /* ── 스크롤바 ───────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 99px; }

        /* ── 애니메이션 유틸 ─────────────────────────────────── */
        .anim-fade-up   { animation: fadeInUp  0.4s ease both; }
        .anim-scale-in  { animation: scaleIn   0.35s ease both; }
        .anim-fade-in   { animation: fadeIn    0.3s ease both; }
        .anim-float     { animation: floatY    4s ease-in-out infinite; }

        /* ── 메인 헤더 ──────────────────────────────────────── */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
        }

        /* ── 히어로 배너 ─────────────────────────────────────── */
        .hero-banner {
            background: linear-gradient(135deg, var(--accent), var(--accent2), #a855f7, var(--accent));
            background-size: 300% 300%;
            animation: gradientSlide 8s ease infinite;
            border-radius: 32px;
            padding: 40px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .hero-blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            filter: blur(40px);
            animation: breathe 7s ease-in-out infinite;
        }

        /* ── stat 카드 ──────────────────────────────────────── */
        .stat-card {
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 20px 24px;
            animation: scaleIn 0.4s ease both;
        }

        /* ── 타이머 섹션 ─────────────────────────────────────── */
        .timer-box {
            background: rgba(2,6,20,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
        }
        .timer-active {
            animation: pulseGlow 2s ease-in-out infinite;
        }
        .timer-digits {
            font-family: 'Pretendard', monospace;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #fff;
            line-height: 1;
        }

        /* ── 투두 아이템 ─────────────────────────────────────── */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-radius: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            transition: all 0.2s ease;
            animation: fadeInUp 0.3s ease both;
        }
        .todo-item:hover { transform: translateX(4px); border-color: var(--accent); }

        /* ── 캘린더 셀 ──────────────────────────────────────── */
        .cal-cell {
            min-height: 100px;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg2);
            transition: all 0.2s;
        }
        .cal-cell:hover { background: var(--glass-bg); transform: scale(1.04); z-index: 2; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .cal-cell-mob {
            min-height: 0;
            aspect-ratio: 1 / 1;
            padding: 3px 2px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg2);
            transition: background 0.15s;
            overflow: hidden;
        }

        /* ── 메시지 버블 ─────────────────────────────────────── */
        .msg-bubble-out { animation: slideInRight 0.3s ease both; }
        .msg-bubble-in  { animation: slideInLeft  0.3s ease both; }

        /* ── 섹션 진입 딜레이 ────────────────────────────────── */
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.10s; }
        .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.20s; }
    </style>
</head>
<body class="theme-light">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ─── 과목 상수 ───────────────────────────────────────────────────────
        const SUBJECTS = [
            { id: '수학', icon: '📐', color: '#3b82f6' },
            { id: '국어', icon: '📝', color: '#ef4444' },
            { id: '영어', icon: '🌐', color: '#10b981' },
            { id: '탐구', icon: '🔬', color: '#f59e0b' },
            { id: '기타', icon: '📚', color: '#8b5cf6' },
        ];

        // ─── Korean IME-safe input components ────────────────────────────────
        // React controlled inputs break Korean IME (composition resets on re-render).
        // These components buffer the value locally and only flush to state after
        // composition ends (onCompositionEnd), preventing mid-syllable breakage.

        function KorInput({ value, onChange, type, ...rest }) {
            const composing = React.useRef(false);
            const [inner, setInner] = React.useState(value ?? '');
            React.useEffect(() => { if (!composing.current) setInner(value ?? ''); }, [value]);
            // Non-text types (number, file, checkbox, radio…) pass through unchanged
            if (type && !['text','search','url','email','password','tel'].includes(type)) {
                return <input type={type} value={value} onChange={onChange} {...rest} />;
            }
            return (
                <input type={type} {...rest} value={inner}
                    onChange={e => { setInner(e.target.value); if (!composing.current && onChange) onChange(e); }}
                    onCompositionStart={() => { composing.current = true; }}
                    onCompositionEnd={e => { composing.current = false; setInner(e.target.value); if (onChange) onChange(e); }}
                />
            );
        }

        function KorTextarea({ value, onChange, ...rest }) {
            const composing = React.useRef(false);
            const [inner, setInner] = React.useState(value ?? '');
            React.useEffect(() => { if (!composing.current) setInner(value ?? ''); }, [value]);
            return (
                <textarea {...rest} value={inner}
                    onChange={e => { setInner(e.target.value); if (!composing.current && onChange) onChange(e); }}
                    onCompositionStart={() => { composing.current = true; }}
                    onCompositionEnd={e => { composing.current = false; setInner(e.target.value); if (onChange) onChange(e); }}
                />
            );
        }

        // ─── App ─────────────────────────────────────────────────────────────

        function App() {
            const [view, setView]               = useState('대시보드');
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading]         = useState(true);
            const [userRole, setUserRole]       = useState('학생');
            const [theme, setTheme]             = useState('light');

            const [todos, setTodos]               = useState([]);
            const [resources, setResources]       = useState([]);
            const [announcements, setAnnouncements] = useState([]);
            const [rooms, setRooms]               = useState([]);
            const [localRoomMessages, setLocalRoomMessages] = useState({});
            const [sharedEvents, setSharedEvents] = useState([]);
            const [posts, setPosts]               = useState([]);
            const [calendarGroup,  setCalendarGroup]  = useState(null);
            const [calendarEvents, setCalendarEvents] = useState([]);

            const [studyTime, setStudyTime]       = useState(0);
            const [suneungDate, setSuneungDate]   = useState('2025-11-13');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [studyGroups, setStudyGroups]   = useState([]);

            const unsubRefs      = useRef([]);
            const calEventsUnsub = useRef(null);

            // 테마 적용 (로컬)
            useEffect(() => {
                document.body.className = `theme-${theme}`;
            }, [theme]);

            const [needsSetup, setNeedsSetup] = useState(null); // { uid, googleName }
            const [showMore,   setShowMore]   = useState(false);

            // 디바이스 감지
            const [winW, setWinW] = useState(window.innerWidth);
            useEffect(() => {
                const h = () => setWinW(window.innerWidth);
                window.addEventListener('resize', h);
                return () => window.removeEventListener('resize', h);
            }, []);
            const isMobileUI = winW < 1100; // 모바일 + 태블릿

            // Firebase Auth 상태 감지
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (fbUser) => {
                    if (fbUser) {
                        const snap = await db.collection('users').doc(fbUser.uid).get();
                        if (snap.exists) {
                            const profile = snap.data();
                            setNeedsSetup(null);
                            setCurrentUser({ uid: fbUser.uid, ...profile });
                            setUserRole(profile.role || '학생');
                            setTheme(profile.theme || 'light');
                            await loadData(fbUser.uid, profile);
                        } else {
                            // 신규 Google 사용자 → 프로필 설정 화면
                            setNeedsSetup({ uid: fbUser.uid, googleName: fbUser.displayName || '' });
                        }
                    } else {
                        // 로그아웃: 리스너 해제 및 상태 초기화
                        unsubRefs.current.forEach(u => u());
                        unsubRefs.current = [];
                        calEventsUnsub.current?.(); calEventsUnsub.current = null;
                        calGroupUnsub.current?.(); calGroupUnsub.current = null;
                        setCurrentUser(null);
                        setNeedsSetup(null);
                        setTodos([]); setResources([]); setAnnouncements([]);
                        setRooms([]); setLocalRoomMessages({}); setSharedEvents([]); setPosts([]);
                        setStudyGroups([]); setStudyTime(0);
                        setCalendarGroup(null); setCalendarEvents([]);
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            // Firestore 데이터 로드
            const loadData = async (uid, profile) => {
                // 개인 데이터 (1회 읽기)
                const todosSnap = await db.collection('users').doc(uid)
                    .collection('todos').orderBy('date').get();
                setTodos(todosSnap.docs.map(d => ({ id: d.id, ...d.data() })));

                // studyTime: 날짜가 바뀌면 0 리셋
                const today = new Date().toISOString().split('T')[0];
                setStudyTime(profile.studyDate === today ? (profile.studyTime || 0) : 0);
                setSuneungDate(profile.suneungDate || '2025-11-13');

                // 공용 데이터 (실시간 리스너)
                const unsubAnn = db.collection('announcements')
                    .orderBy('date', 'desc')
                    .onSnapshot(snap => setAnnouncements(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubEvents = db.collection('events')
                    .onSnapshot(snap => setSharedEvents(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubRes = db.collection('resources')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snap => setResources(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubPosts = db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snap => setPosts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubRooms = db.collection('rooms')
                    .where('members', 'array-contains', uid)
                    .onSnapshot(snap => {
                        const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        list.sort((a, b) => {
                            const t = r => r.lastTime?.toDate ? r.lastTime.toDate().getTime() : new Date(r.lastTime || 0).getTime();
                            return t(b) - t(a);
                        });
                        setRooms(list);
                    }, () => {});

                const unsubGroups = db.collection('studyGroups')
                    .where('members', 'array-contains', uid)
                    .onSnapshot(snap => setStudyGroups(snap.docs.map(d => ({ id: d.id, ...d.data() }))), () => {});

                // 달력 그룹 로드
                const calGroupSnap = await db.collection('calendarGroups')
                    .where('members', 'array-contains', uid).limit(1).get().catch(() => null);
                if (calGroupSnap && !calGroupSnap.empty) {
                    const gDoc = calGroupSnap.docs[0];
                    setCalendarGroup({ id: gDoc.id, ...gDoc.data() });
                    calEventsUnsub.current = db.collection('calendarGroups').doc(gDoc.id)
                        .collection('events')
                        .onSnapshot(snap => setCalendarEvents(snap.docs.map(d => ({ id: d.id, ...d.data() }))), () => {});
                }

                unsubRefs.current = [unsubAnn, unsubEvents, unsubRes, unsubPosts, unsubRooms, unsubGroups];
            };

            // 프로필 저장 헬퍼
            const saveProfile = async (fields) => {
                if (!currentUser) return;
                setCurrentUser(prev => ({ ...prev, ...fields }));
                if (isLocalAdmin()) return;
                await db.collection('users').doc(currentUser.uid).update(fields);
            };

            // D-Day 계산
            const getDDay = (dateStr) => {
                const today = new Date(); today.setHours(0,0,0,0);
                const target = new Date(dateStr); target.setHours(0,0,0,0);
                const diff = target.getTime() - today.getTime();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                return days === 0 ? 'D-Day' : days > 0 ? `D-${days}` : `D+${Math.abs(days)}`;
            };

            // 로컬 어드민 여부 확인
            const isLocalAdmin = () => currentUser?.uid === 'local-admin';

            // Google 로그인
            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                    // onAuthStateChanged가 이후 처리
                } catch (e) {
                    if (e.code !== 'auth/popup-closed-by-user') alert(e.message);
                }
            };

            // 로컬 어드민 (개발용)
            const handleAdminLogin = () => {
                const today = new Date().toISOString().split('T')[0];
                setCurrentUser({ uid: 'local-admin', id: 'admin', name: '관리자', school: 'HIGH.ST', role: '관리자', theme: 'light', studyTime: 0, studyDate: today, suneungDate: '2025-11-13' });
                setUserRole('관리자');
                setLoading(false);
            };

            // 신규 사용자 프로필 설정 (Google 로그인 후)
            const handleSetupProfile = async (id, name) => {
                const { uid } = needsSetup;
                const idDoc = await db.collection('userIds').doc(id).get();
                if (idDoc.exists) return 'duplicate';
                const today = new Date().toISOString().split('T')[0];
                const profile = {
                    id, name, school: '미설정 학교',
                    role: '학생', theme: 'light',
                    studyTime: 0, studyDate: today,
                    suneungDate: '2025-11-13'
                };
                await db.collection('users').doc(uid).set(profile);
                await db.collection('userIds').doc(id).set({ uid });
                setNeedsSetup(null);
                setCurrentUser({ uid, ...profile });
                setUserRole('학생');
                await loadData(uid, profile);
                return 'ok';
            };

            const handleLogout = async () => {
                if (isLocalAdmin()) { setCurrentUser(null); return; }
                await auth.signOut();
            };

            // ── Todo 핸들러 ──────────────────────────────────────────────────
            const handleAddTodo = async (text, date) => {
                const newTodo = { text, completed: false, date };
                if (isLocalAdmin()) { setTodos(prev => [...prev, { id: String(Date.now()), ...newTodo }]); return; }
                const ref = await db.collection('users').doc(currentUser.uid)
                    .collection('todos').add(newTodo);
                setTodos(prev => [...prev, { id: ref.id, ...newTodo }]);
            };

            const handleToggleTodo = async (id) => {
                const todo = todos.find(t => t.id === id);
                if (!todo) return;
                const updated = !todo.completed;
                if (!isLocalAdmin()) {
                    await db.collection('users').doc(currentUser.uid)
                        .collection('todos').doc(id).update({ completed: updated });
                }
                setTodos(prev => prev.map(t => t.id === id ? { ...t, completed: updated } : t));
            };

            const handleDeleteTodo = async (id) => {
                if (!isLocalAdmin()) {
                    await db.collection('users').doc(currentUser.uid)
                        .collection('todos').doc(id).delete();
                }
                setTodos(prev => prev.filter(t => t.id !== id));
            };

            // ── 공지사항 핸들러 ──────────────────────────────────────────────
            const handleAddAnnouncement = async (title, content) => {
                const newAnn = { id: String(Date.now()), title, content, date: new Date().toLocaleDateString(), authorUid: currentUser.uid };
                if (isLocalAdmin()) { setAnnouncements(prev => [newAnn, ...prev]); return; }
                await db.collection('announcements').add({ title, content, date: newAnn.date, authorUid: currentUser.uid });
            };

            // ── 달력 그룹 핸들러 ─────────────────────────────────────────────
            const calGroupUnsub = React.useRef(null);

            const subscribeCalEvents = (groupId) => {
                calEventsUnsub.current?.();
                calGroupUnsub.current?.();
                calEventsUnsub.current = db.collection('calendarGroups').doc(groupId)
                    .collection('events')
                    .onSnapshot(snap => setCalendarEvents(snap.docs.map(d => ({ id: d.id, ...d.data() }))), () => {});
                // 그룹 문서 실시간 구독 (멤버 입출 반영)
                calGroupUnsub.current = db.collection('calendarGroups').doc(groupId)
                    .onSnapshot(snap => {
                        if (snap.exists) setCalendarGroup({ id: snap.id, ...snap.data() });
                        else { setCalendarGroup(null); setCalendarEvents([]); }
                    }, () => {});
            };

            const handleCreateCalendarGroup = async (name) => {
                if (!currentUser) return;
                const code = Math.random().toString(36).substr(2, 6).toUpperCase();
                if (isLocalAdmin()) {
                    const g = { id: 'local-cal', name, code, ownerUid: 'local-admin', members: ['local-admin'] };
                    setCalendarGroup(g); return;
                }
                try {
                    const ref = await db.collection('calendarGroups').add({
                        name, code, ownerUid: currentUser.uid,
                        members: [currentUser.uid],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setCalendarGroup({ id: ref.id, name, code, ownerUid: currentUser.uid, members: [currentUser.uid] });
                    subscribeCalEvents(ref.id);
                } catch(e) {
                    alert('그룹 생성 실패: ' + e.message);
                }
            };

            const handleJoinCalendarGroup = async (code) => {
                if (!currentUser) return;
                if (isLocalAdmin()) { alert('로컬 어드민은 그룹 참여 불가'); return; }
                try {
                    const snap = await db.collection('calendarGroups').where('code', '==', code.toUpperCase()).limit(1).get();
                    if (snap.empty) { alert('그룹을 찾을 수 없습니다.'); return; }
                    const gDoc = snap.docs[0];
                    if ((gDoc.data().members || []).includes(currentUser.uid)) { alert('이미 참여한 그룹입니다.'); return; }
                    await db.collection('calendarGroups').doc(gDoc.id).update({
                        members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                    setCalendarGroup({ id: gDoc.id, ...gDoc.data(), members: [...(gDoc.data().members || []), currentUser.uid] });
                    subscribeCalEvents(gDoc.id);
                } catch(e) {
                    alert('그룹 참여 실패: ' + e.message);
                }
            };

            const handleLeaveCalendarGroup = async () => {
                if (!calendarGroup || !currentUser) return;
                if (!isLocalAdmin()) {
                    await db.collection('calendarGroups').doc(calendarGroup.id).update({
                        members: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                    }).catch(() => {});
                }
                calEventsUnsub.current?.(); calEventsUnsub.current = null;
                calGroupUnsub.current?.(); calGroupUnsub.current = null;
                setCalendarGroup(null); setCalendarEvents([]);
            };

            const handleAddCalendarEvent = async (day, month, year, text, endDay) => {
                if (!calendarGroup) return;
                const data = { day, month, year, text, ...(endDay && endDay > day ? { endDay } : {}) };
                if (isLocalAdmin()) { setCalendarEvents(prev => [...prev, { id: String(Date.now()), ...data }]); return; }
                await db.collection('calendarGroups').doc(calendarGroup.id).collection('events').add({
                    ...data, authorUid: currentUser.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const handleDeleteCalendarEvent = async (id) => {
                if (!calendarGroup) return;
                if (isLocalAdmin()) { setCalendarEvents(prev => prev.filter(e => e.id !== id)); return; }
                await db.collection('calendarGroups').doc(calendarGroup.id).collection('events').doc(id).delete().catch(() => {});
            };

            // ── (레거시) 공용 달력 핸들러 — 하위 호환 ───────────────────────
            const handleAddEvent = async (day, text) => {
                const now = new Date();
                await handleAddCalendarEvent(day, now.getMonth(), now.getFullYear(), text);
            };

            // ── 자료실 핸들러 ────────────────────────────────────────────────
            const handleAddResource = async (title, subject, description, files) => {
                const now  = new Date();
                const date = now.toLocaleDateString('ko-KR');
                const time = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const fileArr = Array.from(files || []);
                if (isLocalAdmin()) {
                    setResources(prev => [{
                        id: String(Date.now()), title, subject, description,
                        authorName: currentUser.name, authorId: currentUser.id,
                        date, time,
                        files: fileArr.map(f => ({ fileName: f.name, downloadURL: null })),
                        fileCount: fileArr.length,
                    }, ...prev]);
                    return;
                }
                const uploadedFiles = [];
                for (const file of fileArr) {
                    const sp  = `resources/${currentUser.uid}/${Date.now()}_${file.name}`;
                    const ref = storage.ref(sp);
                    const sn  = await ref.put(file);
                    const url = await sn.ref.getDownloadURL();
                    uploadedFiles.push({ fileName: file.name, storagePath: sp, downloadURL: url });
                }
                await db.collection('resources').add({
                    title, subject, description,
                    authorUid: currentUser.uid, authorName: currentUser.name,
                    date, time,
                    files: uploadedFiles,
                    fileCount: uploadedFiles.length,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            // ── (레거시) 공용 달력 삭제
            const handleDeleteEvent = async (id) => handleDeleteCalendarEvent(id);

            // ── 공부 핸들러 ──────────────────────────────────────────────────
            const handleStudyStart = async (subject) => {
                if (isLocalAdmin()) return;
                for (const g of studyGroups) {
                    db.collection('studyGroups').doc(g.id).collection('presence').doc(currentUser.uid).set(
                        { isStudying: true, subject, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() },
                        { merge: true }
                    ).catch(() => {});
                }
            };

            const handleStudyStop = async (subject, durationSec, date) => {
                if (durationSec < 5) return;
                const newTotal = studyTime + durationSec;
                setStudyTime(newTotal);
                if (isLocalAdmin()) return;
                const uid = currentUser.uid;
                const batch = db.batch();
                batch.set(db.collection('users').doc(uid).collection('studySessions').doc(), {
                    subject, duration: durationSec, date,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                batch.set(db.collection('users').doc(uid).collection('studyDays').doc(date), {
                    seconds: firebase.firestore.FieldValue.increment(durationSec),
                    subjects: { [subject]: firebase.firestore.FieldValue.increment(durationSec) }
                }, { merge: true });
                batch.update(db.collection('users').doc(uid), {
                    studyTime: newTotal, studyDate: date
                });
                await batch.commit().catch(() => {});
                for (const g of studyGroups) {
                    db.collection('studyGroups').doc(g.id).collection('presence').doc(uid).set(
                        { isStudying: false, subject: '', todaySeconds: newTotal, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() },
                        { merge: true }
                    ).catch(() => {});
                }
            };

            const handleCreateStudyGroup = async (name) => {
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                if (isLocalAdmin()) {
                    setStudyGroups(prev => [...prev, { id: `local-${Date.now()}`, name, code, ownerUid: currentUser.uid, members: [currentUser.uid], memberData: { [currentUser.uid]: { id: currentUser.id, name: currentUser.name } } }]);
                    return;
                }
                await db.collection('studyGroups').add({
                    name, code, ownerUid: currentUser.uid, members: [currentUser.uid],
                    memberData: { [currentUser.uid]: { id: currentUser.id, name: currentUser.name } },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const handleJoinStudyGroup = async (code) => {
                if (isLocalAdmin()) { alert('로컬 어드민은 그룹 참여 불가'); return; }
                try {
                    const snap = await db.collection('studyGroups').where('code', '==', code.toUpperCase()).limit(1).get();
                    if (!snap || snap.empty) { alert('잘못된 코드입니다.'); return; }
                    const doc = snap.docs[0];
                    if ((doc.data().members || []).includes(currentUser.uid)) { alert('이미 가입된 그룹입니다.'); return; }
                    await db.collection('studyGroups').doc(doc.id).update({
                        members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
                        [`memberData.${currentUser.uid}`]: { id: currentUser.id, name: currentUser.name }
                    });
                } catch(e) {
                    alert('그룹 참여 실패: ' + e.message);
                }
            };

            const handleLeaveStudyGroup = async (groupId) => {
                if (isLocalAdmin()) { setStudyGroups(prev => prev.filter(g => g.id !== groupId)); return; }
                await db.collection('studyGroups').doc(groupId).update({
                    members: firebase.firestore.FieldValue.arrayRemove(currentUser.uid),
                    [`memberData.${currentUser.uid}`]: firebase.firestore.FieldValue.delete()
                }).catch(() => {});
            };

            const handleKickStudyMember = async (groupId, targetUid) => {
                if (isLocalAdmin()) {
                    setStudyGroups(prev => prev.map(g => g.id !== groupId ? g : {
                        ...g,
                        members: g.members.filter(m => m !== targetUid),
                        memberData: Object.fromEntries(Object.entries(g.memberData||{}).filter(([k]) => k !== targetUid))
                    }));
                    return;
                }
                await db.collection('studyGroups').doc(groupId).update({
                    members: firebase.firestore.FieldValue.arrayRemove(targetUid),
                    [`memberData.${targetUid}`]: firebase.firestore.FieldValue.delete()
                }).catch(() => {});
            };

            const handleKickCalendarMember = async (targetUid) => {
                if (!calendarGroup) return;
                if (isLocalAdmin()) {
                    setCalendarGroup(prev => ({ ...prev, members: (prev.members||[]).filter(m => m !== targetUid) }));
                    return;
                }
                await db.collection('calendarGroups').doc(calendarGroup.id).update({
                    members: firebase.firestore.FieldValue.arrayRemove(targetUid)
                }).catch(() => {});
            };

            // ── 커뮤니티 핸들러 ──────────────────────────────────────────────
            const handleAddPost = async (title, content, category) => {
                const now = new Date();
                const newPost = {
                    title, content, category,
                    authorId: currentUser.id,
                    authorName: currentUser.name,
                    date: now.toLocaleDateString('ko-KR'),
                    time: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                    views: 0, likes: 0,
                    createdAt: now.toISOString(),
                };
                if (isLocalAdmin()) {
                    setPosts(prev => [{ id: String(Date.now()), ...newPost }, ...prev]);
                    return;
                }
                await db.collection('posts').add({
                    ...newPost,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            // ── 메시지(대화방) 핸들러 ────────────────────────────────────────
            const handleCreateRoom = async (memberIdsStr, groupName) => {
                const targetIds = memberIdsStr.split(',').map(s => s.trim()).filter(Boolean);
                if (!targetIds.length) return null;
                const allIds = [currentUser.id, ...targetIds.filter(id => id !== currentUser.id)];
                const isGroup = allIds.length > 2;
                const roomName = groupName.trim() || (isGroup ? targetIds.join(', ') : targetIds[0]);

                if (isLocalAdmin()) {
                    const newRoom = {
                        id: `local-${Date.now()}`,
                        members: [currentUser.uid, ...targetIds],
                        memberIds: allIds,
                        memberNames: { [currentUser.uid]: currentUser.name },
                        isGroup, name: roomName,
                        lastMessage: '', lastTime: new Date().toISOString(),
                    };
                    setRooms(prev => [newRoom, ...prev]);
                    return newRoom.id;
                }

                const memberUids = [currentUser.uid];
                const memberIds  = [currentUser.id];
                const memberNames = { [currentUser.uid]: currentUser.name };
                for (const id of targetIds) {
                    if (id === currentUser.id) continue;
                    try {
                        const snap = await db.collection('userIds').doc(id).get();
                        if (!snap.exists) { alert(`'${id}' 사용자를 찾을 수 없습니다.`); return null; }
                        const uid = snap.data().uid;
                        const uSnap = await db.collection('users').doc(uid).get();
                        memberUids.push(uid); memberIds.push(id);
                        memberNames[uid] = uSnap.data()?.name || id;
                    } catch { return null; }
                }
                const isGroupFinal = memberUids.length > 2;
                const ref = await db.collection('rooms').add({
                    members: memberUids, memberIds, memberNames,
                    isGroup: isGroupFinal,
                    name: groupName.trim() || (isGroupFinal
                        ? memberIds.filter(id => id !== currentUser.id).join(', ')
                        : memberIds.find(id => id !== currentUser.id) || ''),
                    lastMessage: '',
                    lastTime: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                });
                return ref.id;
            };

            const handleSendInRoom = async (roomId, text) => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                if (isLocalAdmin()) {
                    const newMsg = { id: String(Date.now()), fromUid: 'local-admin', fromId: currentUser.id, fromName: currentUser.name, text, time: timeStr, createdAt: now.toISOString() };
                    setLocalRoomMessages(prev => ({ ...prev, [roomId]: [...(prev[roomId] || []), newMsg] }));
                    setRooms(prev => prev.map(r => r.id === roomId ? { ...r, lastMessage: text, lastTime: now.toISOString() } : r));
                    return;
                }
                await db.collection('rooms').doc(roomId).collection('messages').add({
                    fromUid: currentUser.uid, fromId: currentUser.id, fromName: currentUser.name,
                    text, time: timeStr,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                });

                    lastTime: firebase.firestore.FieldValue.serverTimestamp(),
